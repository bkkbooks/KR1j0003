front:
  text: 爾雅疏敘
  hash: sha256:59f43e0d337d76594bcbc13c0f7a52ed4454afdce52baca0f7d3abe4c33927dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_000-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定夫爾雅者先儒授教之術後進索隱之方誠傳注之濫觴為經籍之樞要者也夫混元闢而三才肇位聖人作而六藝斯興本乎發德於衷將以納民於善洎夫醇醨既異步驟不同一物多名繫方俗之語片言殊訓滯今古之情將使後生若為鑽仰繇是聖賢間出詁訓遞陳周公倡之於前子夏和之於後蟲魚草木爰自爾以昭彰禮樂詩書盡由斯而紛郁然又時經戰國運歷挾書傳授之徒􅐛微發揮之道斯寡諸篇所釋世罕得聞惟漢終軍獨深其道豹鼠既辨斯文遂隆其後相傳乃可詳悉其為注者則有犍為文學劉歆樊光李巡孫炎雖各名家猶未詳備惟東晉郭景純用心幾二十年注解方畢甚得六經之旨頗詳百物之形學者祖焉最為稱首其為義疏者則俗間有孫炎髙璉皆淺近俗儒不經師匠今既奉勑校定考案其事必以經籍為宗理義所詮則以景純為主雖復研精覃思尚慮學淺意疏謹與尚書駕部貟外郎直祕閣臣杜鎬尚書都官貟外郎祕閣校
  hash: sha256:2f2dfde4f560166ace7cc45b47c2a96b03afa12314de551f92ba7df0d4bb9815
