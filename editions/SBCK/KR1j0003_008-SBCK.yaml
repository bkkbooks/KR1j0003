body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋草第十三釋曰草􅀃文作艸􅀠變作艹七老切百卉也又曰象野草莽蒼之形􅀃文别有草字自保切云草斗櫟實也一曰象斗子徐鉉曰今俗以此爲艹木之草别作皁字爲黒色之皁案櫟實可以染帛爲黒色故曰草通用爲草棧字然則此篇辨百卉之名見於經傳者當爲草木之草故云釋草蒮山至山蒜釋曰此辨四種菜生山中與人家所種者異名也韭􅀃文云菜名一種而久者故謂之韭象形在一之上一地也生山中者名蒮韓詩云六月食鬱及蒮是也葱􅀃文云菜名生山中者名茖細莖大葉者是也䪥􅀃文云菜也葉似韭生山中者名葝蒜􅀃文云葷菜也一云菜之美者雲夢之葷菜生山中者名蒚薜山蘄釋曰􅀃文云蘄草也生山中者一名薜一名山蘄色白者名白蘄下文薜白蘄是也生平地即名蘄注廣雅至麤大釋曰廣雅張揖撰以廣爾雅之闕漏也曰山蘄當歸者言即今藥草當歸案本草當歸不言名薜及山蘄是即以時驗而言也故郭云今似蘄而麤大言似平地蘄而差麤大耳椴木槿櫬木槿釋曰此别椴櫬是木槿之二名也某氏云别三名也其樹如李其華朝生暮落與草同氣故在草中詩鄭風云顔如舜華陸機䟽云舜一名木槿一名櫬一名椴齊魯之閒謂之王蒸今朝生暮落者是也郭氏云可食亦呼曰及五月始華故月令仲夏云木槿榮术山薊楊枹薊釋曰此辨薊生山中及平地者名也生平地者即名薊生山中者一名术本草云一名山薊一名山薑一名山連陶注云有兩種白术葉大有毛甜而少膏赤术葉細小苦而多膏是也其生平地而肥大於衆者名楊枹薊今呼之馬薊葥王蔧釋曰此則藜之科大爲樹可以作埽蔧者一名葥一名王蔧一名王帚江東呼落帚菉王芻釋曰舎人云菉一名王芻其氏云菉鹿莀也郭云菉蓐也今呼鴟脚莎詩衞風云瞻彼淇奥緑竹猗猗是也拜蔏藋釋曰此亦似藜而葉大者名拜一名蔏藋莊子云藜藋柱宇是也蘩皤蒿蒿菣蔚牡菣釋曰此辨蒿色及有子無子者之異名也詩召南云子以采蘩于沼于沚毛傳云蘩皤蒿也郭氏云白蒿然則皤猶白也本草云白蒿唐夲注云此蒿葉麤於青蒿從初生至枯白於衆蒿欲似艾者所在有之又云葉似艾葉上有白毛麤澁俗呼蓬蒿可以爲菹故詩箋云以豆薦蘩菹陸機云凡艾白色爲皤蒿今白蒿春始生及秋香美可生食又可烝一名游胡北海人謂之旁勃故大戴禮夏小正傳曰蘩游胡游胡旁勃也是蒿一名菣詩小雅鹿鳴云食野之蒿陸機云蒿靑蒿也荆豫之閒汝南汝隂皆云菣孫炎云荆楚之閒謂蒿爲菣郭云今人呼靑蒿香中炙啖者爲菣是也蔚即蒿之雄無子者故云牡菣舎人曰蔚一名牡菣詩蓼莪云匪莪伊蔚陸機云牡蒿也二月始生七月華華似胡麻華而紫赤八月爲角角似小豆角銳而長一名馬新蒿是也齧彫蓬薦黍蓬釋曰此别蓬種􅀋也􅀃文云蓬蒿也草之不理者也種􅀋非一故有齧彫蓬薦黍蓬詩召南騶虞云彼茁者蓬月令云藜莠蓬蒿並興是也􅤴䑕莞釋曰莞屬也􅀃文云莞草可以爲薦此􅤴一名䑕莞纎細似龍須亦可以爲席蜀中出好者葝䑕尾釋曰可以染皁草也一名葝一名䑕尾本草有白華者有赤華者又一名陵翹陶注云田野甚多人採作滋染木蘭是也菥蓂大薺釋曰菥蓂一名大薺俗呼老薺似薺而葉細本草又名蔑菥一名大蕺一名馬辛是也蒤虎杖釋曰蒤一名虎杖郭云似紅草而麤大有細刺可以染赤陶注本草云田野甚多狀如大馬蓼莖斑而葉圎是也孟狼尾釋曰草似茅者一名孟一名狼尾今人亦以覆屋瓠棲瓣釋曰瓣瓠中瓣也一名瓠棲人之齒美者似之故詩衞風碩人美莊姜云齒如瓠棲是也茹藘茅蒐釋曰今染絳蒨也一名茹藘一名茅蒐詩鄭風云茹藘在阪陸機云一名地血齊人謂之茜徐州人謂之牛蔓即今之蒨草是也果臝之實栝樓釋曰果臝之草其實名栝樓實即子也故李巡云栝樓子名也郭云今齊人謂之天􅀲本草云栝樓葉如􅀲葉形兩兩相值蔓延靑黒色六月華七月實如􅀲瓣是也荼苦菜釋曰此味苦可食之菜也一名荼一名苦菜本草一名荼草一名選一名游冬案易緯通卦驗玄圖云苦菜生於寒秋經冬歷春乃成月令孟夏苦菜秀是也葉似苦苣而細斷之有白汁花黃似菊堪食但苦耳注詩曰誰謂荼苦釋曰邶風谷風篇文也萑蓷釋曰萑一名蓷李巡曰臭穢草也郭云今茺蔚也廣雅名益母葉似荏方莖白華華生節閒詩王風云中谷有蓷陸機云舊􅀃及魏博士濟隂周元明皆云菴䕡是也韓詩及三蒼􅀃悉云益母故曽子見益母而感案本草茺蔚一名益母故劉歆曰蓷臭穢臭穢即茺蔚也虉綬釋曰虉者雜色如綬文之草也詩陳風云邛有旨鷊陸機䟽云鷊五色作綬文故曰綬草是也粢稷釋曰左傳云粢食不鑿粢者稷也曲禮云稷曰姿粢是也郭云今江東人呼粟爲粢然則粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物故先儒共疑焉衆秫釋曰衆一名秫謂黏粟也􅀃文云稷之黏者也與榖相似米黏北人用之釀酒其莖稈似禾而麤大者是也戎菽謂之荏菽釋曰戎菽一名荏菽孫炎云大豆也詩大雅生民云藝之荏菽荏菽斾斾鄭箋亦以爲大豆樊光舎人李巡郭氏皆云今以爲胡豆郭又云春秋齊侯來獻戎捷穀梁傳曰戎菽也管子亦云北戎山戎出冬葱及戎菽布之天下今之胡豆是也案此戎菽皆爲大豆注穀梁者亦以爲大豆也郭氏等以戎胡俱是夷名故以戎菽爲胡豆也卉草釋曰别二名也百卉猶百草也詩小雅云百卉具腓是也蘥雀麥釋曰蘥一名雀麥一名燕麥本草云生故墟野林下苗似小麥而弱實似積麥而細在處亦有之是也蔩菟􅀲釋曰菟􅀲一名蔩苗及實似土􅀲土􅀲者即王􅀲也月令王􅀲生是也茢薽豕首釋曰茢薽藥草名一名豕首一名􅇾盧一名蟾蠩蘭一名天名精一名麥句薑一名蝦蟇藍一名天門精一名玉門精別録一名天蔓精南人名爲地菘味甘辛故有薑稱狀如藍故名蝦墓藍香氣似蘭故名蟾蠩蘭郭云江東呼豨首可以煼􅅙蛹者三蒼云煼熬也荓馬帚釋曰荓草似蓍者今俗謂蓍荓可以爲埽蔧故一名馬帚注似蓍釋曰􅀃文云蓍蒿屬也生千歳三百莖可以爲􅁲䇿白虎通云此天地之間壽考物也故問之是也茭牛蘄釋曰似芹可食菜也而葉細銳一名茭一名牛蘄一名馬蘄子入藥用夲草注云生水澤旁苗似􅀑鍼菾菜等花靑白色子黃黒色似防風子是也葖蘆萉釋曰紫花菘也俗呼温菘似蕪菁大根一名葖俗呼雹葖一名蘆菔今謂之蘿蔔是也苬芝釋曰瑞草名也一歳三華一名苬一名芝論衡云芝生於土土氣和故芝草生瑞命禮曰王者仁慈則芝草生是也筍竹萌釋曰孫炎曰竹初萌生謂之筍凡草木初生謂之萌筍則竹之􅀄生者故曰筍竹萌也可以爲菜殽詩大雅韓奕云其蔌維何維筍及蒲蔌則菜殽也簜竹釋曰簜則竹之別名李巡曰竹節相去一丈曰簜孫炎曰竹闊節者曰簜禹貢篠簜旣敷孔安國云簜大竹郭氏即云竹别名無大小之異故引禮經爲證也注儀禮至之屬釋曰儀禮曰者大射禮文也案彼云樂人宿縣西階之西頌磬東面其南鍾其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北一建鼓在西階之東南面簜在建鼓之間鄭注云簜竹也謂笙簫之屬􅀝於堂以笙簫之屬固非大竹故郭氏引之也鄭又云建猶樹也以木貫而載之樹之跗也故謂之建鼔云謂簫管之屬者郭用鄭玄之􅀃也莪蘿釋曰舎人云莪一名蘿郭云今莪蒿也亦曰䕲蒿詩小雅云菁菁者莪陸機云莪蒿也一名蘿蒿生澤田漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿是也苨菧苨釋曰苨一名菧苨郭云薺苨也本草薺苨陶注云根莖都似人參而葉小異根味甜又別夲注云根似桔梗以無心爲異者是也莕接余其葉苻釋曰莕菜一名接余其葉名苻郭云叢生水中葉圎在莖端長短隨水深淺江東食之亦呼爲莕詩周南􅀜雎云參差荇菜是也荇與莕同陸機䟽云接余白莖葉紫赤色正圎徑寸餘浮在水上根在水底與水深淺等大如􅁫股上靑下白鬻其白莖以苦酒浸之脃美可案酒白華野菅釋曰舎人云白華一名野菅陸機云菅似茅而滑澤無毛根下五寸中有白粉者柔忍冝爲索漚乃尤善矣郭云菅茅屬此白華亦是茅之􅀋也漚之柔韌異其名謂之爲菅因謂在野未漚者爲野菅耳詩小雅云白華菅兮是也菲芴釋曰菲一名芴郭云即土􅀲也孫炎曰葍􅀋也詩谷風云采葑采菲陸機云菲似葍莖麤葉厚而長有毛三月中烝鬻爲茹滑美可作羮幽州人謂之芴爾雅又謂之蒠菜今河内人謂之宿菜案今爾雅菲芴與蒠菜異郭注似是别草如陸之言又是一物某氏注爾雅二處皆引谷風詩即菲也芴也蒠菜也土􅀲也宿菜也五者一物也其狀似葍而非葍故云葍􅀋也葍䔰釋曰葍一名䔰郭云大葉白華根如指正白可啖詩小雅云我行其野言采其葍陸機云幽州人謂之燕䔰其根正白可著熱􅁅中温啖之饑荒之歳可蒸以禦饑也熒委萎釋曰藥草也一名榮一名委萎本草女萎萎蕤一名熒是也葉似竹大者如箭竿有節葉狹而長表白裏青根大如指長一二尺可啖葋竹萹蓄釋曰李巡曰一物二名也孫炎某氏引詩衛風云緑竹猗猗郭云似小藜赤莖節好生道旁可食又殺蟲案陶隱居本草注云處處有布地而生節間白葉華細緑人謂之萹竹煑汁與小兒飲療蚘蟲是也葴寒漿釋曰葴一名寒漿郭云今酸漿草江東呼曰苦葴案本草酸漿一名醋漿陶注云處處人家多有葉亦可食子作房房中有子如梅李大皆黃赤色薢茩芵茪釋曰藥草芵明也一名芵光一名決明郭云葉黃銳赤華實如山茱茰陶注本草云葉如茳豆子形似馬蹄呼爲馬歸決明廣雅謂之羊躑躅也注或曰䔖也􅀜西謂之薢茩釋曰知者案􅀃文云䔖楚曰芰秦曰薢茩是也莁荑蔱蘠釋曰莁荑一名蔱蘠郭云一名白蕢此草也案本草蕪荑一名無姑一名䕋音殿唐唐本注云爾雅莁荑一名蔱蘠今作䕋字之誤也而在木部疑非是或者與草同氣乎瓞瓝其紹瓞釋曰瓞一名瓝小􅀲也紹繼也􅀲之蔓紹緒先歲之􅀲必小亦名瓞故云其紹瓞詩大雅云緜緜􅀲瓞舎人曰瓞名瓝小􅀲也紹繼謂瓞子漢中小􅀲曰瓞孫炎曰瓞小􅀲子如瓝其本子小紹先歲之􅀲曰瓞然則􅀲之族􅀋本有二種大者曰􅀲小者曰瓞此則其種别也而􅀲蔓近本之􅀲必小於先歳之大􅀲以其小如瓝故謂之瓞瓞是瓝之别名故郭云俗呼瓝爲瓞紹者􅀲蔓緒亦著子但小如瓝芍鳧茈釋曰芍一名鳧茈郭云生下田中苗似龍須而細根如指頭黒色可食今俗瀹而鬻之者是也蘱薡蕫釋曰蘱一名薡蕫狀似蒲而細可爲屩亦可綯以爲索蕛苵釋曰蕛一名苵似稗之穢草也布生於地莊子曰道在蕛稗是亦有米細小莊子又曰􅀂蕛米之在太倉是也鉤芺釋曰薊􅀋也一名鉤一名芺郭云大如拇􅃌中空莖頭有臺似薊初生可食􅀃文云味苦江南食以下氣是也䪥鴻薈釋曰䪥葉似韭之菜也一名鴻薈本草謂之菜芝是也蘇桂荏釋曰蘇荏􅀋之草也以其味辛似荏故一名桂荏陶注本草云葉下紫色而氣甚香其無紫色不香似荏者名野􅂫生池澤中者名水􅂫一名雞􅂫皆荏􅀋也薔虞蓼釋曰薔一名虞蓼即蓼之生水澤者也周頌良耜云以薅荼蓼毛傳云蓼水草是也虋赤苗至二米釋曰案詩大雅生民云誕降嘉種維秬維秠維穈維􅉮故此釋之也虋與穈音義同虋即嘉榖赤苖者郭云今之赤􅆝粟􅉮即嘉榖曰苗者郭云今之白粱粟皆好榖也李巡曰黒黍一名秬黍秬即黒黍之大名也秠是黒黍之中一稃有二米者别名之爲秠􅀂然秬秠皆黒黍矣而春官鬯人注云釀秬爲酒秬如黒黍一秠二米言如者以黒黍一米者多秬爲正稱二米則秬中之異故言如以明秬有二等也秬有二等則一米亦可爲酒鬯人之注必言二米者以宗廟之祭唯祼爲重二米嘉異之物鬯酒冝當用之故以二米解鬯其實秬是大名故云釀秬爲酒此云秠一稃二米鬯人注云一秠二米文不同者鄭志荅張逸云秠即皮其稃亦皮也爾雅重言以曉人然則秠稃古今語之異故鄭引此文得以稃爲柸也漢和帝時任城縣生黒黍或三四實實二米得黍三斛八斗是也稌稻釋曰别二名也郭云今沛國呼稌詩周頌云豐年多黍多稌禮記内則云牛冝稌􅃎風七月云十月穫稻是一物也按􅀃文云沛國謂稻爲糯粇稻屬也字林云穤黏稻也秔稻不黏者本草以粳米稻稻米爲二物秔與粳古今字然秔糯甚相􅀋黏不黏爲異耳依􅀃文稌稻即糯也江東呼􅟙乃亂切葍藑茅釋曰葍與藑茅一草也華白者即名葍華赤者别名藑茅故郭云亦猶蔆苕華黃白異名也臺夫須釋曰舎人云臺一名夫須詩小雅云南山有臺陸機云舊􅀃夫須莎草也可以爲蓑笠都人士云臺笠緇撮是也注鄭箋至雨笠釋曰箋者傳注之别名也以詩先有毛公作傳鄭􅀇釋其未備者字林云箋者表也識也鄭以毛學審備遵暢厥旨所以表明毛意記識其事故特稱箋也都人士箋云都人之士以臺皮爲笠此引其意非全文也莔貝母釋曰藥草貝母一名莔郭云根如小貝貟而白華葉似韭詩鄘風載馳云陟彼阿丘言在其蝱陸機云蝱今藥草貝母也其葉如栝樓而細小其子在根下如芋子正白四方連累相著有分解也本草一名空草陶注云出近道形似聚貝子故名貝母是也荍蚍衃釋曰舎人云荍一名蚍衃郭云今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起詩陳風云視爾如荍毛傳云芘芣也陸機云芘芣一名荆葵似蕪菁華紫緑色可食微苦且也艾冰臺釋曰艾一名冰臺即今艾蒿也詩王風云彼采艾兮是也蕇亭歷釋曰蕇一名亭歷郭云實葉皆似芥廣雅又名狗薺本草一名丁歷一名大室一名大適陶注云今近道亦有母則公薺子細黃至苦是也苻􅀑曰釋曰苻一名􅀑目郭云今江東有􅀑目草莖似葛葉貟而毛子如耳璫也赤色叢生蔜􅭚􅘚釋曰蔜一名􅭚􅘚一名蘩􅘚一名雞腸草夲草云蘩蔞味辛陶注此菜人以作羮唐夲注云此即雞腸草也多生下濕坑渠之側人家園庭亦有此草是也離南活莌釋曰離南草也一名活莌山海經又名宼脫生江南髙丈許大葉似荷葉而肥莖中有瓤正白者是也注零陵人祖曰貫之爲樹釋曰祖且也貫事也言零陵郡人且日事之使科大􅀂樹然也郭又注山海經云零桂人人且日貫之以爲樹然所未詳蒡隱荵釋曰蒡蘓􅀋菜也一名隱荵郭云似蘇有毛今江東呼爲隱荵藏以爲􅉁亦可瀹食者瀹煑也莤蔓于釋曰莤水草也一名蔓于郭云一名軒于江東呼莤蓾蔖注作履苴草釋曰蓾􅀃文云蓾草也可以束一名蔖即蒯􅀋也中作履㡳字苑云苴履㡳故云作履苴草也柱夫揺車釋曰柱夫可食之草也一名揺車俗呼翹摇車蔓生紫華華翹起揺動因名云出隧蘧􅂼釋曰菌􅀋也一名出隧一名蘧􅂼廣雅云朝生形如􅀑蓋郭云似土菌生菰草中今江東啖之甜滑音氊氍㲣者􅀃文云菰蔣也張揖云氍㲣毛席取其音同蘄蘪蕪釋曰芎藭苗也一名蘄􅊉一名蘪蕪夲草一名薇蕪一名江離陶注云似蛇牀而香郭云香草葉小如萎狀者言如萎蔫之狀也注淮南至蘪蕪釋曰云淮南子云似蛇􅇃者案淮南子汜論篇云夫物之相􅀋者丗人之所亂惑也嫌疑肖像者衆人所􅅭燿也故很者􅀋知而非知也愚者􅀋君子而非君子也贛者􅀋勇而非勇也使人相去也􅀂玉之與石也葵之與莧也則論人易矣夫亂人者􅀂芎藭之與藁夲虵牀之與蘪蕪者許慎云此四者藥草臭味之相似其治病則不同力是也云山海經曰臭如蘪蕪者案西山經浮山有草曰訓草麻葉而方莖赤華而黒實臭如蘪蕪可以止癘又天帝山有草其狀如葵其臭如蘪蕪名曰杜衡可以走馬食之巳廮是也臭香也言其香氣如蘪蕪也茨蒺蔾釋曰茨一名蒺蔾郭云布地蔓生細葉子有三角刺人見詩者案詩小雅云楚楚者茨是也蘮蒘竊衣釋曰蘮蒘一名竊衣郭云似芹可食子大如麥兩兩相合有毛著人衣俗名􅀑麥者也髦顚蕀釋曰髦一名顚蕀一名商蕀廣雅云女术也郭云細葉有刺蔓生雚芄蘭釋曰雚一名芄蘭郭云雚芄蔓生斷之有白汁可啖案如此注則似雚芄一名蘭或傳冩誤芄􅄛字詩衞風云芄蘭之支陸機云一名蘿藦幽州人謂之雀瓢􅙛莐藩釋曰藥草知母也一名􅙛一名莐藩郭云生山上葉如韭一曰提母案本草此名之外更有十餘名文多不戴陶注云形似昌蒲而柔潤葉至難死握出隨生須燥乃止也蕍蕮釋曰蕍一名蕮即藥草澤蕮也本草作澤瀉一名水瀉一名及瀉一名芒芉一名鵠瀉陶注云葉狹長叢生諸淺水中蔨鹿􅓂其實莥釋曰蔨一名鹿􅓂其實名莥郭云今鹿豆也葉似大豆根黃而香蔓延生本草云味苦唐本注云此草所在有之苗似豌豆有蔓而長大人取以爲菜亦微有豆氣名爲鹿豆也薃侯莎其實媞釋曰薃即莎别名侯維也猶語辭也其實别名媞注夏小至其實釋曰夏小正者大戴禮之篇名本夏后氏著十二月之􅃸也漢九江太守戴德記之謂之大戴禮記其正月云緹薃薃也者莎䔺也緹也者其實也先言緹而後言薃何也緹先見者也何以謂之小正以著名也案廣雅云地毛莎䔺也是䔺即莎也故云莎䔺莞苻蘺其上蒚釋曰某氏曰本草云白蒲一名苻蘺楚謂之莞蒲其上臺别名蒚郭義具注詩小雅斯干云下莞上簟鄭箋云莞小蒲也者以莞蒲一草之名而司几筵有莞筵蒲筵則有大小之異爲席有精有麤故得爲兩種席也荷芙渠至的中薏釋曰李巡曰皆分別蓮莖葉華實之名芙渠其揔名也別名芙蓉江東呼荷菡萏蓮華也的蓮實也薏中心也郭璞曰蔤莖下白蒻在泥中者今江東人呼荷華爲芙蓉北方人便以藕爲荷亦以蓮爲荷蜀人以藕爲茄或用其母爲華名或用根子爲母葉號此皆名相錯習俗傳誤失其正體者也陸機䟽云蓮靑皮裏白子爲的的中有靑爲薏味甚苦故里語云苦如薏是也注見詩釋曰詩陳風云彼澤之陂有蒲與荷又曰有蒲與蓮又曰有蒲菡萏是也紅蘢古其大者蘬釋曰舎人曰紅名蘢古其大者名蘬詩鄭風云隰有游龍毛云龍紅草也陸機云一名馬蓼葉大而赤白色生水澤中髙丈餘郭云俗呼紅草爲蘢鼓語轉耳蒫薺實釋曰本草云薺味甘人取其葉作菹及羹之佳詩谷風云誰謂荼苦其甘如薺其子别名蒫黂枲實釋曰枲麻也黂者即麻子名也故云黂枲實也注禮記曰苴麻之有黂釋曰儀禮喪服傳文也傳所以解經故亦謂之禮記也案喪服經云苴絰傳曰苴絰者麻之有黂者是也枲麻釋曰麻一名枲故注云别二名禹貢靑州云厥貢岱畎絲枲是也湏蕵蕪釋曰案詩谷風云采葑采菲毛傳云葑須也先儒即以須葑蓯當之孫炎云須一名葑蓯今郭注上葑蓯云未詳注此云薞蕪似羊蹄葉細味酢可食則郭意以毛云葑須者謂此蕵蕪也坊記注云葑蔓菁也陳宋之閒謂之葑陸機云葑蕪菁幽州人或謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之蕘􅀜西謂之蕪菁趙魏之部謂之大芥蘴與葑字雖異音實同則葑也須也蕪菁也蔓菁也蕵蕪也蕘也芥也七者一物也菲蒠菜釋曰菲一名息菜案詩谷風云采葑采菲毛傳云菲芴也郭上注菲芴云土􅀲也注此云菲草生下溼地似蕪菁華紫赤色可食則是芴與蒠菜别草而某氏及陸機以爲一物非郭義也蕢赤莧釋曰赤莧一名蕢今莧菜之赤莖者也蘠蘼虋冬釋曰藥草也一名蘠蘼一名虋冬注門冬一名滿冬本草云釋曰案山海經云條谷山其草多芍藥虋冬郭注亦云本草一名滿冬今檢本草有天門冬一名顚勒麥門冬秦名羊韭齊名愛韭楚名馬韮越名羊蓍一名禹葭一名禹餘糧無名滿冬者蓋所見本異也虋門字異音同耳濼貫衆釋曰藥草名也一名濼一名貫衆本草云一名貫節一名貫渠一名百頭一名虎卷一名萹苻一名伯蓱一名藥藻此謂鴟頭陶注云葉如大蕨形色毛芒全似老鴟頭因名之郭氏云葉貟銳莖毛黒布地冬不死一名貫渠廣雅云貫節莙牛薻釋曰莙一名牛薻江東呼馬薻薻之葉大者也詩召南云于以采藻左傳云蘋蘩蕰藻之菜以此草好聚生故言蕰藻蕰訓聚也毛傳云藻聚藻也陸機云藻水草也生水㡳有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如􅁫股葉如蓬蒿謂之聚藻又云扶風人謂之藻聚爲發聲也此二藻皆可食煑熟挼去腥氣米麪糝蒸爲茹嘉美揚州人饑荒可以當榖食蓫薚馬尾釋曰藥草蔏陸也一名蓫薚一名馬尾郭云廣雅曰馬尾蔏陸本草云別名薚今􅀜西亦呼爲薚江東呼爲當陸案本草商陸一名蕩根一名夜呼不同者所見本異也今注云一名白昌一名當陸是也苹蓱其大者蘋釋曰舎人曰苹一名蓱大者名蘋郭曰水中浮蓱江東謂之薸陸機毛詩義䟽云今水上浮蓱是也其麤大者謂之蘋小者曰蓱季春始生可糝烝爲茹又可苦酒淹以就酒注詩曰于以采蘋釋曰召南采蘋篇文也莃莬葵釋曰莃一名菟葵郭云頗似葵而小葉狀如藜有毛汋啖之滑者汋煑也案本草唐夲注云苗如石龍芮葉光澤花白似梅莖紫色煑汁極滑堪噉爾雅釋草一名莃所在平澤皆有田閒人多識之是也芹楚葵釋曰郭云今水中芹菜案本草云水芹一名水英陶注云其二月三月作英時可作菹及爚食之又有渣音樝芹可爲生菜亦可生噉別本注云芹有兩種荻芹取根白色赤芹取莖葉並堪作菹及生菜是也藬牛蘈釋曰藬一名牛蘈詩小雅云言采其蓫鄭箋云蓫牛蘈郭云今江東呼草爲牛蘈者髙尺餘許方莖葉長而銳有穗穗閒有華華紫縹色可淋以爲飲者字林云縹青白色淋以水沃也藚牛脣釋曰李巡云別二名郭云如續斷寸寸有節陸機以爲今澤蕮也郭氏所不取注毛詩傳曰水蕮也釋曰詩魏風汾沮洳云彼汾一曲言采其藚毛傳云藚水蕮也是苹藾蕭釋曰苹一名藾蕭郭云今藾蒿也初生亦可食詩小雅云呦呦鹿鳴食野之苹陸機云葉靑白色莖似箸而輕肥始生香可生食又可烝食是也連異翹釋曰連一名異翹郭云一名連苕又名連草本草云者案今夲草連翹一名異翹一名蘭華一名折根一名軹一名三廉不同者所見夲異也唐本注云此物有兩種大翹小翹大翹葉狹長如水蘇花黄可愛生下濕地著子似椿實之未開者作房翹出衆草其小翹生崗原之上葉花實皆似大翹而小細耳是也澤烏薞釋曰即上蘾生於水澤者然形所未詳傅横目釋曰傅一名橫目草蔓延生郭云一名結縷俗謂之鼔箏草是也􅁵蔓華釋曰􅁵一名蔓華郭云一名蒙華蔆蕨攗釋曰蔆一名蕨攗郭云蔆今水中芰者字林云楚人名䔖曰芰可食國語曰屈到嗜芰俗云蔆角是也大菊蘧麥釋曰大菊一名蘧麥藥草也郭云一名麥句薑即瞿麥廣雅云茈萎麥句薑蘧麥案本草云瞿麥一名巨句麥一名大菊一名大蘭陶注云今出近道一莖生細葉花紅紫赤可愛子頗似麥故名瞿麥葥山莓釋曰山莓一名葥郭云今之木莓也實似藨莓而大亦可食藨莓􅀃在下齧苦堇釋曰齧一名苦堇可食之菜也郭云今堇葵也葉似柳子如米汋食之滑者夲草唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色者内則云堇荁枌榆是也本草云味甘此云苦者古人語倒猶甘草謂之大苦也藫石衣釋曰藫一名石衣郭云水苔也一名石髮江東食之者案本草有陟􅁵別夲注云此即石髪也色􅀋似苔而麤澁爲異郭又云或曰藫葉似䪥而大生水㡳亦可食者即本草海藻一名藫陳藏器本草云大葉藻也生深海中及新羅葉如水藻而大海人取之正在深海㡳以繩繫􅆎咽没水下刈得旋繫繩上五月巳後當有大魚傷人不可取也蘜治蘠釋曰蘜一名治蘠郭云今之秋華菊案月令季秋云菊有黃華夲草云菊華一名節華陶注云菊有兩種一種莖紫氣香而味甘葉可作羹而食者爲眞一種莖靑而大作蒿艾氣味苦不堪食者名苦薏非眞也唐蒙女蘿女蘿莬絲釋曰一名茡一名麻母瓝九葉釋曰此草九葉叢生一莖然郭亦未詳其狀但舉其􅀋云今江東有草五葉共叢生一莖俗因名為五葉即此􅀋也藐茈草釋曰藐一名茈草根可以染紫之草廣雅一名茈䓞本草一名紫丹唐本注云苗似蘭香莖赤節青花紫白色而實白也蘵黄蒢釋曰蘵草一名黄蒢郭云蘵草葉似酸漿華小而白中心黃江東以作菹食藒車芞輿釋曰香草也一名藒車一名芞輿郭云藒車香草見離騷者離騷經云畦留夷與藒車兮雜杜衡與芳芷是也權黄華釋曰權一名黄華郭云今謂牛芸草為黄華華黄葉似苜蓿說文亦云芸草也似苜蓿淮南子說芸草可以死復生月令注云芸香草也雜禮圖曰芸蒿也葉似邪蒿香美可食然則牛芸者亦芸􅀋郭以時驗而言之故云今謂牛芸草為黄華也葞春草釋曰藥草也郭云一名芒草本草云者案本草莽草一名葞一名春草陶注云今處處皆有葉青辛烈者良今俗呼為崗草也郭云芒草者所見本異也蔠葵蘩露釋曰葵􅀋也一名終葵一名蘩露郭云承露也大莖小葉葉紫黃色菋荎藸釋曰藥草也一名菋一名荎藸郭云五味也蔓生子叢在莖頭案本草五味子一名會及一名􅀇及唐本注云五味皮肉甘酸核中辛苦都有鹹味此則五味具也其葉似杏而大蔓生木上子作房如落葵大如落葵蒤委葉釋曰􅁾草也舍人曰蒤一名委葉王肅說詩云荼陸􅁾然則蒤者原田蕪穢之草非苦菜也注詩云以茠蒤蓼釋曰此周頌良耜篇文也茠耘除也今詩本茠作薅音義同皇守田釋曰皇一名守田郭云似燕麥子如彫胡米可食生廢田中一名守氣彫胡即􅋎也鉤藈姑釋曰鉤一名藈姑郭云鉤􅕕也一名王􅀲實如瓝􅀲正赤味苦本草云王􅀲一名土􅀲陶注云即今土􅀲生籬院亦有子熟時赤如彈丸根大唐本注云此物蔓生葉似栝樓圓無叉缺子如枙子生青熟赤但無稜爾根似葛細而多糝是也望椉車釋曰望一名椉車郭云可以為索長丈餘攫烏階釋曰攫一名烏階郭云即烏杷也子連相著狀如杷齒可以染皁今俗謂之狼杷是也杜土鹵釋曰香草也一名杜一名土鹵郭云杜衡也似葵而香本草唐本注云杜衡葉似葵形如馬蹄故俗云馬蹄香生山之隂水澤下溼地根似細辛白前等山海經云天帝山有草其狀如葵其􅆨如􅐘蕪名曰杜衡可以走馬食之已癭是也盱虺牀釋曰盱一名虺牀郭云蛇牀也一名馬牀廣雅云案本草蛇牀一名蛇米一名虺牀一名思益一名繩毒一名􅀥􅁄一名牆蘼陶注云近道田野墟落間甚多花葉正似蘼蕪菟奚顆涷釋曰藥草也一名菟奚一名顆涷郭云􅅃涷也紫赤華生水中案夲草款涷一名槖吾一名顆東一名虎鬚一名莬奚陶注云形如宿蓴未舒者其腹裏有絲其花乃似大菊花唐本注云葉似葵而大叢生花出根下是也中馗菌小者菌釋曰此辨菌大小之異名也大者名中馗小者即名菌郭云地蕈也似蓋今江東人名爲土菌亦曰馗廚可啖之者􅀃文云蕈桑䓴也謂菌生木上也今云地蕈即俗呼地菌者是也苕陵苕黃華蔈白華茇釋曰苕一名陵苕本草一名陵時舎人曰苕陵苕也黃華名蔈白華名茇別華色之名也陸機䟽云一名䑕尾生下濕水中七八月中華紫似今紫草可染皁煑以沐髮即黒詩小雅云苕之華芸其黃矣鄭箋云陵苕之華紫赤而繁陸機亦言其華紫色而此云黃白者蓋就紫色之中有黃紫白紫爾及其將落則全變爲黃故詩云芸其黃矣毛傳云將落則黃是也蘪從水生釋曰草從水生者曰蘪故注云生於水中薇垂水釋曰草生於水濵而枝葉垂於水者曰薇故注云生於水邊也薜山麻釋曰麻生山中者名薜故注云似人家麻生山中也莽數節至篠箭釋曰此辨竹節希數及中空實萌篠之異名也凡竹節閒促數者名莽相去四寸有節者名桃枝竹其中堅實者名鄰其中空者名簢筡空也仲無注未詳䈚一名箭萌即筍也篠一名箭書曰篠簜既敷釋地云㑹稽之竹箭是也注今桃枝節閒相去多四寸釋曰郭以時驗而言也尚書顧命云敷重篾席孔安國云篾桃枝竹周禮春官司几筵云加次席黼純鄭注云次席桃枝席有次列成文是也注周禮曰䈚葅鴈􅊽釋曰天官醢人職文也彼文作箈鄭􅀇注云菭箭萌字雖異音義同芏夫王釋曰芏草一名夫王郭云芏草生海邊似筦藺今南方越人采以爲席藄月爾釋曰藄一名月爾可食之菜也郭云即紫藄也似蕨可食葴馬藍釋曰葴一名馬藍郭云今大葉冬藍也今爲澱者是也芐地黃釋曰藥草也郭云一名地髓江東人呼芐案本草地黃一名地髓一名芐一名芭陶注云生渭城者乃有子實實如小麥拔蘢葛釋曰拔一名蘢葛葛􅀋也郭云似葛蔓生有節江東呼爲龍尾亦謂之虎葛細葉赤莖藗牡茅釋曰茅之不實者也一名藗一名牡茅郭云白茅屬菤耳苓耳釋曰卷耳一名苓耳郭云廣雅云枲耳也亦云胡枲江東呼爲常枲或曰苓耳形似䑕耳叢生如盤詩周南云采采卷耳陸機䟽云葉靑白色似胡荽白華細莖蔓生可煑爲茹滑而少味四月中生子如婦人耳璫幽州人謂之爵耳是也蕨􅣀釋曰可食之菜也舎人曰蕨一名􅣀郭云廣雅云紫藄非也􅀄生無葉可食江西謂之􅣀詩召南云言采其蕨陸機䟽云蕨山菜也􅀄生似䔉莖紫黒色可食如葵是也蕎卬鉅釋曰蕎一名卬鉅郭云今藥草大㦸也夲草云者案本草大㦸一名卬鉅苗名釋漆陶注云今近道處處有生時摘葉有白汁故名澤􅃮也莣社榮釋曰莣草一名杜榮郭云今莣草似茅皮可以爲繩索履屩也者屩草履也稂童粱釋曰舎人曰稂一名童粱郭云稂莠􅀋也詩曹風云浸彼苞稂陸機䟽云禾秀爲穗而不成崱嶷然謂之童粱今人謂之宿田翁或謂之守田也大田云不稂不莠外傳曰馬不過粮莠皆是也藨麃釋曰藨一名麃郭云麃即莓也今江東人呼爲藨莓子似覆葐而大赤酢甜可啖的薂釋曰的又一名薂即上釋荷云其實蓮其中的也故郭云即蓮實購蔏蔞釋曰舎人曰購一名蔏蔞郭云蔏婁蔞蒿也生下田􅀄出可啖江東用羹魚詩周南漢廣云翹翹錯薪言刈其蔞陸機䟽云其葉似艾白色長數寸髙丈餘好生水邊及澤中正月根牙生旁莖正白生食之香而脃美其葉又可蒸爲茹是也茢勃茢釋曰茢一名勃茢郭云一名石芸本草云者案夲草石芸味甘一名螫烈一名顧喙是也葽繞棘蒬釋曰藥草也葽繞一名􅁄蒬郭云今逺䓌也似麻黃赤華葉銳而黃其上謂之小草廣雅云者案本草逺䓌一名細草其葉名小草陶注云小草狀似麻黃而靑今注云逺䓌莖葉似大靑而小廣雅云􅁄蒬逺䓌也其上謂之小草是也茦刺釋曰謂草針刺人也一名茦又名刺郭云草刺針也􅀜西謂之刺燕北朝鮮之閒曰茦見方言者案方言凡草木刺人北燕朝鮮之間謂之茦或謂之壯自􅀜而東或謂之梗或謂之劌自􅀜而西謂之刺江湘之間謂之棘是也蕭萩釋曰李巡云萩一名蕭陸機云今人所謂萩蒿者是也或云牛尾蒿似白蒿白葉莖麤科生多者數十莖可作燭有香氣故祭祀以脂爇之爲香許愼以爲艾蒿非也郊特牲云旣奠然後爇蕭合馨香是也􅙛海薻釋曰􅙛又名海薻郭云藥草也一名海蘿如亂髪生海中本草云者案本草一名落首一名􅙛陶注云生海島上黒色如亂髮而大少許葉大都似藻葉長楚銚芅釋曰舎人曰長楚一名銚芅夲草云銚芅名羊桃郭云今羊桃也或曰􅀑桃葉似桃華白子如小麥亦似桃詩檜風隰有萇楚陸機䟽云今羊桃是也葉長而狹華紫赤色其枝莖弱過一尺引蔓于草上今人以爲汲灌重而善没不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管蘦大苦釋曰藥草也蘦一名大苦郭云今甘草也蔓延生葉似荷靑黃莖赤有節節有枝相當或云蘦似地黃詩唐風云采苓采苓首陽之巓是也蘦與苓字雖異音義同芣苢馬舄馬舄車前釋曰藥草也别三名郭云今車前草大葉長穗好生道邊江東呼爲蝦蟆衣詩周南云采采芣苢陸機䟽云馬舄一名車前一名當道喜在牛跡中生故曰車前當道也今藥中車前子是也幽州人謂之牛舌草可鬻作茹大滑其子治婦人難産王肅引周書王會云芣苢如李出於西戎王基駮云王㑹所記雜物竒獸皆四夷逺國各齎土地異物以爲貢䞇非周南婦人所得采是芣苢爲馬舄之草非西戎之木也綸似綸至華山有之釋曰此辨草似綸組布帛者以其所似因名其草也綸是糾青絲繩也組綬也東海有草采理似之即名綸草組草華山有草葉似帛布者因名帛草布草也注綸今有秩嗇夫所帶糾靑絲綸釋曰案漢書百官公卿大夫表云十里一亭十亭一郷郷有三老有秩嗇夫有游徼三老掌教化嗇夫掌獄訟游徼掌禁盗賊故漢書云張敞以郷有秩補大守卒史又云朱邑爲桐郷嗇夫又續漢書百官表云郷置有秩三老游徼有秩郡所置秩百戸其郷小者縣所署嗇夫案此則有秩嗇夫職同但隨郷大小故名異耳名雖異皆糾靑絲爲綸以帶佩之則同至東晉尚然故郭云今也張華云綸如宛轉繩緜馬羊齒釋曰緜馬一名羊繭郭云草細葉葉羅生而毛有似羊齒今江東人呼爲鴈齒繅者以取繭緒􅀃文云繅繹繭爲絲也緒絲耑也以此草似羊齒而毛故繅者用之以取繭緒也萿麋舌釋曰萿草春生葉似麋舌故萿一名麋舌郭云今麋舌草春生葉有似於舌蘩之醜秋爲蒿釋曰醜􅀋也此言蘩蕭蔚莪之􅀋春始生氣味旣異故其名不同至秋老成則皆蒿也郭云醜􅀋也春時多有種名至秋老成皆通呼爲蒿也芺薊其實荂釋曰鈎芺枹薊之􅀋其實名荂郭云芺與薊莖頭皆有蓊臺名荂荂即其實也蔈荂荼猋藨芀釋曰此辨苕荼之别名也案鄭注周禮掌荼及詩有女如荼皆云荼茅秀也蔈也荂也其别名荼即苕也苕又一名猋又名藨皆萑茅之屬華秀名也故注云皆苕荼之别名方俗異語所未聞言未聞者謂未聞其所出也葦醜芀釋曰葦即蘆之成者其􅀋皆有芀秀也葭華至其萌虇釋曰此辨蒹葭等生成之異名也葭一名華即今蘆也葦之未成者蒹一名薕郭云似萑而細髙數尺江東呼爲薕藡詩秦風云蒹葭蒼蒼陸機云蒹水草也堅實牛食令牛肥彊靑徐人謂之薕兖州遼東通語也葭一名蘆菼一名薍李巡曰分別葦􅀋之異名郭云蘆葦也菼似葦而小實中江東呼爲烏蓲如李巡云蘆薍共爲一草如郭云則蘆薍別草案詩大車傳云菼鵻也蘆之􅀄生則毛意亦以葭菼爲一草也案詩衞風碩人云葭菼揭揭陸機云薍或謂之荻至秋堅成則謂之萑其􅀄生三月中其心挺出其下本大如箸上銳而細楊州人謂之馬尾以今語驗之則蘆薍別草也其萌名虇郭云今江東人呼蘆笋爲虇然則萑葦之􅀋其􅀄生者皆名虇注音繾綣釋曰大雅民勞云以謹繾綣昭二十五年左傳云缱綣從公無通外内此取虇與綣字音同不爲義也蕍芛葟華榮釋曰此別草木榮華之異名也蕍言華之敷貌芛華􅀄生之名也葟亦華也郭云釋言云華皇也今俗呼草木華􅀄生者爲芛蕍猶敷蕍亦華之貌所未聞云未聞者亦未聞所出也注音􅷱豬釋曰釋獸云䝐豶郭云俗呼小豶豬爲䝐子此亦取芛與䝐音同其義則異也卷施草拔心不死釋曰卷施草一名宿莽抜其心亦不死也注宿莽也離騷云釋曰離騷經云朝搴阰之木蘭兮夕􅒆洲之宿莽王逸云草冬生不死者楚人名之曰宿莽荺茭釋曰荺一名茭謂草根可食者也亦笋􅀋也非一種故郭氏舉􅀋以曉人云今江東呼藕紹緒如指空中可啖者爲茭茭即此􅀋是也荄根釋曰凡草根一名荄郭云別二名俗呼韭根爲荄此舉一隅也華荂也至謂之英釋曰李巡云分別異名以曉人也華一名荂郭云今江東呼華爲荂華與荂又一名榮郭云轉相解木則名華月令季春桐始華草則名榮月令仲夏木槿榮此對文爾散文則草亦名華鄭風云隰有荷華是也不見其榮但見其實者曰秀詩大雅云實發實秀徒有其榮而不實者曰英此亦對文爾故以英爲不實其實黍稷皆先榮後實詩小雅出車云黍稷方華是嘉榖之秀必有榮也爾雅䟽卷第八
