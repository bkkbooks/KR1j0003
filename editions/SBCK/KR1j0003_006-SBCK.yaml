  text: 爾雅䟽卷第六
  hash: sha256:219e32f8c80743dff71a71007dfe4c33ae0560e365ee166af65d9eb2b47a3f39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_006-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋天第八釋曰河圖括地象云易有太極是生兩儀兩儀未分其氣混沌淸濁旣分伏者爲天偃者爲地釋名云天顯也在上髙顯又云天坦也坦然髙逺􅀃文云天顚也至髙無上從一大也春秋􅀃題辭云天之言鎭也居髙理下爲人經紀故其字一大以鎭之此天之名義也天之爲體中包乎地日月星辰屬焉然天地有髙下之形四時有􅂛降之理日月有運行之度星辰有次舎之常旣曰釋天不得不略言其趣故其形狀之殊凡有六等一曰蓋天文見周髀如蓋在上二曰渾天形如彈丸地在其中天包其处猶如雞􅆑白之繞黄揚雄桓譚張衡蔡邕陸績王肅鄭玄之徒並所依用三曰宣夜舊􅀃云殷代之制其形體事義無所出以言之四曰昕天昕讀爲軒言天北髙南下若車之軒是吳時姚信所􅀃五曰穹天云穹隆在上虞氏所􅀃不知其名也六曰安天是晉時虞喜所論案鄭注考靈耀云天者純陽淸明無形聖人則之制璿璣玉衡以度其象如鄭此言則天是太虚本無形體但􅃌諸星運轉以爲天耳但諸星之轉從東而西必三百六十五日四分日之一星復舊處星旣左轉日則右行亦三百六十五日四今日之一至舊星之處即以一日之行而爲一度計二十八宿一周天凡三百六十五度四分度之一是天之一周之數也天如彈丸圍圜三一日六十五度四分度之一案考靈耀云一度二千九百三十二里千四百六十一分里之三百四十八周天百十萬一千里者是天圎周之里數也以圍三徑一言之則直徑三十五萬七千里此爲二十八宿周迴直徑之數也然二十八宿之外上下東西各有萬五千里是爲四遊之極謂之四表據四表之内并星宿內揔有三十八萬七千里然則天之中央上下正半之處則一十九萬三千五百里地在於中是地去天之數也鄭注考靈耀云地蓋厚三萬里春分之時地正當中自此地漸漸而下至夏至之時地下萬五千里地之上畔與天中平夏至之後地漸漸向上至秋分地正當天之中央自此地漸漸而上至冬至上遊萬五千里地之下畔與天中平自冬至後地漸漸而下此是地之􅂛降於三萬里之中但渾天之體雖繞於地地則中央正平天則北髙南下北極髙於地三十六度南極下於地三十六度然則北極之下三十六度常見不没南極之上三十六度常没不見南極去北極一百二十一度餘􅀂逐曲計之則一百八十一度餘􅀂以南北中半言之謂之赤道去南極九十一度餘去北極亦九十一度餘此是春秋分之日道赤道之北二十四度爲夏至之日道去北極六十七度也赤道之南二十四度爲冬至之日道去南極亦六十七度地有􅂛降星辰有四遊又鄭注考靈耀云天旁日四表之中冬南夏北春西秋東皆薄四表而止地亦􅂛降於天之中冬至而下夏至而上二至上下蓋極地厚也地與星辰俱有四遊􅂛降四遊者自立春地與星辰西遊春分西遊之極地雖西極􅂛降正中從此漸漸而東至春末復正自立夏之後北遊夏至北遊之極地則􅂛降極下至夏季復正立秋之後東遊秋分東遊之極地則􅂛降正中至秋季復正立冬之後南遊冬至南遊之極地則􅂛降極上冬季復正此是地及星辰四遊之義也星辰亦隨地􅂛降故鄭注考靈耀云夏日道上與四表平下去東升十二度爲三萬里則是夏至之日上極萬五千里星辰下極萬五千里故夏至之日下至東井三萬里也日有九道故者靈耀云萬丗不失九道謀鄭注引河圖帝覽嬉云黃道一靑道二出黃道東赤道二出黃道南白道二出黃道西黒道二出黃道北日春東從靑道夏南從赤道秋西從白道冬北從黒道立春星辰西遊日則東遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏則星辰北遊日則南遊夏至星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬放此可知計夏至之日日在井星當嵩髙之上以其南遊之極故在嵩髙之南萬五千里所以夏至有尺五寸之景也於時日又上極星辰下極故日下去東井三萬里也然鄭四遊之說元出周髀之文但二十八㝛從東而左行日從西而右行一度逆㳂二十八宿案漢書律歷志云冬至之時日在牽牛初度春分之時日在婁四度夏至之時日在東井三十一度秋分之時日在角十度􅀂日在東井則極長八尺之表尺五寸之景􅀂春分在婁秋分在角晝夜等八尺之表七尺五寸之景冬至日在斗則晝極短八尺之表一丈三尺之景一丈三尺之中去其一尺五寸則餘有一丈一尺五寸之景是冬夏往來之景也凡於地千里而差一寸則夏至去冬至體漸南漸下相去十一萬五千里又考靈耀云正月假上八萬里假下一十萬四千里所以有假上假下者鄭注考靈耀之意以天去地十九萬三千五百里正月雨水之時日在上假於天八萬里下至地一十一萬三千五百里夏至之時日上極與天表平也後日漸向下故鄭注考靈耀云夏至日與表平冬至之時日下至於地八萬里上至於天十一萬三千五百里也委曲具考靈耀注凡二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度計一年三百六十五周天四分度之一日月五星則右行日一日一度月一日一十三度十九分度之七此相通之數也今歷象之􅀃則月一日至於四日行最疾日行十四度餘自五日至八日行次疾日行十三度餘自九日至十九日行則遟日行十二度餘自二十日至二十三日又小疾日行十三度餘自二十四日至於晦行又最疾日行一十四度餘此是月行之大率也二十七日月行一周天至二十九日彊半月又於日與日相㑹乃爲一月故考靈耀云九百四十分爲一日二十九日與四百九十九分爲月是一月二十九日之外至第三十日分至四百九十九分月及於日計九百四十分則四百七十爲半今四百九十九分是過半二十九分也但月是隂精日爲陽精故周髀云日猶火月猶水火則外光水則含景故月光生於日所照魄生於日所蔽當日則光盈就日則明盡京房云月與星辰隂者也有形無光日照之乃有光先師以爲日似彈丸月似鏡體或以爲月亦似彈丸日照處則明不照處則闇案律歷志云二十八宿之度角一十二度亢九氐十五房五心五尾十八箕十一東方七十五度斗二十六牛八女十二虚十危十七營室十六辟九北方九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西方八十度井三十二􅀑四柳十五星七張十八翼十八軫十七南方一百一十二度丑爲星紀初斗十二度終婺女七度子爲玄枵初婺女八度終於危十五度亥爲娵觜初危十六度終於奎四度戍爲降婁初奎五度終於胃六度酉爲大梁初胃七度終於畢十一度申爲實沈初畢十二度終於井十五度未爲鶉首初井十六度終於栁八度午爲鶉火初柳九度終於張十七度巳爲鶉尾初張十八度終於軫十一度辰爲壽星初軫十二度終於氐四度卯爲大火初氐五度終於尾九度寅爲析木初尾十度終於斗十一度五星者東方歲星南方熒惑西方太白北方辰星中央鎭星其行之遟速俱在律歷志不更煩􅀃元命包云日之爲言實也月闕也劉熈釋名云日實也光明盛實月闕也滿則缺也􅀃題辭云星陽精之榮也陽精爲日日分爲星故其字日下生也釋名云星散也布散於天又云隂䕃也氣在内奥䕃也陽揚也陽氣在外發揚此等是隂陽日月之名也祭法黃帝正名百物其名蓋黃帝而有也或後人更有増足其天髙地下日盈月闕觜星度少井斗度多日月右行星辰左轉四遊􅂛降之差二儀運動之法非由人事所作皆是造化自然先儒因其自然遂以人事爲義或據理是實或搆虚不經旣無正文可馮今皆略而不録穹蒼至上天釋曰此釋四時之天名也云穹蒼蒼天也者詩大雅桑柔云靡有旅力以念穹蒼故此釋之也詩人因天形穹隆其色蒼蒼故云穹蒼其實則與下云春爲蒼天者是一故云穹蒼蒼天也郭云天形穹隆其色蒼蒼因名云也云春爲蒼天者詩王風黍離云悠悠蒼天故此釋之也郭云萬物蒼蒼然生者言春時萬物蒼蒼然生春時天名曰蒼天也云夏爲昊天者詩雨無正云浩浩昊天故此釋之昊者元氣博大之貌郭云言氣晧旰者晧旰日光出之貌也言畏日光明晧旰因名云昊天也云秋爲旻天者詩大雅召旻云旻天疾威之􅀋旻愍也言秋氣肅殺萬物可愍故曰旻天郭云旻猶愍也愍萬物彫落者旻愍詩序文但彼愍作閔音義同也云冬爲上天者詩小雅信南山云上天同雲之􅀋言冬時無事唯在於上故曰上天郭云言時無事在上臨下而巳者言冬氣閉藏無他生殺之事唯在於上監於下而巳也案詩傳云蒼天以體言之尊而君之則稱皇天元氣廣大則稱昊天仁覆閔下則稱旻天自上降監則稱上天據逺視之蒼蒼然則稱蒼天毛公此傳當有成文不知出何書李巡云古詩人質仰視天形穹隆而髙其色蒼蒼故曰穹蒼是蒼天以體言之也皇君也故尊而君之則稱皇天昊大貌故言其混元之氣昊昊廣大則稱昊天旻閔也言其以仁慈之恩覆閔在下則稱旻天從上而下視萬物則稱上天據人逺而視之其色蒼蒼然則稱蒼天又李巡注此云春萬物始生其色蒼蒼故曰蒼天夏萬物盛壯其氣昊大故曰昊天秋萬物成熟皆有文章故曰旻天冬隂氣在上萬物伏藏故曰上天案此以四時異其天名詩傳則各用所冝爲稱似相乖異而鄭玄則和合二􅀃故異義天號今尚書歐陽􅀃春曰昊天夏曰蒼天秋曰旻天冬曰上天爾雅亦云古尚書與毛詩同謹案尚書堯典羲和以昊天揔勑以四時故知昊天不獨春也左傳夏四月孔丘卒稱曰旻天不弔非秋也玄之聞也爾雅者孔子門人所作以釋六藝之言蓋不誤也春氣博施故以廣大言之夏氣髙明故以逺人言之秋氣或生或殺故以閔下言之冬氣閉藏而淸察故以監下言之皇天者至尊之號也六藝之中諸稱天者以情所求之耳非必於其時稱之浩浩昊天求天之博施蒼天蒼天求天之髙明旻天不弔求天之生殺當得其冝上天同雲求天之所爲當順其時也此之求天猶人之􅀃事各從其主耳􅀂察於是則堯命羲和欽􅀂昊天孔丘卒旻天不弔無可怪耳是鄭和合二􅀃之事也爾雅春爲蒼天夏爲昊天歐陽􅀃春爲昊天夏爲蒼天鄭旣言爾雅不誤當從爾雅而又從歐陽之􅀃以春昊夏蒼者鄭讀爾雅與孫郭本異故許愼旣載今尚書􅀃即言爾雅亦云明見爾雅與歐陽􅀃同雖蒼昊有春夏之殊則未知孰是要二􅀃理相符合故鄭和而釋之四時釋曰此題上事也言上所陳是四時天之名也題之在下者若周公踐阼及詩篇章句皆篇末題之故此亦爾白虎通云歳時者何謂春秋冬夏也時者期也隂陽消息之期也郷飲酒義云春之爲言蠢也産萬物者聖也夏之爲言假也養之長之假之仁也秋之爲言揫也揫之以時察守義者也冬之爲言中也中者藏也春爲至醴泉釋曰此釋太平之時四氣和暢以致嘉祥之事也云春爲靑陽者言春之氣和則靑而温陽也云夏爲朱明者言夏之氣和則赤而光明也云秋爲白藏者言秋之氣和則色白而收藏也云冬爲玄英者言冬之氣和則黒而淸英也云四氣和謂之玉燭注云道光照者道言也言四時和氣温潤明照故曰玉燭李廵云人君德美如玉而明􅀂燭聘義云君子比德於玉焉是知人君􅀂德輝動於内則和氣應於外統而言之謂之玉燭也云春爲發生夏爲長嬴秋爲收成冬爲安寧者此亦四時之别號也云四時和爲通正者言上四時之功和是爲通暢平正也云謂之景風者言所以致景風景風即祥風也云甘雨時降萬物以嘉者嘉善也甘雨即時雨也不爲萬物所苦故曰甘若月令苦雨數來則非甘也甘雨旣以時降則萬物莫不嘉善之也云謂之醴泉者言四時平暢亦所以使地出醴泉也醴泉者水泉味甘如醴也云祥者亦題上事也祥吉也善也言此上皆太平之􅁻祥也注此亦至祥風釋曰云此亦四時之别號者言與上靑陽等同爲四時别號故云亦也上據氣而言此據功爲􅀃云尸子皆以爲太平祥風者案尸子仁意篇述太平之事云燭於玉燭飲於醴泉暢於永風春爲靑陽夏爲朱明秋爲白藏冬爲􅀇英四氣和爲正光此之謂玉燭其雨時降萬物以嘉髙者不少下者不多此之謂醴泉其風春爲發生夏爲長嬴秋爲方盛冬爲安靜四氣和爲通正此之謂永風是也注所以出醴泉釋曰案援神契云德及於天斗極明日月光甘露降德至深泉則黃龍見醴泉湧是言王者脩德以召和平則致景風醴泉也案此經所釋即謂發生等爲景風時雨爲醴泉而郭云所以致景風醴泉者所以弘通其義也榖不至爲荐釋曰此釋歳㐫災荒之名也榖謂五榖黍稷麻麥豆也熟成也五榖不成曰饑郭云凡草菜可食者通名􅂼李巡曰可食之菜皆不熟爲饉周禮天官大宰職云以九職任萬民八曰臣妾聚斂䟽材作噩壬戍之歳曰玄􅘬閹茂癸亥之歳曰昭陽大淵獻甲子之歳曰閼逢困敦乙丑之歳曰旃蒙赤􅁬若以此推之周而復始可知載歳也至曰載釋曰别年歳之名也載即歳也白虎通云王者受命而改正朔者明易姓示不相襲也明受之於天不受之於人所以變易民心革其耳目以則化也然則歳名變易理亦同此故夏曰歳取歳星行一次夏書曰每歳孟春遒人以木鐸徇于路是也商曰祀取四時一終則以祀者嗣也取其興來繼往之義孫炎曰取四時祭祀一訖商書曰惟元祀十有二月乙丑伊尹祠于先王是也周曰年者取禾一熟也案􅀃文云秊榖熟也從禾千聲春秋曰大有年然則年者禾熟之名每􅀊一熟故以爲歳名左傳曰􅁲年七百是也唐虞曰載載始也取物終更始堯典曰朕在位七十載舜典曰五載一廵守是也注取歳星行一次釋曰案律歷志分二十八宿爲十二次晉灼注天文志云大歳在四仲則歳行三宿太歳在四孟四季則歳行二宿二八十六三四十二而行二十八宿十二歳而周天是歳星年行一次也月在甲至月名釋曰此辨以日配月之名也設若正月得甲則曰畢陬二月得乙則曰橘始三月得丙則曰脩寎四月得丁則曰圉余五月得戊則曰厲皐六月得己則曰則且七月得庚則曰窒相八月得辛則曰塞壯九月得壬則曰終􅀇十月得癸則曰極陽十一月得甲則曰畢辜十二月得乙則曰橘涂周而復始亦可知也若史記歷書云月名畢聚也注離騷至孟陬之釋曰離騷者屈原之所作也屈原與楚同姓仕懷王爲三閭大夫爲大夫靳尚所譛毀見踈乃作離騷經離别也騷愁也言己放逐離別心中愁思猶陳正道以諷諫君也其經曰髙陽之苗裔􅀆朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降彼注云言己生得隂陽之正中是引之以證正月爲陬之義注國語至是也釋曰此越語文也案彼云越王將伐吴范蠡諫曰王姑待之至於􅀇月王召范蠡而問焉彼注云魯哀公十六年九月也至十七年三月越伐吴是也引之以證九月爲􅀇也注純隂至名云釋曰云純隂用事嫌於無陽故以名云者以易言之五月一隂生十月純坤用事故云純隂用事也云嫌者君子愛陽而惡隂故以陽名之無陽而得陽名者以分隂分陽迭用柔剛十二月之消息見其用事耳其實隂陽常有詩緯曰陽生酉仲隂生戌仲是十月中兼有隂陽也四月秀葽靡草死豈無隂乎明隂陽常兼有也詩小雅云日月陽止是也注皆月至不論釋曰言正月爲陬巳下皆月之别名云自歲陽至此者謂自閼逢以下也云其事義皆所未詳通者案李廵孫炎雖各有其􅀃皆搆虚不經疑事無質故闕而不論南風至風雨釋曰此釋風雨之名也易曰風以動之雨以潤之又曰潤之以風雨洪範曰月之從星則以風雨然則風雨相將之物故此􅀋聚而釋之也南風謂之凱風者李巡曰南風長養萬物萬物喜樂故曰凱風凱樂也郭氏無􅀃義或當然詩邶風云凱風自南是也東風謂之谷風者孫炎曰谷之言榖榖生也谷風者生長之風也詩邶風云習習谷風是也北風謂之涼風者北風一名涼風言北方寒涼之風也月令孟秋之月涼風至詩邶風云北風其涼是也西風謂之泰風者孫炎曰西風成物物豐泰也詩大雅桑柔云泰風有隧是也焚輪謂之頽者李巡曰焚輪暴風從上來降謂之頽頽下也孫炎曰迴風從上下曰頽郭云暴風從上下與李同也詩小雅云習習谷風維風及頽是也扶揺謂之猋者李巡曰扶摇暴風從下􅂛上故曰猋猋上也孫炎曰迴風從下上曰猋郭云暴風從下上亦用李􅀃莊子􅀃鵬云摶扶揺而上者九萬里月令孟春行秋令則猋風暴雨揔至是也風與火爲庉者郭云庉庉熾盛之貌言風自火出火因風熾火而有大風者爲庉迴風爲飄者郭云旋風也李巡曰一曰飄風别二名也詩蓼我云飄風發發是也一曰出而風爲暴者孫炎曰隂雲不興而大風暴起然則爲風之暴疾故詩邶風云終風且暴毛傳云暴疾也風而雨土爲霾者孫炎曰大風揚塵土從上下也詩邶風云終風且霾是也隂而風爲曀者孫炎曰雲風曀日光詩邶風云終風且曀是也天氣下地不應曰雺者郭云言蒙昧洪範云曰雺鄭注云雺聲近蒙詩云零雨其濛則雺是天氣下降地氣不應而蒙闇也地氣發天不應曰霧霧謂之晦者郭云言晦􅁳月令仲冬行夏令氛霧􅁳􅁳鄭云霜露之氣散相亂也然則地氣發而上天不應之則爲氛霧霧又名晦春秋僖十五年己卯晦震夷伯之廟公羊榖梁皆云晦􅁳也是矣螮蝀謂之雩螮蝀虹也者郭云俗名美人虹江東呼雩然則螮蝀一名雩一名虹詩鄘風云蝃蝀在東月令季春之月虹始見音義云虹􅀟出色鮮盛者爲雄雄曰虹闇者爲雌雌曰蜺虹是隂陽交㑹之氣純隂純陽則虹不見若雲薄漏日日照雨滴則虹生螮與蝃音義同蜺爲挈貳者蜺雌虹也一名挈貳􅀃文云霓屈虹青赤或白色隂氣也郭云見離騷者即天問云白蜺嬰茀胡爲此堂及逺遊章云雌蜺㛹嬛以曽橈􅀆是也挈貳其别名也文見尸子弇曰爲蔽雲者郭云即暈氣五彩覆日也然則暈氣弇曰名蔽雲周禮春官眡祲掌十煇之法鄭司農云煇謂日光炁是也疾雷爲霆霓者郭云雷之急擊者謂霹靂案􅀃文云霆雷餘聲也鈴鈴所以挺出萬物也又云震劈歷振物者然則疾雷一名霆霓又名震春秋震夷伯之廟謂劈歷破之是也霹靂俗字也雨䨘爲霄雪者䨘水雪雜下也因名霄雪霄即消也詩小雅頗弁如彼雨雪先集維霰鄭箋云將大雨雪始必微温雪自上下遇温氣而摶謂之霰案大戴禮曽子云陽之專氣爲霰隂之専氣爲雹盛陽之氣在雨水則温暖爲隂氣薄而脅之不相入則摶爲雹也盛隂之氣在雨水則凝滯而爲雪陽氣薄而脅之不相入則消散而下因水而爲霰是霰由陽氣所薄而爲之故鄭言遇温氣而摶也䨘與霰音義同暴雨謂之涷者暴雨謂驟雨也一名凍郭云今江東呼夏月暴雨爲凍雨離騷云令飄風􅀆先驅使凍雨兮灑塵是也者此離騷九􅁔大司命文案彼云廣開兮天門紛吾乗􅀆玄雲令飄風兮先驅使凍雨􅀆灑塵是也小雨謂之霡霂者小雨一名霡霂小雅信南山云益之以霡霂是也李巡云水雪俱下案此文上有暴雨下云乆雨於中間無雪事而云水雪俱下妄矣乆雨謂之淫者淫過也久雨過多害於五稼故謂之淫月令季春行秋令則天多沈隂淫雨早降謂乆雨也注云左傳曰天作淫雨者荘十一年傳文也淫謂之霖者􅁋雨又名霖也郭云雨自三日巳上爲霖者隱九年左傳文也濟謂之霽者濟止也雨止名霽郭云今南陽人呼雨止爲霽書云曰霽云風雨者題上事也壽星至星名釋曰此別星名也案周禮保章氏以星土辨九州之地所封封域皆分星以觀妖祥鄭􅀇注云大界則曰九州州中諸國之封域於星亦有分焉其書亡矣堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吴越也􅀇枵齊也娵訾衞也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也又漢書律歷志東方角亢氐房心尾箕北方斗牛女虚危室壁西方奎婁胃卯畢觜參南方井􅀑柳星張翼軫宿凡二十八此經所釋次惟有九宿惟十七者以爾雅之作釋六蓺所載者所不載者則闕焉壽星角亢也者言夀星之次值角亢之宿也郭云數起角亢列宿之長故曰壽天文志云東宫倉龍左角理右角將大角者天王帝坐廷亢主宗廟是也天根氐也者氐一名天根郭云角亢下繫於氐若木之有根國語曰天根見而水涸是也天駟房也者房一名天駟也郭云龍爲天馬故房四星謂之天駟天文志曰房爲天府曰天駟國語曰月在天駟是也大辰房心尾也者大辰房心尾之揔名也辰時也郭云龍星明者以爲時􅃸故曰大辰春秋昭十七年冬有星孛於大辰是也大火謂之大辰者大火大辰之次名也李巡云大火倉龍宿心以候四時郭云大火心也在中最明故時候主焉左傳曰心爲大火是也析木謂之津箕斗之間漢津也者析木之津者箕斗之次名也孫炎曰析别水木以箕斗之間是天漢之津也劉􅋑謂是天漢即天河也天河在箕斗二星之閒箕在東方木位斗在北方水位分析水木以箕星爲隔隔河須津梁以渡故謂此次爲析木之津也不言析水而言析木者此次自南而盡此故依此次而名析木也郭云箕龍尾斗南斗天漢之津梁以四方皆有七宿各成一形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成􅀛形皆西首而東尾箕在蒼龍之末故云龍尾斗至南方即見故云南斗昭八年左傳曰今在析木之津國語曰日在析木之津皆是也案經典但有析木之津無析木謂之津今定本有謂字因注云即漢津也誤矣星紀斗牽牛也者星紀斗牛之次也郭云牽牛斗者日月五星之所終始故謂之星紀左傳曰歳在星紀是也􅀇枵虚也者􅀇枵虚之次名也郭云虚在正北北方色黒枵之言秏秏亦虚意然則以其色黒而虚秏故名其次曰􅀇枵案襄二十八年左傳云春無冰梓愼曰今兹宋鄭其饑乎歳在星紀而淫於􅀇枵以有時菑隂不堪陽蛇乗龍龍宋鄭之星也宋鄭必饑􅀇枵虚中也枵乎於是歳在降婁降婁中而旦禆竈􅃌之曰猶可以終歳歳不及此次也巳及其亡也歳在娵訾之口其明年乃及降婁是也大梁昴也西陸昴也者大梁昴之次名也昴西方之宿名也昴又謂之西陸昭四年左傳云古者日在北陸而藏冰西陸朝覿而出之又十一年傳云歳及大梁蔡復楚凶是昴星之名凡三郭云昴西方之宿別名旄頭者天文志云昴曰旄頭胡星也是矣濁謂之畢者畢西方之宿名一名濁郭云掩兔之畢或呼爲濁因星形以名詩小雅云有捄天畢毛傳云捄畢貌畢所以掩兔也特牲饋食禮曰宗人執畢鄭注云畢狀如叉蓋爲其似畢星取名焉然則掩兔祭器之畢俱象畢星爲之但掩兔之畢施網爲異爾咮謂之柳柳鶉火也者柳南方之宿名南方七宿共爲朱鳥之形柳爲朱鳥之口故名咮咮即朱鳥之口也鶉火柳之次名也鶉即朱鳥也火屬南方行也因名其次爲鶉火襄九年左傳曰晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出内火是故咮爲鶉火心爲大火是也北極謂之北辰者極中也辰時也居天之中人望之在北因名北極斗杓所建以正四時故云北辰論語云爲政以德譬如北辰是也何鼔謂之牽牛者李巡云何鼓牽牛皆二十八宿名也孫炎曰何鼓之旗十二星在牽牛北也或名爲何鼓亦名牽牛如此文則牽牛何鼓一星也如李廵孫炎之意則二星今不知其同異也案漢書天文志牽牛爲犧牲其北河鼓河鼓大星上將左右左右將亦以牽牛河鼓爲二星郭云今荆楚人呼牽牛星爲擔鼓擔者荷也順經爲􅀃以時驗而言也明星謂之启明者孫炎曰明星太白也出東方髙三舎今曰明星昬出西方髙三舎今曰太白郭云太白星也晨見東方爲启明昬見西方爲太白然則启明是太白矣詩小雅云東有啓明西有長庚長庚不知是何星也或以星出在東西而異名或二者別星未能審也彗星爲欃槍者彗星一各欃槍漢書天文志云歳星贏而東南石氏見彗星甘氏不出三月迺生彗本􅀋星末􅀋彗長二丈贏東北石氏見覺星甘氏不出三月迺生天棓本􅀋星末銳長四尺縮西南石氏見欃雲如牛甘氏不出三月迺生天欃左右銳長數丈縮西北石氏見槍雲如馬甘氏不出三月迺生天欃本􅀋星末銳長數丈石氏欃槍棓彗異狀其殃一也郭云亦謂之孛言其形孛孛似埽彗春秋左氏傳昭十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也公羊傳曰孛者何彗星也彗謂帚也言其狀似埽帚光芒孛孛然妖變之星非常所有故言孛又言彗也奔星爲彴約者奔星即流星也一名彴約星名題上事也春祭至祭名釋曰此別四時及三代諸祭名也春祭曰祠夏祭曰礿秋祭曰甞冬祭曰蒸者此四時之祭名也郭云祠之言食礿新菜可汋甞甞新榖蒸進品物也此皆周禮也自殷以上則礿禘蒸甞王制文是也至周公則去夏禘之名以春禴當之更名春曰祠故禘祫志云王制記先王之法度宗廟之祭春曰禴夏曰禘秋曰甞冬曰蒸祫爲大祭於夏於秋於冬周公制禮乃改夏爲禴禘又爲大祭祭義注云周以禘爲殷祭更名春曰祠是祠禴甞蒸之名周公制禮之所改也者然詩小雅云禴祠蒸甞于公先王此文王之詩所以巳得有制禮所改之名者然王者因革與丗而遷事雖制禮大定要亦所改有漸易曰不如西鄰之禴祭鄭注爲夏祭之名則文王時巳改言周公者據制禮大定言之耳祭天燔柴者祭天名燔柴祭法云燔柴於泰壇祭天也郭云旣祭積薪燒之大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師鄭注云禋之言煙周人尚臭煙氣之臭聞者槱積也詩曰芃芃棫樸薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而􅂛煙所以報陽也然則祭天之禮積柴以實牲體玉帛而燔之使煙氣之臭上逹於天因名祭天曰燔柴也祭地曰瘞薶者祭地名瘞薶祭法云瘞埋於泰折祭地也然則祭神州地祇於北郊瘞繒埋牲因名祭地曰瘞薶李巡曰祭地以玉埋地中曰瘞埋孫炎曰瘞者翳也旣祭翳藏地中祭山曰庪縣者庪縣祭山之名也庪謂埋藏之大宗伯云以貍沈祭山林川澤鄭注云祭山林曰貍是也縣謂縣其牲幣於山林中因名祭山曰庪縣郭云或庪或縣置之於山是也又云山海經曰縣以吉玉是也者案中山經云歷兒冢也其祠祀毛太牢之具縣以吉玉彼注云縣祭山之名是也祭川曰浮沈者浮沈祭川之名也郭云投祭水中或浮或沈大宗伯云以貍沈祭山林川澤鄭注云祭川澤曰沈順其性之含藏是也祭星曰布者李巡曰祭星者以祭布露地故曰布孫炎曰旣祭布散於地似星布列也郭云布散祭於地祭風曰磔者磔謂披磔牲體象風之散物因名云郭云今俗當大道中磔狗云以止風此其象是禷是禡師祭也者是禷是禡詩大雅皇矣篇文也師祭也作者所以解詩也言用師出征之祭名也郭云師出征伐􅀋於上帝禡於所征之地者王制云天子將出征類乎上帝禡於所征之地是也言􅀋乎上帝則類祭祭天也祭天而謂之類者尚書夏侯歐陽􅀃以事􅀋祭之在南方就南郊祭之春官肆師注云􅀋禮依郊祀而爲之是用尚書􅀃爲義也禡之所祭其神不明肆師云凡四時之大田獵祭表貉則爲仁注云貉師祭也於立表處爲師祭祭造軍法者禱氣勢之増倍也其神蓋􅃖尤或曰黃帝又甸祝掌四時之田表貉之祝號杜子春云貉兵祭也田以講武治兵故有兵祭習兵之禮故貉祭禱氣勢之十百而多獲由此二注言之則禡祭造兵爲軍法者爲表以祭之禡周禮作貉貉又或爲貃字古今之異也貉之言百祭祀此神求獲百倍旣伯旣禱馬祭也者旣伯旣禱詩小雅吉日篇文也馬祭也作者所以釋詩也毛傳云伯馬祖也重物愼微將用馬力必先爲之禱其祖禱禱獲也郭云伯祭馬祖也將用馬力必先祭其先如伯是祭馬祖者爲馬而祭故知馬祖謂之伯者伯長也馬祖始是長也鄭注周禮云馬祖天駟上文云天駟房也彼注云龍爲天馬故房四星謂之天駟馬國之大用王者重之故夏官校人春祭馬祖夏祭先牧秋祭馬社冬祭馬歩注云馬祖天駟先牧始養馬者馬社始乗馬者馬歩神爲災害馬者旣四時各有所爲祭之馬祖祭之在春其常也而將用馬力則又用彼禮以禱之禘大祭也者經傳之文稱禘非一其義各殊論語云禘自旣灌及春秋禘于太廟謂宗廟之祭也喪服小記云王者禘其所自出也及大傳云禮不王不禘謂祭感生之帝於南郊也祭法云周人禘嚳而郊稷謂祭昊天於圎丘也以此比餘處爲大祭揔得稱禘宗廟謂之禘者禘諦也言使昭穆之次審諦而不亂也祭天謂之禘者亦言使典禮審諦也郭云五年一大祭者出禮緯文知非祭天之禘者以此文下云繹又祭也爲宗廟之祭知此亦宗廟之祭也繹又祭也者又復也繹復祭之名也郭云祭之明日尋繹復祭公羊傳云繹者何祭之明日也榖梁傳云繹者祭之旦日之享賔也天子諸侯謂之爲繹少牢饋食大夫之禮也謂之賔尸與祭同日若然是亦與賔尸事不同矣而詩頌絲衣序云繹賔尸者繹祭之禮主爲賔事此尸但天子諸侯禮大異日爲之别爲立名謂之爲繹言其尋繹昨日卿大夫禮小同日爲之不别立名直指其事謂之賔尸耳此序言繹者是此祭之名賔尸是此祭之事故特詳其文也然又祭之名三代各異周名繹商名肜夏名復胙郭云春秋經曰壬午猶繹者宣八年經文也又云書曰髙宗肜日周書篇也孫炎云肜者相尋不絶之意夏曰復胙者郭云未見義所出以夏之典訓無言復胙名者是未見義所出也詩傳及詩箋亦無此一句􅀃者云胙是祭􅁏也以祭之旦日復陳其祭􅁏以賔尸也未知然不祭名者以題上事也春獵至講武釋曰此􅀃曰獵習武之事也云春獵爲蒐夏獵爲苗秋獵爲獮春獵爲狩者此四時田獵之名也郭云蒐搜索取不任者苗爲苗稼除害獮順殺氣也狩得戰取之無所擇隠五年左傳文與此同杜注云蒐索擇取不孕者苗爲苗除害也獮殺也以殺爲名順秋氣也狩圍守也冬物畢成獲則取之無所擇也周禮大司馬職中春教振旅遂以蒐田中夏敎苃舎遂以苗田中秋敎治兵遂以獮田中冬教大閱遂以狩田其名亦與此同鄭􅀇解苗田與此小異言擇取不孕任者􅀂治苗去不秀實者孫炎亦然桓四年公羊傳曰春曰苗秋曰蒐冬曰狩三名旣與禮異又復夏時不田榖梁傳曰四時之田皆爲宗廟之事也春曰田夏曰苗秋曰蒐冬曰狩皆與禮異者良由微言旣絶曲辨妄生左丘明親受聖師爾雅者或云子夏所作故二者與禮合漢代古學不行明帝集諸學士作白虎通義因榖梁之文爲之其􅀃曰王者諸侯所以田獵何爲苗除害上以共宗廟下以簡集士衆也春謂之田何春歳之本舉夲名而言之也夏謂之苗何擇其懷任者也秋謂之蒐何蒐索肥者也冬謂之狩何守地而取之也四時之田揔名爲田何爲田除害也案苗非懷任之名何云擇去懷任秋獸盡皆不瘦何云蒐索取肥雖名通義義不通也故先儒皆依周禮左傳爾雅之文而爲之􅀃其名亦有意焉雖復春獵獲則取之不能釋取不孕夏獵所取無多不能爲苗除害爲因時異而變文耳謂之獵者蔡邕月令章句云獵者捷取之名也宵田爲獠者宵夜也夜獵名獠郭云管子曰獠獵畢弋者案管子四稱篇管仲對桓公曰昔者無道之君誅其良臣敖其婦女獠獵畢弋暴遇諸父者是也又云今江東亦呼獵爲獠者以時驗而言也或曰即今夜獵載鑪照也者亦得爲一義故復引之火田爲狩者郭云放火燒草獵故爲狩言與冬獵同名故云亦也李巡孫炎皆云放火燒草守其下風周禮羅氏蜡則作羅襦鄭云襦細密之羅此時蟄者畢矣可以羅罔圍取禽也今俗放火張羅其遺敎禮記王制云昆蟲未蟄不以火田則是巳蟄得火田也乃立冢土戎醜攸行者此詩大雅緜篇文也郭云冢土大社戎醜大衆郊特牲云社所以􅃁地之道也禮運云命降於社之謂殽地是社爲土之神也冢詁爲大土爲社主故知冢土大社也釋詁云戎大也醜衆也故云戎醜大衆也起大事動大衆必先有事乎社而後出謂之冝者此作者旣引詩文於上然後爲此辭以釋之也孫炎曰大事兵也有事􅀕也冝求見使祐也此文本解戎醜攸行之意言國家起發軍旅之大事以興動其大衆必先有祭事於此社而後出行其祭之名謂之爲冝以師行必須冝祭以告社故言戎醜攸行也成十三年左傳曰國之大事在祀與戎故兵爲大事也春秋昭十五年有事於武宫雜記云有事於上帝皆是􅀕事故謂祭爲有事以兵凶戰危慮有負敗祭之以求其福冝故謂之冝王制云天子將出冝乎社是也郭云周官所謂冝乎社者春官大祝職云大師冝于社造于祖是也振旅闐闐者此詩小雅采􅉮篇文也鄭箋云至戰止將歸又振旅伐鼔闐闐然振猶止也旅衆也郭云振旅整衆闐闐羣行聲也出爲治兵尚威武也入爲振旅反尊卑也者此亦作者釋上詩文也古者春教振旅秋敎治兵以戎是大事又三年一敎隱五年左傳曰三年而治兵入而振旅是也征伐之時出軍至對陳用治兵禮戰也至還歸用振旅法名異而禮同也以此出當用之故以脩治兵事爲名入則休息故以整衆爲名其治兵振旅之名周禮左傳榖梁與此皆同唯公羊以治兵爲祠兵其禮治兵則幼賤在前振旅則尊老在前郭云幼賤在前貴勇力尊老在前復常儀也講武者題上事也言皆所以講習武事也素錦至旌旂釋曰別旌之異名也素錦綢杠者自此至維以縷􅀃旂之制也綢韜也杠竿也先以白地錦韜旂之竿禮記所謂綢練設旐夏也則以纁帛著於素錦名縿縿即衆旒所著者陞上也又畫白龍於縿今上向又練絳帛爲旒九以著於縿飾旒之邊用綦組維持其旒使不曵地以朱縷詩鄘風云素絲紕之鄭箋云素絲者以爲縷以縫紕旌旗之旒縿或以維持有水則載靑旌前有塵埃則載鳴鳶前有車􅀐則載飛鴻前有士師則載虎皮前有摯獸則載貔貅鄭注云載謂舉於旌首以警衆也禮君行師從卿行旅從前驅舉此則士衆知所有所舉各以其􅀋象靑靑雀水鳥鳶鳴則將風鴻取飛有行列也士師謂兵衆虎取其有威勇也貔貅亦摯獸也因章曰旃者孫炎曰因其繒色以爲旗章不畫之是也司常云通帛爲旜鄭注云通帛謂大赤從周正色無飾郭云以帛練爲旒因其文章不復畫之周禮云通帛爲旃者以因其文章與周禮通用絳帛隨義立名其實一也故引爲證旌旂者九旗之名雖異旗旂爲之揔稱故以此題之案祭名講武旌旂俱非天􅀋而亦在此者以皆王者大事又祭名則天曰蟠柴講武則􅀋於上帝旌旂則日月爲常他篇不可攝故繫之釋天也爾雅䟽卷第六
