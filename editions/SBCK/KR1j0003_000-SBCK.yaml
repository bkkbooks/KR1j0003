front:
  text: 爾雅䟽敘
  hash: sha256:d18a37c73f135eedf7e346a33572814d769eedc71fada783e316cc063999e20b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_000-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定夫爾雅者先儒授敎之術後進索隱之方誠傳注之濫觴爲經籍之樞要者也夫混元闢而三才肈位聖人作而六藝斯興本乎發德於衷將以納民於善洎夫醇醨旣異歩驟不同一物多名繫方俗之語片言殊訓滯今古之情將使後生若爲鑚仰繇是聖賢閒出詁訓遞陳周公倡之於前子夏和之於後蟲魚草木爰自爾以昭彰禮樂詩書盡由斯而紛郁然又時經戰國運歷挾書傳授之徒􅐛微發揮之道斯寡諸篇所釋世罕得聞惟漢終軍獨深其道豹䑕旣辨斯文遂隆其後相傳乃可詳悉其爲注者則有犍爲文學劉歆樊光李廵孫炎雖各名家猶未詳備惟東晉郭景純用心幾二十年注解方畢甚得六經之㫖頗詳百物之形學者祖焉最爲稱首其爲義䟽者則俗閒有孫炎髙璉皆淺近俗儒不經師匠今旣奉勑校定考案其事必以經籍爲宗理義所詮則以景純爲主雖復研精覃思尚慮學淺意䟽謹與尚書駕部貟外郎直祕閣臣杜鎬尚書都官貟外郎祕閣校
  hash: sha256:fd7591966a4ac77ea093d655e56cca079775142103093917b0d9f89580d35364
