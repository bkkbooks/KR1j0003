  text: 爾雅疏卷第四
  hash: sha256:3f1589c731ced4eae04315ae983739542c62e763d56c0c469aa1a25610d8e7f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_004-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋訓第三釋親第四釋訓第三釋曰案釋詁云訓道也周禮地官有土訓誦訓鄭司農注云謂以逺方土地所生異物以告道王也後鄭云玄謂土訓能訓説土地善惡之勢誦訓能訓説四方所誦習及人所作為久時事然則此篇以物之事義形貌告道人也故曰釋訓案此所釋多釋詳文故郭氏即以詩義解之明明斤斤察也釋曰舍人曰明明言其明甚孫炎曰明明性理之察也大雅常武云赫赫明明舍人曰斤斤物精詳之察也孫炎曰斤斤重愼之察也周頌執競云斤斤其明聰明鑒察也條條秩秩智也釋曰皆智思深長也小雅賔之初筵云左右秩秩言其威儀審智不失禮也穆穆肅肅敬也釋曰周頌雍篇云有來雍雍至止肅肅相維辟公天子穆穆此皆禘祭之時容儀謹敬也諸諸便便辨也釋曰皆言辭辨給也論語云便便言小雅采菽云平平左右毛傳云平平辨治也便平古今字肅肅翼翼恭也釋曰皆恭敬也大雅思齊云肅肅在廟大明云維此文王小心翼翼言文正及羣臣恭敬貌也雍雍優優和也釋曰大雅思齊云雍雍在宫商頌長發云敷政優優此皆人君德政和樂也兢兢憴憴戒也釋曰小雅卜旻云戰戰兢兢大雅抑篇云子孫繩繩此皆小心戒愼也憴繩音義同戰戰蹌蹌動也釋曰小旻云戰戰兢兢楚茨云濟濟蹌蹌此皆恐動趨步威儀謹敬也晏晏溫溫柔也釋曰衛風氓篇云言笑晏晏大雅抑篇云溫溫恭人此皆寬緩和柔也業業翹翹危也釋曰大雅召旻云兢兢業業豳風鴟梟云豫室翹翹此皆縣危恐懼也惴惴憢憢懼也釋曰秦風黃鳥云惴惴其栗豳風鴟梟云豫維音嘵嘵此皆危恐戰懼也畨畨矯矯勇也釋曰大雅嵩髙云申伯畨番魯頌泮水云矯矯虎臣此皆武夫壯勇之貌桓桓烈烈威也釋曰皆威武嚴猛之貌周頌桓篇云桓桓武王小雅黍苗云烈烈征師洸洸赳赳武也釋曰大雅江漢云武夫洸洸周南兔罝云赳赳武夫此皆武夫果毅之貌左傳殺敵為果致果為毅藹藹濟濟止也釋曰大雅卷阿云藹藹王多吉士小雅楚茨云濟濟蹌蹌此皆王朝賢士盛多之容止也悠悠洋洋思也釋曰鄭風子襟云悠悠我思邶風二子乘舟云中心養養此皆想念憂思也洋養音義同又中庸云齊明盛服以承祭祀洋洋乎如在其上如在其左右鄭玄云洋洋人想思其傍僾之貌蹶蹶踖踖敏也釋曰唐風蟋蟀云良士蹶蹶小雅楚茨云執爨踖踖此皆便速敏捷於事也薨薨增增衆也釋曰周南螽斯云螽斯羽薨薨兮魯頌閟宫云蒸徒增增此皆人物衆夥之貌楚人謂多為夥蒸蒸遂遂作也釋曰皆物盛興作之貌也魯頌泮水云蒸蒸皇皇委委他他美也釋曰李巡曰皆寬容之美也孫炎曰委委行之美他他長之美詩鄘風君子偕老云委委他他毛傳云委委者行可委曲從迹也他他者德平易也是皆佳麗美豔之貌也忯忯惕惕愛也釋曰李巡曰忯忯和適之愛也注詩云心焉惕惕者陳風防有鵲巢文云韓詩以為恱人故言愛也者燕人韓嬰為詩作傳名曰韓詩以此惕惕為恱人故言愛也稱稱格格舉也釋曰皆謂舉持物也蓁蓁孽孽戴也釋曰周南桃夭云其葉蓁蓁衛風碩人云庶薑孽孽此皆頭戴物婦人盛飾貌懕懕媞媞安也釋曰秦風小戎云厭厭良人毛傳云厭厭安靜也孫炎曰媞媞行步之安也魏風葛屨云好人提提毛傳云提提安諦謂行步安舒而審諦也是皆好人安詳之容也祁祁遲遲徐也釋曰皆安徐也豳風七月云春日遲遲采蘩祁祁丕丕簡簡大也釋曰書立政云以並受此丕丕基周頌執競云降福簡簡是皆多大之稱存存萌萌在也釋曰謂存在也易繫辭云成性存存萌萌字書作􅽪説文作蕄郭云未見所出懋懋慔慔勉也釋曰皆自勉強也書曰懋哉懋哉慔與慕同庸庸慅慅勞也釋曰皆劬勞也有功庸者皆勞也小雅巷伯云勞人草草毛傳云草草勞心也又陳風月出云勞心慅兮慅草音義同赫赫躍躍迅也釋曰孫炎云赫赫顯著之迅大雅常武云赫赫業業毛傳云赫赫然盛也何人斯云躍躍毚兔是皆顯盛迅疾之貌綽綽爰爰緩也釋曰皆寬緩也小雅角弓云綽綽有裕毛傳云綽綽寬也王風兔爰云有兔爰爰毛傳云爰爰緩意郭云攸攸稱稱丕丕簡簡存存懋懋庸庸綽綽盡重語者言此數字單言之其義亦同但古人有重語者故復出之坎坎樽樽喜也釋曰皆鼓舞歡喜也小雅伐木云坎坎鼓我蹲蹲舞我鄭箋云為我擊鼓坎坎然為我興舞蹲蹲然謂以樂樂己也樽蹲音義同瞿瞿休休儉也釋曰李巡曰皆良士顧禮節之儉也唐風蟋蟀云良士瞿瞿毛傳云瞿瞿然顧禮義也又云良士休休毛傳云休休樂道之心皆良士節儉也旭旭蹻蹻憍也釋曰郭氏讀旭旭為好好小雅巷伯云驕人好好鄭箋云好好者喜讒言之人也大雅板篇云小子蹻蹻毛傳云蹻蹻驕貌是皆小人得志憍蹇之貌也夢夢訰訰亂也釋曰孫炎曰夢夢昏昏之亂也大雅抑篇云視爾夢夢又曰誨爾諄諄是皆暗亂也諄諄音義同懪懪邈邈悶也釋曰懪懪煩悶也舍人曰藐藐憂悶也大雅抑篇云聽我藐藐毛傳云藐藐然不入也是皆煩悶之謂也儚儚洄洄惛也釋曰皆迷亂惛惑也郭音義云洄夲作音韋版版蕩蕩僻也釋曰皆邪僻也李巡曰版版失道之僻也蕩蕩者弗思之僻也大雅板篇云上帝板板毛傳云板板反也上帝以稱王者也鄭箋云王為政反先王與天之道又蕩篇云蕩蕩上帝鄭箋云蕩蕩法度廢壞之貌版板蕩蕩音義同爞爞炎炎薰也釋昆曰旱熱之氣薰炙人也大雅雲漢云藴隆蟲蟲毛傳云藴藴而暑隆隆而雷蟲蟲而熱又云赫赫炎炎毛傳云赫赫氣也炎炎熱氣也爞蟲音義同居居究究惡也釋曰李巡曰居居不狎習之惡孫炎曰究究窮極人之惡唐風羔裘云羔裘豹祛自我人居居又曰自我人究究毛傳曰居居懷惡不相親比之貌究究猶居居也是皆相憎惡也仇仇敖敖傲也釋曰小雅正月云執我仇仇毛傳云仇仇猶謷謷也鄭箋云王既得我執留我其禮待我謷謷然亦不問我在位之功力言其有貪賢之名無用賢之實大雅板篇云我即爾謀聽我嚻嚻毛傳云嚻嚻猶謷謷也鄭箋云我就女而謀欲忠告以善道女反聽我言謷謷然不肯受是皆傲慢賢者敖謷嚻音義同佌佌瑣瑣小也釋曰皆才器細陋也小雅正月云佌佌彼有屋毛傳云佌佌小也鄭箋云此言小人富也舍人曰瑣瑣計謀楄淺之貌節南山云瑣瑣姻亞鄭箋云瑣瑣婚姻妻黨之小人悄悄慘慘愠也釋曰愠恨怒也皆賢人愁恨也邶風柏舟云憂心悄悄愠于羣小毛傳云愠怒也悄悄憂貌李巡曰慘慘憂之愠大雅抑篇云我心慘慘毛傳云慘慘憂不樂也痯痯瘐瘐病也釋曰小雅杕杜云四牡痯痯毛傳云痯痯罷貌又大雅板篇云靡聖管管毛傳云管管無所依也小雅正月云憂心愈愈毛傳云愈愈憂懼也此皆賢人失志懷憂病也殷殷惸惸忉忉慱慱欽欽京京忡忡惙惙怲怲奕奕憂也釋曰小雅正月云憂心殷殷毛傳云殷殷然痛也又云憂心惸惸毛傳云惸惸憂意也檜風羔裘云勞心忉忉鄭箋云三諫不從待放而去思君如是心忉忉然又素冠云勞心慱慱毛傳云慱慱憂勞也秦風云憂心欽欽毛傳云思望之心中欽欽然小雅正月云憂心京京毛傳云京京憂不去也召南草蟲云未見君子憂心忡忡毛傳云忡忡猶衝衝也鄭箋云未見君子者謂在塗時也在塗而憂憂不當君子無以寧父母故心衝衝然又曰憂心惙惙毛傳云惙惙憂也小雅頗辨云憂心怲怲毛傳云怲怲憂盛滿也又云憂心奕奕毛傳云奕奕然無所薄也此皆作者歌事以詠心憂也畇畇田也釋曰謂耕墾開辟土田畇畇然也小雅信南山云畇畇原隰毛傳云畇畇墾辟貌畟畟耜也釋曰舍人曰畟畟耜入地之貌周頌良耜云畟畟良耜俶載南畝毛傳云畟畟猶測測也鄭箋云良善也農人測測以利善之耜熾災是南畝也是言耜之嚴利也郝郝耕也釋曰謂耕地其土解散郝郝然也周頌載芟云其耕澤澤鄭箋云土氣蒸逹而和耕之則澤澤然解散郝郝澤澤並音釋其義亦同繹繹生也釋曰舍人云榖皆生之貌載芟云驛驛其逹毛傳云逹射也鄭箋云達出地也是言其種調勻皆出地而生也繹與驛音義同穟穟苗也釋曰大雅生民云禾役穟穟毛傳云役列也穟穟苗好美也是言茂好也綿綿穮也釋曰孫炎云綿綿言詳密也載芟云綿綿其麃毛傳云麃耘也説文云穮耨鉏田也字林云穮耕禾間也是言藝耨精也穮麃耘藝音義同挃挃穫也栗栗衆也釋曰孫炎云挃挃穫聲也李巡曰栗栗積聚之衆也良耜云穫之挃挃積之栗栗毛傳挃挃穫聲也栗栗衆多也小爾雅云截穎謂之挃故郭云刈禾聲積聚緻也緻謂密也溞溞淅也烰烰蒸也釋曰大雅生民云釋之叟叟蒸之浮浮毛傳云釋淅米也叟叟聲也浮浮氣也鄭箋云釋之蒸之以為酒及簠簋之實故郭云洮米聲氣出盛也溞叟音異義同烰浮音義同俅俅服也釋曰周頌絲衣云載辨俅俅毛傳云俅俅恭順貌鄭箋云載猶戴也辨爵辨也爵辨而祭於王士服也故郭云謂戴辨服峨峨祭也釋曰大雅棫朴云奉璋峨峨毛傳云半圭曰璋峨峨盛壯也鄭箋云璋璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉奉璋之儀峨峨然故郭云執圭璋助祭也鍠鍠樂也釋曰周頌執競云鍾鼓喤喤毛傳云喤喤和也鄭箋云武王既定天下祭祖考之廟奏樂而八音克諧字書云鍠鍠樂之聲也故郭云鍾鼓音喤鍠音義同穰穰福也釋曰執競云降福穰穰毛傳云穰穰衆也鄭箋云神與之福又衆大謂如嘏辭也是言得福饒多也子子孫孫引無極也釋曰子子孫孫小雅楚茨文也引無極也者作者所以釋之也舍人曰子孫長行美道引無極也郭云丗丗昌盛長無窮顒顒卬卬君之德也釋曰此道人君之顒望也顒顒卬卬大雅卷阿文也君之德也者作者釋之也案詩云顒顒卬卬如圭如璋今聞令望毛傳云顒顒溫貌卬卬盛貌鄭箋云令善也王有賢臣與之以禮義相切瑳體貌則顒顒然敬順志氣則卬卬然髙朗如玉之圭璋也人聞之則有善聲譽人望之則有善威儀德行相副丁丁嚶嚶相切直也釋曰直猶正也小雅伐木云伐木丁丁鳥鳴嚶嚶鄭箋云昔日未居位在農之時與友生於山巖伐木為勤苦之事猶以道德相切正也故郭云丁丁伐木聲嚶嚶兩鳥鳴以喻朋友切磋相正藹藹至服也釋曰大雅卷阿云藹藹王多吉士鄭箋云王之朝多善士藹藹然又云菶菶萋萋雍雍喈喈毛傳云梧桐盛也鳳皇鳴也臣竭其力則地極其化天下和洽則鳳皇樂德鄭箋云菶菶萋萋喻君德盛也雍雍喈喈喻民臣和協是皆臣下盡力民人協服也故郭云梧桐茂賢士衆地極化臣竭忠鳳皇應德鳴相和百姓懷附興頌歌也佻佻契契愈遐急也釋曰愈益也遐逺也謂賦役不均小國困竭賢人憂歎逺益急切也小雅大東云紏紏葛屨可以履霜佻佻公子行彼周行毛傳云佻佻獨行貌公子談公子也鄭箋云葛屨夏屨也周行周之列位也言時財貨盡雖公子衣屨不能順時乃夏之葛屨今以履霜送轉餫因見使行周之列位者而發幣焉言雖困乏猶不得止又云契契寤歎哀我憚人毛傳云契契憂苦也鄭箋云今談大夫契契憂苦而寤歎哀其民人之勞苦是也宴宴粲粲尼居息也釋曰尼近也謂宴安盛飾近處優間也小雅北山云或燕燕居息毛傳云燕燕安息貌又大東云東人之子職勞不來西人之子粲粲衣服毛傳云東人談人也來勤也西人京師人也粲粲鮮盛也鄭箋云職主也東人勞苦而不見謂勤京師人衣服鮮潔而逸豫言王政偏甚也哀哀悽悽懷報德也釋曰懷思也悲苦征役思報父母之德也小雅蓼莪云哀哀父母生我劬勞鄭箋云哀哀者恨不得終養父母報其生長巳之苦郭音云悽本或作萋出車云赫赫南仲薄伐西戎春日遲遲卉木萋萋是也言以此征役故思所生也所生謂父母倏倏嘒嘒罹禍毒也釋曰罹遭也小雅小辨云踧踧周道鞫為茂草毛傳云踧踧平易也周道周室之通道鞫窮也鄭箋云此喻幽王信褒姒之讒亂其德政使不通於四方又曰菀彼柳斯鳴蜩嘒嘒毛傳云蜩蟬也嘒嘒聲也鄭箋云柳木茂盛則多蟬案詩序云小辨刺幽王也大子之傅作焉毛傳云幽王取申女生大子冝咎又説褒姒生子伯服立以為后而放冝咎將殺之故郭云悼王道穢塞羡蟬鳴自得傷己失所遭讒賊倏踧並音狄晏晏旦旦悔爽忒也釋曰悔恨也爽忒差失也皆婦人恨夫棄巳而行差失也衛風氓篇云總角之宴言笑晏晏信誓旦旦毛傳云總角結髮也晏晏和柔也信誓旦旦然鄭箋云我為童女未笄結髮宴然之時女與我言笑晏晏然而和柔我其以信相誓旦旦耳言其懇惻款誠案詩序云氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉故郭云傷見絶棄恨失也皋皋㻆㻆刺素食也釋曰素空也刺無德而空食其祿也舍人曰皋皋不治之貌大雅召旻云皋皋庀庀曽不知其玷毛傳云皋皋頑不知其道也鄭箋云玷缺也王政巳大壞小人在位曽不知大道之缺某氏云鞙鞙無德而佩小雅大東云鞙鞙佩璲不以其長毛傳云鞙鞙玉貌璲瑞也鄭箋云佩璲者以瑞王為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其德刺其素飱是也郭云譏無功德尸寵祿也者案鄭注禮記云尸謂不知人事無辭讓也以其尸者神象居位不言但受祭享小人在位亦無言而受寵祿有似於尸故云尸寵祿也㻆鞙音義同歡歡愮愮憂無告也釋曰謂賢者憂懼無所告訴也大雅板篇云老夫灌灌毛傳云灌灌猶欵欵也鄭箋云老夫諫女欵欵然王風云中心搖搖毛傳云搖搖憂無所訴歡灌愮搖音義同憲憲泄泄制法也釋曰李巡曰皆惡黨為制法則也孫炎曰厲王方虐諂臣並為制作法令大雅板篇云天之方難無然憲憲天之方蹶無然泄泄毛傳云憲憲猶欣欣也蹶動也泄泄猶沓沓也鄭箋云天斥王也王方欲艱難天下之民又方變更先王之道臣乎女無憲憲然無沓沓然為之制法度達其意以成其惡皆是佐興虐政設教令也謔謔謞謞崇讒慝也釋曰崇增也讒譖也慝惡也言樂禍助虐增譖惡也舍人曰謔謔謞謞皆盛烈貌孫炎曰厲王暴虐大臣謔謔謞謞然盛以興讒惡也大雅板篇云天之方虐無然謔謔毛傳云謔謔然喜樂鄭箋云王方為酷虐之政女無謔謔然以讒慝助之又曰多將熇熇不可救藥毛傳云熇熇然熾盛也鄭箋云多行熇熇慘毒之惡誰能止其禍是也謞熇音義同翕翕訿訿莫供職也釋曰言賢者陵替姦黨熾盛背公恤私曠其職事無背供職也小雅小旻云潝潝訿訿亦孔之哀毛傳云潝潝然患其上訿訿然思不稱乎上鄭箋云臣不事君亂之階也甚可哀也又大雅召旻云皋皋訿訿毛傳云訿訿寙不共事也故郭云賢者陵替姦黨熾盛背公恤私曠職事説文云寙懶也草木皆自豎立惟瓜瓠之屬卧而不起似若懶人常卧室故字從宀音眠速速蹙蹙惟逑鞫也釋曰惟念也逑急迫也鞫窮也言鄙陋小人專據爵祿國土侵削致賢云永哀念其窮迫也小雅正月云蔌蔌方有穀毛傳云蔌蔌陋也鄭箋云穀祿也此言小人富而窶陋將貴也又節南山云蹙蹙靡所騁毛傳云騁極也鄭箋云蹙蹙小之貌我視四方土地日見侵削於夷狄蹙蹙然雖欲馳騁無所之也速蔌音義同抑抑密也秩秩淸也釋曰言威儀審諦德音淸明也舍人曰威儀密靜也大雅假樂云威儀抑抑德音秩秩鄭箋云成王立朝之威儀致密無所失教令又淸明天下皆樂仰之甹夆掣曵也釋曰孫炎曰謂相掣曵入於惡也郭云謂牽拖周頌小毖嗣王求助也云莫豫荓蜂毛傳云荓蜂􅠺曵也鄭箋云羣臣小人無敢我􅠺曵謂為譎詐詐欺不可信也然則掣曵者從旁牽挽之言是挽離正道使就邪僻荓甹夆蜂掣􅠺音義同朔北方也釋曰舍人曰朔盡也北方萬物盡故言朔也李巡曰萬物盡於北方小雅出車云城彼朔方毛傳云朔方北方也但北方大名皆言朔方堯典云宅朔方郭云謂幽朔不俟不來也釋曰俟待也既云不待是不來也故郭云不可待是不復來不遹不迹也釋曰遹循也迹軌迹也謂不循道者曰不迹郭云言不循軌迹也小雅沔水云念彼不迹毛傳云不迹不循道也是矣不徹不道也釋曰小雅十月云天命不徹毛傳云徹道也鄭箋云不道者言王不循天之政教是也勿念勿忘也釋曰勿念念也念即不忘也若大雅文王篇云無念爾祖是也萱諼忘也注義見伯兮考盤詩釋曰衛風伯兮云焉得諼草毛傳云諼草令人忘憂又考槃云永矢弗諼是也伯兮篇本或作萱草每有雖也釋曰小雅常棣云每有良朋況也永嘆毛傳云況兹永長也箋云每有雖也良善也當急難之時雖有善同門來兹對之長嘆而巳郭云辭之雖也者言為語辭之雖無他義也饎酒食也釋曰小雅天保云吉蠲為饎毛傳云吉善蠲潔也饎酒食也郭云猶今云饎饌背一語而兼通者言饎之一字兼通酒食兩名也李巡曰得酒食則喜歡也舞號雩也釋曰孫炎云雩之祭有舞有號左傳云龍見而雩服杜皆云雩之言逺也逺謂百穀祈膏雨月令仲夏云大雩帝鄭注云雩吁嗟求雨之祭也郭云雩之祭舞者吁嗟而請雨是同鄭説也暨不及也注公羊至得及釋曰案春秋隱元年三月公及邾婁儀父盟于眛公羊傳曰及者何與也會及暨皆與也曷為或言會或言及或言暨會猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得巳也然則暨者非我欲之事不獲巳而為會者也故云不及也蠢不遜也釋曰蠢動也遜順也言蠢動為惡不謙遜也小雅采芭云蠢爾蠻荆大邦為讎是也如切至忘也釋曰此舉衛風淇奧篇文以釋之也云如切如磋者詩文也云道學也者作者以釋詩也道言也言道之學以成德如切磋骨象以成器毛傳云治骨曰切象曰磋道其學而成也故郭云骨象須切磋而為器又須學問以成德云如琢如磨者詩文也云自修也者釋之也言人自修飾如琢磨玉石毛傳云治玉曰琢石曰磨聽其規諫以自修如玉石之見琢磨郭云玉石之被雕磨猶人自修飾云瑟兮僩兮者詩文也恂栗也者釋之也謂嚴恂戰栗也故郭云恆戰竦毛傳云瑟矜莊貌僴寬大也是外貌莊嚴內心寬裕也云赫兮烜兮者詩文也威儀也者釋之也言赫烜者容儀發揚之言故言威儀也毛傳云赫有明德赫赫然咺威儀容止宣著也故郭云貌光宣云有斐君子終不可諼兮者詩文也云道盛德至善民之不能忘也者釋之也毛傳云斐文章貌諼忘也此道有斐然文章之君子盛德至善如此故民稱之常思詠終不能忘也案詩稱君子謂武公既微至為腫釋曰云既微且腫者小雅巧言文也云骭瘍為微腫足為腫者釋之也孫炎曰皆水溼之疾也郭云骭腳脛也瘍創也然則膝脛之下有瘡腫是涉水所為故鄭箋亦云此人居下溼之地故生微腫之疾詩云居河之麋是居下溼也是刈是濩濩煮之也釋曰云是刈是濩者周南葛覃文也云濩煮之也者釋之也舍人曰是刈刈取之是濩煮治之郭云煮葛為絺綌以煮之於濩故曰濩煮非訓濩為煮以彼下云為絺為綌故知煮葛為絺綌也毛傳云精曰絺粗曰綌履帝武敏武迹也敏拇也釋曰云履帝武敏者大雅生民文也云武迹也敏拇也者釋之也郭云拇迹大指處鄭箋詩云祀郊禖之時時則有大神之迹薑嫄履之足不能滿履其拇指之處於是遂有身而生后稷是其事也張仲至為友釋曰云張仲孝友者小雅六月文也云善父母為孝善兄弟為友者釋之也李巡云張姓仲字其人孝故稱孝友毛傳云張仲賢臣也鄭箋云張仲吉甫之友其性孝友以詩序云六月宣王北伐也故郭云周宣王時賢臣有客至四宿也釋曰云有客宿宿有客信信者周頌有客文也云言再宿也言四宿也者釋之也毛傳云一宿曰宿再宿曰信各重言之故知再宿及四宿也美女為媛釋曰詩鄘風君子偕老云展如之人兮邦之媛也故此釋之郭云所以結好媛孫炎曰君子之援助然則由有美可以援助君子故云美女為媛美士為彥釋曰鄭風羔裘云彼其之子邦之彥兮故此釋之也毛傳云彥士之美稱郭云人所彥詠舍人曰國有美士為人所言道其虛其徐威儀容止也釋曰云其虛其徐鄘風北風文也威儀容止也者釋之也郭云雍容都雅之貌孫炎云虛徐威儀謙退也然則虛徐者謙虛間徐之義故鄭箋云威儀虛徐寬仁者也詩作其邪此作其徐字雖異音實同故鄭箋云邪讀如徐猗嗟名兮目上為名釋曰云猗嗟名兮者齊風猗嗟文也云目上為名者釋之也孫炎云上平博郭云眉眼之間式微至者也釋曰云式微式微者坤風式微文也云微乎微者也釋之也郭云言至微鄭箋云式發聲也案詩序云式微黎侯寓于衛其臣勸以歸也然則以君被逐既微又見卑賤是至微也不取式為義故鄭云發聲也之子者是子也釋曰詩言之子者多矣故此釋之李巡云之子者論五方人言是子也然則之為語助人言之子者猶云是此子也桃夫傳云嫁子彼説嫁事為嫁者之子漢廣之子則貞潔者之子東山之子言其妻白華之子斥幽王各隨其事而名之故郭云斥所詠徒御不驚輦者也釋曰云徒御不驚者小雅車攻文也云輦者也者釋之也此止解徒字也諸徒皆為徒行此獨為輦是以辨之地官鄉師云大軍旅會同治其輦注云輦人挽行所以載任器也立以為蕃營司馬法輦有一斧一斤一鑿一梩周輦加二板二築夏后氏二十人而輦殷十八人而輦周十王人而輦是會同田獵人挽輦以徒行也故郭云步挽輦車袒裼至摶也釋曰鄭風大叔于田云袒裼暴虎故此釋之毛傳云袒裼肉袒也李巡曰袒裼脫衣見體曰肉袒孫炎曰袒去裼衣郭云脫衣而見體毛傳又云暴虎空手以䙏之舍人曰無兵空手搏之然則徒空也故郭云空手執也馮河徒涉也釋曰小雅小旻云不敢馮河故此釋之也李巡白無舟而渡水曰徒涉郭云無舟楊毛傳云馮陵也然則空涉水陵波而渡故訓馮為陵也籧篨至面柔也釋曰邶風新臺云籧篨不鮮又曰得此戚施故此釋之也毛傳云籧篨不能俯者戚施不能仰者李巡曰籧篨巧言好辭以口饒人是謂口柔戚施和顔恱色以誘人是謂面柔但籧篨戚施本人疾之名故晉語云籧餘不可使俯戚施不可使仰是也人口柔者必仰面觀人之顔色而為辭似籧篨不俯之人因名口柔者為籧篨面柔者必低首下人媚以容色似戚施之人因名面柔者為戚施故郭云籧篨之疾不能俯口柔之人視人顔色常亦不伏因以名云夸毗體柔也釋曰大雅板篇云無為夸毗故此釋之也毛傳云夸毗以體柔人也李巡曰屈巳卑身求得於人曰體柔然則夸毗者便僻其足前却為恭以形體順從於人故郭云屈巳卑身以柔順人也婆娑舞也釋曰陳風東門之枌云婆娑其下故此釋之李巡曰婆娑盤辟舞也郭云舞者之容孫炎曰舞者之容娑娑然則婆娑舞者之狀貌也劈拊心也釋曰邶風柏舟云寤劈有摽劈謂拊心也郭云謂椎胸也矜憐撫掩之也釋曰撫掩猶撫拍謂慰恤也小雅鴻鴈云爰及矝人緎羔裘之縫也釋曰召南羔裘云羔裘之革素絲五緎故此解之也孫炎曰緎之為界緎然則縫合羔羊皮為裘縫即皮之界緎因名裘縫為緎故郭云縫飾羔皮之名殿屎呻也釋曰大雅板云民之方殿屎毛傳云殿屎呻吟也是用此為説郭云呻吟之聲孫炎云人愁苦呻吟之聲也幬謂之帳釋曰帳一名幬召南小星云抱衾與裯鄭箋云幬牀帳也郭云今江東亦謂帳為幬幬與裯音義同侜張誑也釋曰陳風防有鵲巢云誰侜子美毛傳云侜張誑也鄭箋云女衆讒人誰侜張誑欺我所美之人乎郭云書曰無或侜張為幻者周書無逸篇文也引之者以證侜張謂幻惑欺誑人者誰昔昔也釋曰陳風墓門云誰昔然矣毛傳云昔久也郭云誰發語辭與毛同也不辰不時也釋曰辰亦時也不辰者言不得其時也大雅桑柔云我生不辰逢天僤怒是也凡曲者為罶釋曰曲簿也凡以簿取魚為罶郭云毛詩傳曰罶曲梁也者小雅魚麗篇傳文也云凡以簿為魚笱者名為罶者即釋器云嫠婦之笱謂之罶也鬼之為言歸也釋曰人死為鬼小雅何人斯云為鬼為蜮周禮曰享大鬼謂之鬼者鬼猶歸也若歸去然故尸子曰古者謂死人為歸人釋親第四釋曰案禮記大傳云聖人南面而聽天下所且先者五民不與焉一曰治親蒼頡曰親愛也近也然則親者恩愛狎近不疏逺之稱也書曰克明俊德以親九族喪服小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣以九族之親其名謂非一此篇釋之故曰釋親父為至宗族釋曰此別同宗親族白虎通曰父矩也以度教子也又為考考成也言有成德廣雅云母牧也言育養子也又為妣妣媲也媲匹於父廣雅又云兄況也況於父又謂之晜弟悌也言順於兄子孜也以孝事父常孜孜也孫順也順於祖男任也任家事也女如也曰虎通曰言如人也徐鍇曰女子從父之教從夫之命故曰如姑故也言尊如故也又謂之威徐錯曰土盛於戍土隂之主也故字從戍漢律曰婦告威姑是也姊咨也以其先生言可咨問説文云妹女弟也又謂之媦妾接也鄭注禮記云聞彼有禮走而往焉以得接見於君子也庶母者父之妾也此皆同宗之族也白虎通云宗者何謂也宗者尊也為先祖主也宗人之所尊也禮記曰宗人將有事族人皆侍侍所以必有宗何也所以長和睦也族者何也族者湊也聚也謂恩愛相流湊也生相親愛死相哀痛有會聚之道故謂之族也注禮記至例也釋曰云禮記曰生曰父母妻死曰考妣嬪者曲禮下篇文也云今丗學者從之者謂從禮記以父母妻為生之稱以考妣嬪為死之稱彼乃記者一家之説爾學者膠柱遂為生死定稱非也故郭氏引諸文以證之云尚書曰大傷厥考心康誥文也云事厥考厥長聰聽祖考之彞訓者皆酒誥文也云如喪考妣者舜典文也此皆生稱考妣也云公羊傳曰惠公者何隱之考也仲子者何桓之母也者隱元年傳文也此即死稱母也云蒼頡篇曰考妣延年者此亦生稱考妣也云書曰嬪于虞者堯典文也云詩曰曰嬪于京大雅大明篇文也云周禮有九嬪之官者屬天官掌婦學之法者也此皆生稱嬪者也云明此非死生之異稱矣者所以破先儒之説也云其義猶今謂兄為晜妹為媦即是此例也者舉類以曉人也注從祖而别丗統異故釋曰解所以稱從之理也從祖而别繼丗分宗其統各異故曰從祖注丗有為嫡者嗣丗統故也釋曰解所以稱丗之義也繼丗以嫡長先生於父則繼丗者也故曰丗父説文叔作叔許愼曰從上小言尊行之小也注同姓之親無服屬釋曰禮記大傳云親者屬也鄭注云有親者服各以其屬親疏此經言親同姓者謂五丗之外比諸同姓猶親但無服屬爾注孫猶後也釋曰言繼後嗣也廣雅云孫順也許愼云從子從系系續也言順續也言順續先祖之後也注玄者言親屬微昧也釋曰玄者緅緇之間色色之微昧者也親屬微昧故曰玄孫注晜後也汲冢竹書曰不窋之晜孫釋曰晜後也釋言文束晳傳曰太康元年汲郡民盜發魏安釐王冢得竹書漆字科斗之文科斗文者周時古文也其字頭粗尾細似科斗之蟲故俗名之焉不窋后稷之子也晜孫謂毀榆母之至母黨釋曰此一節別母之族黨也黨是鄉之細也此外族屬母若黨之屬鄉故云母黨云舅者孫炎云舅之言舊尊長之稱詩秦風云我送舅氏曰至渭陽是也妻之至妻黨釋曰此一節別妻之親黨也內則云聘則為妻白虎通云妻者齊也與夫齊體自天子下至庶人其義一也注孟子曰帝館生于二室釋曰孟子云舜尚見帝帝館甥于二室亦饗舜迭為賔主是天子而友匹夫也彼注云尚上也舜在畎畝之時堯友禮之舜上見堯舍之於二室二室副宫也堯亦就饗舜之所設更迭為賔主禮記妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂堯甥卒與之天位是天子之友匹夫也注四人至依次釋曰四人謂姑之子舅之子妻之晜弟姊妹之夫也此四人尊卑體敵更相為甥云甥猶生也者取相親之意也注詩曰邢侯之姨談公維私釋曰皆衛風碩人篇文也孫炎曰私無正親之言然則謂吾姨者我謂之私邢侯談公皆莊薑姊妹之夫互言之耳春秋談子奔莒則談是子爵言公者蓋依臣子稱使文耳注公羊傳曰蓋舅出釋曰案春秋襄五年夏叔孫豹鄫丗子巫如晉公羊傳曰外相如不書此何以書為叔孫豹率而與之俱也叔孫豹則曷為率而與之俱蓋舅出也何休云巫者鄫前夫人襄公母姊夫之子也俱莒外孫故曰舅出是也注左傳曰姪其從姑釋曰案僖十五年傳云𥘉晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰姪其從姑杜注云震為木離為火火從木生離為震妹於火為姑謂我姪者我謂之姑謂子圉質秦是也注公羊至弟也釋曰春秋莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶何休云必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也因以備尊尊親親也九者極陽數也不再娶者所以節人情開媵路注猶今言新婦是也釋曰儀禮喪服傳云夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無愼乎鄭注云道猶行也言婦人棄姓無常秩嫁於父行則為母行嫁於子行則為婦行謂弟之妻為婦者卑逺之故謂之婦嫂者尊嚴之稱是嫂亦可謂之母乎嫂猶叟也叟老人稱也是為序男女之別爾若己以母婦之服服兄弟之妻兄弟之妻以舅子之服服己則是亂昭穆之序也治猶理也父母兄弟夫婦之理人倫之大者可不愼乎大傳曰同姓從宗合族屬異姓主名治際會名著而男女有別是別嫂婦之名也郭云猶今言新婦者以時驗而知也至今猶然注今相呼先後或云妯娌釋曰廣雅云娣姒妯娌娣姒先後也丗人多疑娣姒之名皆以為兄妻呼弟妻為娣弟妻呼兄妻為姒因即惑於斯文不知何以為説今謂母婦之號隨夫尊卑娣姒之名從身長幼以其俱來夫族其夫班秩既同尊卑無以相加遂從身之少長喪服小功章曰娣姒婦報傳曰娣姒婦者弟長也以弟長解娣姒言娣是弟姒是長也公羊傳亦云娣者何弟也是其以弟解娣自然以長解姒長謂身之年長非夫之年長也此云長婦謂稚婦為娣婦娣婦謂長婦為姒婦者止言婦之長稚不言夫之大小左傳成十一年穆薑謂聲伯之母為姒昭二十八年傳叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒豈計夫之長幼乎上云女子同出謂先生為姒後生為娣郭云同出謂俱嫁事一夫也事一夫者以己生先後為娣姒則知娣姒以己之年非夫之年也故賈逵鄭玄及杜預皆云兄弟之妻相謂為姒言兩人相謂謂長者為姒知娣姒之名不計夫之長幼也婦稱至婚姻釋曰此别夫婦婚姻之名也説文云婦服也從女持帚灑掃也白虎通云夫婦者何謂也夫者扶也以道扶接婦者服也以禮屈服謂之舅姑者何舅者舊也姑者故也舊故老人稱也夫之父母謂舅姑何尊如父而非父者舅也親如母而非母者姑也鄭注喪服傳云女子子者子女也别於男子也説文云壻女之夫也從士從胥聞一知十為士胥者有才知之稱故謂女之夫為壻廣雅云壻謂之倩方言云東齊之間壻謂之倩白虎通云婚姻者何謂昏時行禮故曰婚婦人因夫而成故曰姻注國語曰吾聞之先姑釋曰魯語季康子問於公父文伯之母曰主亦有以語肥也對曰吾能老而巳何以語子康子曰雖然肥願有聞於主對曰吾聞諸先姑曰君子能勞後丗有繼子夏聞之曰善哉商聞之曰古之嫁者不及舅姑謂之不幸夫婦學於舅姑者也是矣注詩曰瑣瑣姻亞釋曰小雅節南山文也劉熙釋名云兩壻相謂為亞者言每一人取姊一人取妹相亞次也又並來女氏則姊夫在前妹夫在後亦相亞也注古者皆謂婚姻為兄弟釋曰禮記曽子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔鄭注云必使人弔者未成兄弟又云父喪稱父母喪稱母父母不在則稱伯父丗母壻巳葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也是古者謂昏姻為兄弟以夫婦有兄弟之義或據壻於妻之父母有緦服故得謂之兄弟也注書曰嬪于虞釋曰案堯典羣臣共舉舜於帝帝曰我其試哉女于時觀厥刑于二女釐降一女于媯汭嬪于虞孔安國注云降下嬪婦也舜為匹夫能以義理下帝女之心於所居媯水之汭使行婦道於虞氏是也爾雅疏卷第四
