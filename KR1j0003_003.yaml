body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋言第二釋曰說文曰直言曰言仲尼曰言以足志介之推曰言身之文也然則言者發於志而形於聲所以文章於身者也論語曰詩三百一言以蔽之曰思無邪左傳趙簡子稱子大叔遺我以九言皆以一句爲一言也漢書東方朔云十六學詩書誦二十二萬言則以一字爲一言也雖一句一字有異要以今古方國殊别學者莫能通是以方言云皆古今語也初别國不相往來之言也今或同而舊書雅記故俗語不失其方而後人不知故爲之作釋也是曰釋言殷齊中也釋曰殷齊皆謂正中也注書曰以殷仲春者堯典文案彼云曰中星鳥以殷仲春孔安國以殷爲正中正義同故也云釋地曰岠齊州以南者彼注云岠去也齊中也謂中州爲齊州是齊得爲中也斯誃離也釋曰斯析誃張皆分離也孫炎曰斯析之離郭云齊陳曰斯者方言文陳風墓門云斧以斯之是也云誃見詩者小雅巷伯云哆兮侈兮成是南其鄭箋云因箕星釋曰皆敘述也方俗語異耳律管所以述氣遹者述行之也大雅文王有聲遹駿有聲之類是也俞畣然也釋曰皆然應也注禮記曰男唯女俞者内則文也畣古荅字故爲應也䂊臚敘也釋曰皆陳敘也事豫備者亦有敘也漢書云典客秦官大初元年更名大鴻臚韋昭曰鴻大也臚陳敘也以禮大陳敘賔客也又莊子云大儒臚傳是也庶幾尚也釋曰尚謂心所希望也注詩曰不尚息焉者小雅菀柳篇文也鄭箋云尚庶幾也以心所念尚即是庶幾義相反覆故引之觀指示也釋曰示謂呈見於人也注國語曰且觀之兵者案周語穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵犬戎氏以其職來王天子曰子必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎是也論語曰指其掌謂舉掌以示人也若惠順也釋曰順不逆也書曰若稽古謂順考古道也詩邶風終風云惠然肯來言有順心然後可來是也敖撫傲也釋曰皆謂傲慢周頌絲衣云不吴不敖注禮記曰無幠無傲者投壷文也案彼云令弟子辭曰母撫母教母偝立母踰言偝立踰言有常爵是也幼鞠離也釋曰方言云稚年小也曲禮曰幼子常視無誑書曰兄亦不念鞠子哀是皆謂方小也書曰者周書康誥文也逸諐過也釋曰皆謂咎過也注云書曰汝則有逸罰者案商書盤庚云惟予一人有佚罰費誓云汝則有常刑無云汝則有逸罰者師讀不同故也或者其在今文乎諐者左傳曰禮義不諐之頴是也疑休戾也釋曰戾止也書曰疑謀勿成月令云百工休是疑休皆爲也疾齊壯也釋曰急疾齊整皆於事敏速彊壯也悈𥚹急也釋曰悈與亟同大雅靈臺云經始勿亟文王有聲云匪棘其欲禮記引此詩作匪革其猶革亦急也悈亟棘革字雖異音義同魏風葛屨云維是褊心又廣雅去悈謹也褊狹陋也是皆急狹也貿賈市也釋曰謂市買賣物也注詩曰抱在貿絲者衞風氓篇文也大雅瞻卬云如賈三倍也厞陋隱也釋曰皆幽隱也注禮記曰厞用席者案有司徹云有司官徹饋饌于室中西北隅南面如饋之設右几厞用席是也云禮記者誤也云書曰揚側陋者堯典文也遏遾逮也釋曰逮謂相及也注東齊曰遏北燕曰遾者方言文也征邁行也釋曰皆出行也注詩曰王子出征者小雅六月文也云邁亦行者詩云周王于邁是也圮敗覆也釋曰圮毁敗壊皆傾覆也書曰祖乙圮于耿荐原再也釋曰皆重再也孫炎云荐草生之再也郭云易曰水荐至者周易坎卦象辭也云今呼重蠶爲蠢春原者周禮夏官馬質云禁原蠶者是也撫敉撫也釋曰皆憐撫也方言云宋衛邠陶之間謂愛曰撫故注云撫愛撫也云敉義見書者大誥云予翼以千敉寜武圖功之類是也臞脙瘠也釋曰皆痩瘠也鄭玄周禮注云痩臞腐敗郭云齊人謂瘠痩爲脉桄熲充也釋曰孫叔然本桄作光書云光被四表說文云熲是火光也是皆充盛也屢暱亟也釋曰亟猶數也詩頌曰屢豐年左傳曰諸夏親暱親暱者恩信必數故注云親暱者亦數靡罔無也釋曰無不有也詩云靡神不舉書曰罔有攸赦皆是爽差也爽忒也釋曰廣異言也爽謂差錯又爲忒變孫炎曰忒變雜不一郭云皆謂用心差錯不專一詩衛風云女也不爽大雅瞻卬云鞠人忮忒佴貳也釋曰佴次也次即副貳之義劑翦齊也釋曰皆爲齊截也郭云南方人呼翦刀爲劑刀釋器云金鏃翦羽謂之鍭饙餾稔也釋曰稔熟也孫炎曰蒸之曰饙均之曰鎦郭云今呼􅧮飯爲饙饙熟爲餾說文云饙一蒸米也餾飯氣流也然則蒸米謂之饙饙必餾而熟之故言饙餾稔也大雅洞酌云可以餴饎饙餴音義同媵將送也釋曰皆謂送行也孫炎曰將行之送也注云左傳曰以媵秦穆姬者案僖五年晉執虞公及其大夫井伯以媵秦穆姫杜注云秦穆姬晉獻公女送女曰媵以屈辱之云詩曰逺于將之者邶風燕燕衛莊姜送歸妾之詩也作造爲也釋曰謂營爲也皆見鄭風緇衣篇餥餱食也釋曰皆飯食也注方言云陳楚之間相呼食爲餥者案彼云餥飵食也陳楚之内相謁而食麥饘謂之餥楚曰飵凡陳楚之郊南楚之外相謁而飱或曰飵或曰粘秦魯之際河隂之間曰䭡惡恨切䭓五恨切此眞秦語也大雅公劉云廼裹餱糧鞠究窮也釋曰皆窮盡也大雅雲漢云鞠哉庶正小雅節南山云以究王訩滷矜鹹苦也釋曰郭云滷苦地也者謂斥滷可煑塩者左傳曰表淳滷云可矜憐者亦辛苦者小雅鴻鴈云爰及矜人鄭箋云可憐之人謂貧窮者是辛苦之人也云苦即大鹹者釋經之鹹也鹹味極必苦故以鹹爲苦也干流求也釋曰皆求取也論語云子張學干禄注詩曰左右流之周南關雎文也流是覃也覃延也釋曰轉相解也皆謂蔓延相𬒳及水之流必相延及詩周南云葛之覃兮佻偷也釋曰小雅鹿鳴云視民不恌是也李廵曰佻偷漙之偷郭云謂苟且左傳趙孟曰吾儕偷食朝不謀夕何其長也杜注云言欲苟免目前不能念長乆是謂偷爲茍且也潜深也潛深測也釋曰轉相解也詩曰濳雖伏矣是深矣潛深又爲測郭云測亦水深之别名榖鞠生也釋曰皆生活也注詩曰榖則異室者王風大車篇文也小雅蓼莪云母兮鞠我啜茹也釋曰說文云啜甞也郭云啜者拾食禮記檀弓云啜菽飲水大雅烝民云柔則茹之方言云茹食也吴越爪貪飲食者謂之茹茹虞度也釋曰皆謂測度也注詩曰不可以茹者邶柏舟文也左傳曰備豫不虞試式用也釋曰皆任用也注皆見詩書者小雅大東云百僚是試雨無正云庶曰式臧商書盤庚云今予將試以汝遷又云式敷民德之類是也誥誓謹也釋曰皆謹勑也以大義諭衆謂之誥集將士而戒之曰誓尚書誥誓之篇是也故郭云皆所以約勒謹戒衆也競逐彊也釋曰皆自勉彊也大雅抑篇云無競維人馳逐者亦彊梁也禦圉禁也釋曰皆謂禁制小雅常棣云外禦其務養馬曰圉亦所以禁制故皆爲禁也窒薶塞也釋曰皆謂堙塞孔穴豳七月云穹窒熏䑕大宗伯云以貍沈祭山林川澤是其類也黼黻彰也釋曰彰明也言文采著明也注黼文如斧黻文如兩己相背者考工記云白與黒謂之黼黒與靑謂之黻釋器云斧謂之黼蓋半白半黒似斧刃白而身黒黻謂以靑黒線刺繡爲兩巳字相背黼取能斷黻取善惡相背膺身親也釋曰服膺身先皆謂躬親也愷悌發也釋曰謂發明而行也注詩曰齊子愷悌者齊風載驅篇文也毛傳云言文姜於是樂易然鄭箋云此豈弟猶言發夕也豈讀當爲闓弟古文尚書以弟爲圛圛明也然則郭云發發行也是用鄭箋爲說髦士官也釋曰下云髦俊也士者男子之人大號言取俊士令居官也大雅棫樸云髦士攸冝是也畯農夫也釋曰田畯一曰農夫孫炎曰農夫田官也皆謂主田大夫也小雅甫田云田畯至喜鄭箋云田畯司嗇今之嗇夫也此注云今之嗇夫是也然則田畯田官在田司主稼穡故謂之司嗇漢及東晉亦有此官謂之嗇夫故鄭郭皆云今之嗇夫也蓋割裂也釋曰割謂以刀裂之也邕支載也釋曰謝氏云邕字又作擁釋云擁者護之載郭云皆方俗語亦未詳諈諉累也釋曰謂相累及也孫炎云楚人曰諈秦人曰諉郭云以事相屬累爲諈諉漠察淸也釋曰樊光云漠然清貌察明也是皆淸明也庇庥廕也釋曰舎人曰庇蔽也庥依止也郭云今俗語呼樹䕃爲庥文七年左傳云葛藟猶能庇其夲根榖履禄也釋曰皆福禄也孝經援神契云禄者録也取上所以敬録接下下所以敬録事上注書曰旣富方榖者洪範文云詩曰福履將之者周南樛木文也履禮也釋曰履又爲禮也注禮可以履行見易者序卦云物畜然後有禮故受之以履韓康伯云履者禮也隱占也釋曰占者視兆以知吉凶也必先隱度故曰隱占也逆迎也釋曰謂迎迓周書顧命云逆子釗于南門之外憯曾也釋曰憯猶言曾也曽則也皆發語辭郭云見詩者小雅節南山云憯莫懲嗟衞風河廣云曾不崇朝之類是也増益也釋曰謂饒益也郭云今江東通言増窶貧也釋曰窶者無禮也貧者無財也由其無財以爲禮郭云謂貧陋邶風北門云終窶且貧薆隱也釋曰薆鄣即隱蔽也僾唈也釋曰孫炎曰心唈也郭云嗚唈短氣皆見詩大雅桑柔云亦孔之僾是也基經也基設也釋曰基牆下止也又詁爲始作事謀始必經綸也郭云基業所以自經營基又爲造設祺祥也祺吉也釋曰舎人曰祺福之祥謂徴祥也祥即吉之先見者也故又爲吉大雅行葦云壽考惟祺兆域也釋曰謂塋墓界域也孝經曰卜其宅兆廣雅云兆葬地也士喪禮云筮宅冢人營之鄭注云宅葬居也然則筮得吉兆經營之以爲界域也肈敏也釋曰謂敏疾也注書曰肈牽車牛者周書酒誥文也挾藏也釋曰謂隱藏物也郭云今江東通言挾史記秦有挾書之律浹徹也釋曰言澤潤浹洽相霑徹也替廢也替滅也釋曰替謂廢巳也小雅楚茨云子子孫孫勿替引之是也替又爲絶滅速徴也徴召也釋曰轉相解也皆謂呼召注易曰不速之客者需卦上六爻辭也琛寶也釋曰謂珍寶也舎人曰美寶曰琛注詩曰來獻其琛者魯頌泮水文也探試也釋曰試謂甞之也論語云見不善如探湯郭云刺探甞試髦選也髦俊也釋曰廣異言也毛中之長毫曰髦士之俊選者借譬爲名焉故郭云士中之俊如毛中之髦俾職也釋曰俾詁爲使言任使供職也紕飾也釋曰注謂縁飾見詩者鄘風干旄云素絲紕之是也淩慄也慄慼也釋曰轉相解也埤蒼云㥄慄也郭云淩懅戰慄則淩㥄音義同慄又爲慼郭云戰慄者憂慼秦風黃鳥云惴惴其慄蠲明也茅明也明朗也釋曰郭云蠲淸明貌樊光云蠲除垢穢使令淸明茅亦明也舎人曰茅昧之明也注左傳云前茅慮無者宣十二年傳文也杜注慮無如今軍行前有斥候蹹伏皆持以絳及白爲幡見騎賊舉絳幡見步賊舉白幡備慮有無也茅明也或曰時楚以茅爲旌識明即融朗也猷圖也猷若也釋曰猷謂圖畫又爲若若如也注周禮曰以猷鬼神祇者春官凡以神仕者掌三辰之法以猶鬼神示之居辨其名物是也注詩曰寔命不猷者召南小星文也偁舉也釋曰謂興舉也注偁爾戈者周書牧誓文也稱好也釋曰謂美好郭云物稱人意亦爲好坎律銓也釋曰謂銓量也樊光曰坎卦水也水性平律亦平銓亦平郭云易坎卦主法者說卦云坎爲水水平故主法云法律皆所以銓量輕重者白虎通云水之爲言凖也律歷志云繩直生準凖正則平衡而鈞權矣又曰權衡者衡平也權重也衡所以任權而均物平輕重也本起於黃鍾之重一龠容千二百黍重十二銖兩之爲兩兩者兩黃鍾律之重是法律皆所以銓量輕重也矢誓也釋曰相約誓也鄘柏舟云之死矢靡它舫舟也釋曰謂並兩船釋水曰大夫方舟泳游也釋曰謂潛行游水底也邶谷風云泳之游之迨及也釋曰謂相及也注東齊曰迨者方言文也冥㓜也釋曰謂幼少也郭云幼稚者冥昧小雅斯干云噦噦其冥降下也釋曰召南草蟲云我心則降傭均也釋曰謂齊等也小雅節南山云昊天不傭彊暴也釋曰彊梁者好凌暴於物詩序云彊暴之男宨肆也肆力也釋曰宨輕也肆放也輕宨者好放肆肆又爲極力俅戴也釋曰謂頭戴也注詩曰戴弁俅俅者周頌絲衣文也瘞幽也釋曰皆謂薶藏氂罽也釋曰毛氂所以爲罽舎人曰氂謂毛罽也胡人續羊毛而作衣然則罽者織毛爲之若今之毛氍毹以衣馬之帶鞅也烘燎也煁烓也釋曰舎人曰烘以火燎也煁烓竈也郭云烘謂燒燎煁今之三隅竈也然則烓者無釡之竈其上燃火謂之烘夲爲此竈上以燃火照物若今之火鑪也注云見詩者小雅白華云樵彼桑薪卬烘于煁是也陪朝也釋曰臣見君曰朝朝之列位必陪重是陪位爲朝也康苛也釋曰注謂苛刻案苛者毒草名爲政刻急者取譬焉禮記孔子曰苛政猛於虎苛名康者以康安也苛刻者心安之左傳曰州吁阻兵而安忍其類也樊藩也釋曰孫炎曰樊圃之藩也郭曰謂藩蘺藩以細木爲之齊風東方未明云折柳樊圃小雅靑蠅云營營靑蠅止于榛毛傳云榛所以爲藩是也賦量也釋曰謂賦稅也郭云賦稅所以評量方言云平均賦也燕之北鄙東齊北郊凡相賦斂謂之平均是評量也粻糧也釋曰謂糧食也郭云今江東通言粻王制云五十異粻庶侈也庶幸也釋曰冨庶者多奢侈郭云庶者衆多爲奢侈書曰禄不期侈庶又爲幸望郭云庶幾僥倖僥者求見親御也幸與倖通用之筑拾也釋曰拾謂拾掇金縢云凡大木所偃盡起而築之馬融云起其木拾其禾奘駔也釋曰皆謂大也秦晉謂大爲奘郭云今江東呼大爲駔駔猶麤也集㑹也釋曰說文云集若羣鳥在林木之上故曰集指事也故經典通謂聚㑹爲集舫泭也釋曰孫炎曰舫水中爲泭筏也郭云水中竺二稗筏方言云泭謂之竺二稗竺二稗謂之筏筏秦晉狀故郭及毛傳皆言飢意鄭箋以爲思義相接成也眕重也釋曰注云謂厚重見左傳者隱三年衞大夫石碏曰夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣杜注云如此者少也降其身則必恨恨則思亂不能自安自重是也獵虐也釋曰獵謂從禽也必暴害於物故云虐郭云凌獵暴䖒土田也釋曰别地之二名也白虎通云中央者土土主吐含萬物土之爲言吐也釋名云土巳耕者曰田田者塡也五稼塡滿其中也戍遏也釋曰遏止也郭云戍守所以止宼賊春秋公子買戍衞師人也釋曰師衆也周禮大司馬二千五百人爲師故郭云謂人衆硈鞏也釋曰謂牢固易文言云確乎其不可拔又革卦𥘉九云鞏用黃牛之革若如此說硈苦學切當從告說文别有硈苦八切石堅也字雖小異其義則同棄忘也釋曰心遺忘小雅谷風云棄我如遺嚻閑也釋曰嚻然閑暇貌謀心也釋曰謀慮以心獻聖也釋曰郭云謚法曰聦明睿智曰獻謚法者周書篇名也里邑也釋曰謂邑居也論語云里仁爲美王制云凡居民量地以制邑襄除也釋曰謂除去也注詩曰不可襄者鄘風牆有茨文也振古也釋曰言久故也注詩曰振古如兹猶言久若此者案周頌戴芟云匪今斯今振古如兹毛傳去振自也鄭箋云振亦古也言脩德行禮莫不獲報乃古古而如此所由來者久非適今時是也懟怨也釋曰謂怨恨左傳曰以死誰懟缡介也釋曰郭云縭者繫介猶閡以釋水云縭緌也緌繫著則介閡也號謼也釋曰謂叫謼也小雅賔之𥘉筵云載號載呶郭云今江東皆言謼凶咎也釋曰謂咎惡也通見詩書苞稹也釋曰郭云今人呼物叢緻者爲稹孫炎曰物叢生曰苞齊人名曰稹唐風鴇羽云集于苞栩毛傳云苞稹鄭箋云稹者根相迫迮梱緻亦謂叢生也逜寤也釋曰逜謂相干也寐而覺之曰寤郭云相干寤顁題也釋曰皆謂額也注詩曰麟之定者周南麟之趾文也猷肯可也釋曰皆堪可也注詩曰猷來無棄者魏風陟岵文也肯今通言者邶風終風云惠然肯來是也務侮也釋曰謂輕侮也注詩曰外禦其侮小雅常棣文也貽遺也釋曰謂相歸遺詩云貽我握椒貿買也釋曰貿市也又爲買郭云廣二名詩云抱布貿絲賄財也釋曰財帛揔名賄周禮冢宰職云商賈阜通貨賄鄭注云布帛曰賄甲狎也釋曰謂狎習也衞風芄蘭云能不我甲左傳曰水懦民狎而翫之菼騅也菼薍也釋曰廣異言也注詩曰毳衣如菼者王風大車文也毛傳云菼騅也蘆之初生者也鄭箋云菼薍也以傳解菼色未辨草名故定之也郭云菼草色如騅在青白之間者以釋畜云蒼白雜毛騅故也粲䬸也釋曰謂䬸食也郭云今河北人呼食爲䬸鄭風緇衣云還予授子之粲兮鄭箋云自館還在采地之都我則設䬸以授之愛之欲飲食之渝變也釋曰謂變易也詩曰赦命不渝冝肴也釋曰謂肴饌也李廵曰飲酒之肴也注詩曰與子冝之者鄭風女曰雞鳴文也夷恱也釋曰謂喜恱也注詩曰我心則夷者召南草蟲文顚頂也釋曰謂頭上也詩曰有馬白顚耊老也釋曰耊鐵也孫炎曰老人面如鐵色郭云八十爲耊詩秦風車鄰云逝者其耊毛傳云八十曰耊易離卦云大耊之嗟鄭注云年踰七十僖九年左傳曰伯舅耊老服䖍云七十曰耊此及詩傳言八十曰耊者耊有七十八十無正文也詩以仕者七十致事仕者慮己之耊欲得早致事故以爲八十此用詩傳爲說故與之同輶輕也釋曰謂輕微也注詩曰德輶如毛者大雅烝民文俴淺也釋曰謂淺近注詩曰小戎俴收者秦風小戎文也綯絞也釋曰謂糾絞繩索也李廵曰綯繩之絞也豳七月云宵爾索綯訛化也釋曰匡正之化也注詩曰四國是訛者豳風破斧文跋躐也疐跲也釋曰李廵曰跋前行曰躐跲郤頓曰疐注詩云狼跋其胡載疐其尾者豳風狼跋文也說文云跋蹎丁千切跲躓竹二切躓即疐也然則跋與疐皆是顚倒之類以跋爲躐者謂跋其胡而倒躓耳毛傳云老狼有胡謂頜下垂胡進則躐其胡謂躐胡而前倒也退則跲其尾謂郤頓而倒於尾上也烝塵也釋曰孫炎云烝物乆之塵小雅南有嘉魚云烝然罩罩郭云人衆所以生塵埃戎相也釋曰戎相也如字注同一云相助也息亮切故注云相佐助也飫私也釋曰孫炎曰飫非公朝私飲酒也郭云宴飲之私小雅常棣云飲酒之飫毛傳云飫私也不脫屨升堂謂之飫鄭箋云私者圖非常之事若議大疑於堂則有飫禮焉聽朝爲公周語曰王公立飫孺屬也釋曰李廵云孺骨肉相親屬也常棣云和樂且孺毛傳云九族㑹曰和孺屬也鄭箋云屬者昭穆相次序幕暮也釋曰幕然暮夜也煽熾也熾盛也釋曰轉相解也皆嬖寵熾盛也注煽義見詩者小雅十月之交云豔妻煽方處柢本也釋曰謂根本也周禮典瑞云四圭有邸鄭司農云於中央爲璧圭著其四面一玉俱成即引此文云邸本也圭本著於璧故四圭有邸圭末四出故也又曰兩圭有邸後鄭云僢而同邸皆謂本也柢邸音義同窕間也釋曰窈窕間隙也詩周南關雎云窈窕淑女毛傳云窈窕幽間鄭箋云幽閒深宫皆謂淑女所處之宫形狀窈窕然淪率也釋曰謂相牽率郭云相率使小雅雨無正云無淪胥以鋪罹毒也釋曰釋詁云罹憂也郭云憂思慘毒小雅小弁云我獨于罹檢同也釋曰檢模範也郭云模範同等說文云書署也郵過也釋曰郵謂郵亭過經過也郭云道路所經過郊特牲云郵表畷遜遯也釋曰謂逃去也春秋莊元年夫人姜氏孫于齊公羊傳曰孫者何孫猶孫也内諱奔謂之孫榖梁傳曰孫之猶言爲孫諱奔也斃踣也僨僵也釋曰前郤顚倒之名也斃又謂之踣皆前覆也檀弓云射之斃鄭注云斃仆也然則又爲仆僨謂之僵皆卻偃也左傳曰鄭伯之車僨於濟畛殄也釋曰謂殄絶也周頌載芟云徂隰徂畛毛傳曰畛場也地官遂人云十夫有溝溝上有畛則畛謂地畔之徑路也至此而易之故以畛爲場易則地絶故得爲殄曷盍也釋曰郭云盍何不也論語曰盍各言爾志虹潰也釋曰潰敗亂也大雅抑篇云實虹小子召旻云蟊賊内訌陪闇也釋曰謂冥昧也郭云隌然冥貌䵑膠也釋曰膠黏䵑也方言云䵑􅭓黏也齊魯靑徐自關而東或曰䵑或曰􅭓孔甚也厥其也戞禮也釋曰孔甚厥其通見詩書釋詁云戞常也故郭云謂常禮闍臺也釋曰謂城門臺也鄭風云出其闉闍毛傳云闉曲城也闍城臺也囚拘也釋曰謂拘執也月令云梃重囚左傳曰南冠而縶者楚囚也縶則拘執也攸所也展適也釋曰易曰利有攸往郭云得自申展皆適意也鬱氣也釋曰鬱然氣出也謂鬱烝之氣也宅居也釋曰謂居處也大雅文王有聲云宅是鎬京休慶也釋曰謂嘉慶也商頌曰何天之休祈叫也釋曰祈猶禱也求也春官大祝掌六祝之辭以祈福祥求永貞郭云祈祭者叫呼而請事濬幽深也哲智也釋曰舎人曰濬下之深也哲大智也郭云濬亦深也虞書舜典云濬哲文明孔安國云舜有深智言其智之深所知不淺近也弄玩也釋曰謂玩好也小雅斯干云載弄之璋鄭箋云玩以璋者欲其比德焉尹正也皇匡正也釋曰正長也郭云謂官正也言爲一官之長也周書君陳曰尹兹東郊皇君威之正匡救諫之正孝經云匡救其惡注詩曰四國是皇者豳風破斧文也服整也釋曰謂整治也郭云服御之今齊整周南葛覃云服之無斁聘問也釋曰問謂存省之對而言之則聘問異周禮大行人云時聘以結諸侯之好閒問以諭諸侯之德又曰凡諸侯之邦交歳相問也殷相聘也聘禮云小聘曰問是異也散而言之皆謂相存省故此云聘問也注見榖梁傳者案隱九年春天王使南季來聘榖梁傳曰南氏姓也季字也聘問也是其事愧慙也釋曰謂慙恥也小爾雅云不直失節謂之慙慙愧也面慙曰戁心慙曰恧體慙曰逡方言云梅㥾音匿𧹞愧也晉曰梅或曰㥾秦晉之間凡愧而見上謂之𧹞梁宋曰㥾又云㥏音腆恧女六切慙也荆揚靑徐之間曰㥏若梁益秦晉之閒言心内慙矣山之東西自愧曰恧趙魏之間謂之䎵音密亦一音祕殛誅也釋曰謂誅責注書曰鮌則殛死者周書洪範文克能也翌明也釋曰克能通見書傳注書曰翌日乃瘳者周書金縢文訩訟也釋曰多爭訟郭云言訩譊譊即讙譊小雅節南山云降此鞫訩晦冥也奔走也逡退也釋曰冥謂闇㝠見公羊傳奔大走也左傳曰車馳卒奔逡却退也注外傳曰巳復於事而逡者齊語管仲對桓公辭也韋昭曰巳畢也逡伏退也此國語也而謂之外傳者韋昭曰左丘明采録前丗穆王以來下訖魯悼智伯之誅邦國成敗嘉言善語隂陽律吕天時人事逆順之數以爲國語其文不主於經故號曰外傳也疐仆也釋曰即前文跲與踣也郭云頓躓倒仆亞次也諗念也釋曰亞下次也通見書傳諗者相思念也小雅四牡云將母來諗届極也釋曰有所限極也大雅瞻卬云靡有夷届弇同也弇蓋也釋曰廣異言也注詩曰奄有龜蒙魯頌閟宫文言弇覆同爲巳有弇又爲蓋謂覆蓋也易曰惡積而不可揜弇奄揜音義同恫痛也釋曰謂痛傷注詩曰神罔時恫大雅思齊文王肅云文王之德能上順祖宗安寧百神無失其道無所怨痛握具也釋曰主持辦具也郭云謂備具李夲作幄釋云居位處之具也秦風權輿云夏屋渠渠鄭箋云屋具也義其同乎振訊也釋曰謂振訊去塵也郭云振者奮訊曲禮曰振書端書䦧恨也釋曰郭云相怨恨孫炎本作很解云相很戾小雅常棣云兄弟䦧于牆毛傳云䦧很也很者忿爭之名曲禮曰很無求勝以字形異濫故釋者致殊於義兩解得之越揚也對遂也釋曰揚謂稱美郭云謂發揚遂者因事之辭注詩曰對揚王休者大雅江漢文燬火也釋曰李巡曰燬一名火孫炎曰方言有輕重故謂火爲燬郭云燬齊人語方言云堁呼隗切火也楚轉語也猶齊言􅛚音毀火也注詩曰王室如燬者周南汝墳文懈怠也釋曰謂惰慢也大雅烝民云夙夜匪懈宣緩也釋曰謂寛緩也遇偶也釋曰郭云偶爾相值遇春秋隱八年春宋公衞侯遇于垂榖梁曰不期而㑹曰遇曩曏也釋曰在今而道旣往或曰曩或曰曏書大傳云曏之取於囿中勇力之取也注國語曰曩而言戯也者案晉語驪姬與優施謀飲里克酒乃歌曰暇豫之吾吾不如鳥烏人皆集於苑巳獨集於枯里克笑曰何謂苑何謂枯優施曰其母爲夫人其子爲君可不謂苑乎其母旣死其子又有謗可不謂枯乎枯且有傷優施出里克辟奠不餐而寢夜半召優施曰曩而言戯乎如有所聞之乎是也偟暇也釋曰謂閒暇注詩曰不遑啓處者小雅駟牡文宵夜也釋曰舎人曰宵陽氣消也詩云肅肅宵征書曰宵中星虚懊忨也愒貪也釋曰皆謂愛忨貪羨也昭元年左傳云主民翫歳而愒日杜注云翫愒皆貪也榰柱也釋曰郭云相榰柱也說文云榰柱砥古用木今以石字書云柱屋之敧裁節也並併也釋曰易泰卦云后以財成天地之道裁財音義同並併古今字注詩曰並坐鼔瑟者秦風車鄰篇文卒旣也釋曰皆謂盡巳也慒慮也釋曰郭云謂謀慮也字書作悰將資也釋曰行所資也郭云謂資裝黹紩也釋曰謂縫刺也郭云今人呼縫紩衣爲黹鄭注司服云黼黻希繡希讀爲黹謂刺繡也遞迭也釋曰李巡曰遞者更迭閒厠相代之義邶柏舟云胡迭而微矧況也釋曰說文云矧況辭從矢取辭之所之如矢也郭云譬況謝氏云志譬況是也廪廯也釋曰廣雅云廯倉也則廩廯皆囷倉之别名孫炎云廯藏榖鮮絜也舎人云廪少鮮也郭云或說云即倉廩所未詳逭逃也釋曰謂遁逃商書大甲云自作孽不可逭注亦見禮記者案緇衣云子曰小人溺於水君子溺於口大人溺於民皆在其所褻也下云太甲曰天作孽可違也自作孽不可以逭訊言也釋曰訊問以言也郭云相問訊詩云執訊獲醜閒俔也釋曰反閒一名俔今之細作也注左傳謂之諜者案桓十二年云使伯嘉諜之杜注云諜伺也兵書謂之反閒也案說文云諜軍中反閒也謂詐爲敵國之人入其軍中伺候閒隙以反報其主又鄭注周禮掌戮云諜謂姦㓂反閒者沄沆也釋曰說文云沄轉流也一曰沆郭云水流漭沆漭沆水大貌干杆也釋曰郭云相扞衞孫炎曰干盾自蔽扞周南兔罝云公侯干城言公侯以武夫自固爲杆蔽如盾爲防守如城然趾足也䠊刖也釋曰易云賁其趾趾則足也亦謂之脚䠊一名刖斷足刑也吕刑云剕罰五百孔安國云刖足曰剕鄭注司刑云刖斷足也周改臏作刖䠊剕音義同襄駕也釋曰謂乗駕也鄭風大叔于田云兩服上襄注書曰懷山襄陵堯典文忝辱也燠煖也釋曰忝謂恥辱也詩曰無忝爾所生煖温也洪範云晢時燠若郭云今江東通言燠塊堛也釋曰塊者結土也說文云塊俗凷字也凷一名堛郭云土凷也注外傳曰枕由以堛釋曰案吴語吴王夫差旣許越成乃大戒師徒將以伐齊申胥進諫曰昔楚靈王不君其臣箴諫不入乃築臺於章華之上闕爲石郭陂漢以象帝舜罷弊楚國以間陳蔡不脩方城之内踰諸夏而圖東國三歳於沮汾以服吴越其民不忍饑勞之殃三軍叛王於乾谿王親獨行屏營仿偟於山林之中三日乃見其㳙人疇王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以墣而去之王覺而無見乃匍匐將入於棘圍棘圍不納也乃入芊尹申亥氏焉是其事也說文云墣匹角切亦塊也今注云枕凷者字之誤也凷當作王又外傳作墣郭云以堛者蓋亦理同或所見本異也將齊也釋曰郭云謂分齊也詩曰或肆或將者小雅楚茨文毛傳云肆陳將齊也或陳于牙或齊其肉王肅云分齊其肉所當用也餬饘也釋曰郭云糜也下云鬻糜郭云淖糜然則餬饘鬻糜相類之物稠者曰糜淖者曰鬻餬饘是其別名昭七年左傳云饘於是鬻於是以餬余口啓跪也釋曰謂跪拜也小雅四牡云不遑啓處郭云小跽說文曰跽長跪也莊子云擎跽曲拳臣之禮也矏密也釋曰郭云謂緻密開闢也釋曰注書曰闢四門虞書舜典文袍襺也釋曰玉藻云纊爲繭緼爲袍鄭玄云衣有著之異名也纊謂今之新緜緼謂今之纊及舊絮也然則繭是袍之別名謂新緜著袍者也注左傳曰重衣裘者襄二十一年傳云楚子使薳子馮爲令尹遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢是也障畛也釋曰郭云謂壅障一名畛左傳曰封畛土略靦姡也釋曰郭云面姡然孫炎曰靦人面姡然說文曰靦面見人姡面靦也然則靦與姡皆面見人之貌詩云有靦面目舒緩也釋曰郭云謂遟緩詩云舒而脫脫兮翿纛也纛翳也釋曰李巡曰翿舞者所持纛也孫炎曰纛舞者所持羽也郭云今之羽葆幢鄭司農注郷師云翿羽葆幢也蔡邕獨斷云以旄牛尾爲之大如斗在左騑馬頭上所謂黃屋左纛纛又謂之翳郭曰舞者所以自蔽翳然則翿一名爲纛纛所以爲翳故王風云左執翿毛傳云翿纛也翳也隍壑也釋曰隍城池無水者郭云城池空者爲壑易泰卦上六城復於隍芼搴也釋曰孫炎曰皆擇菜也某氏曰搴猶敎也郭云謂拔取菜以搴是拔之義史記曰斬將搴旗謂拔取敵人之旗也周爲關雎云參差荇菜左右芼之故云謂拔取菜毛傳云芼擇亦謂拔菜而擇典經也威則也釋曰周禮大宰之職掌建邦之六典鄭注云典常也經也也王謂之禮經常所秉以治天下也邦國官府謂之禮法常所守以爲法式也常者其上下通名郭云威儀可法則詩曰敬愼威儀維民之則苛妎也釋曰說文云妎妬也郭云煩苛者介嫉妎言煩苛之人多嫉妬芾小也釋曰芾易木榦及葉之小者也召南云蔽芾甘棠此比於大木爲小也我行其野云蔽芾其樗鄭箋云樗之蔽芾始生謂樗葉之始生形亦小也郭云芾者小貌迷惑也狃復也釋曰小雅節南山云俾民不迷謂不惑也狃復習也郭云狃忕復爲孫炎云狃忕前事復爲也說文云狃狎也忕習也鄭風云將叔無狃毛傳云狃習也桓十三年左傳云莫敖狃於蒲䮳之役杜注云狃忕也然則狃忕皆貫習之義復亦貫習之意也逼迫也般還也釋曰逼相急迫也般還反也注左傳曰般馬之聲者襄十八年晉大夫邢伯告中行伯之辭也班賦也釋曰郭云謂布與桓六年左傳云諸侯之大夫戍齊齊人饋之餼使魯爲其班聘禮記云朌肉及廋車班朌音義同左傳曰屬役賦文濟渡也濟成也濟也釋曰郭云所以廣異訓各隨事爲義方言云過渡謂之渉濟彼注云猶今云濟渡左傳曰濟河焚舟濟又爲成左傳曰以欲從人則可以人從欲鮮濟濟又爲增益左傳曰濟師於王緡綸也釋曰孫炎云皆繩名也郭云緡繩也江東謂之論注說曰維終伊緡將召南何彼纔矣文漦盝也釋曰李廵云壯沬釐也郭云漉漉出涏浨鄭語云訓語有之曰夏之衰也襃人之神化爲二龍以同于王庭而言曰余襃之二君夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉韋昭云漦龍所吐沬龍之精氣也寛綽也釋曰孫炎云性之裕者郭云謂寛裕也臯陶謨云寛而栗衮黻也釋曰郭云衮衣有黻文小雅采菽云玄衮及黼衮必兼有黼黻詩但言及黼嫌於無黻故此釋之毛傳云玄衮卷龍也白與黒謂之黼鄭箋云玄衮玄衣而畫以卷龍也黼黼黻謂絺衣也諸公之服自衮冕而下華皇也釋曰草木之華一名皇樊光引詩云皇皇者華孫炎云皇皇猶煌煌郭云釋草曰皇華榮引之以證皇亦華榮之名昆後也釋曰郭云謂先後方俗語大禹謨云官占惟先蔽志昆命于元龜彌終也釋曰郭云終竟也大雅生民云誕彌厥月言大矣后稷之在其母終人道十月而生也爾雅䟽卷第三
