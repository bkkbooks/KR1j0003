  text: 爾雅疏卷第九
  hash: sha256:d4a516422c935a02eac4971eacf5dd20a6261d2ff15adbaad3683c0491f80e4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_009-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋木第十四釋蟲第十五釋魚第十六釋木第十四釋曰説文云木冒也冒地而生東方之行也白虎通云木觸也陽氣動躍觸地而出也種名雖多木為揔號此篇析別故云釋木也槄山檟釋曰李巡云山檟一名槄郭云今之山楸詩秦風云終南何有有條有梅陸機疏云槄今山楸也亦如下田楸耳皮葉白色亦白材理好冝為車板能溼又可為棺木冝陽共北山多有之栲山樗釋曰舍人曰栲名山樗郭云栲似樗色小曰生山中因名云亦類漆樹俗語曰櫄樗栲漆相似如一詩唐風云山有栲陸機疏云山樗與下田樗略無異葉似差狹耳吳人以其葉為茗方俗無名此為栲者似誤也今所云為栲者葉如櫟木皮厚數寸可為車輻或謂之栲櫟許愼正以栲讀為糗今人言栲失其聲耳柏椈釋曰柏一名椈注禮記曰鬯臼以掬詩大雅皇矣云其灌其栵陸機疏云葉如榆也木理堅韌而赤可為車轅郭云樹似槲樕而􅋻小子如細栗可食今江東亦呼為栭栗禮記內則云芝栭菱椇是也穫落釋曰穫一名落某氏曰可作杯圈皮韌繞物不解郭云可以為杯器素素謂朴也小雅大東云無浸穫薪鄭箋云穫落木名陸機疏云今榔榆也其葉如榆其皮堅韌剝之長數尺可為絙索又可為甑帶其材可為杯器是也柚條釋曰柚一名條郭云似橙實酢生江南禹貢揚州云厥苞橘柚孔安國云小曰橘大曰柚吕氏春秋云果之美者有雲夢之柚本草唐本注云柚皮厚味甘不如橘皮味辛而苦其肉亦如橘有甘有酸酸者名胡甘今俗人或謂橙為柚非也時英梅釋曰時一名英梅郭云雀梅似梅而小者也楥匱桏釋曰楥一名匱桏郭云未詳或曰桏當為柳匱桏似柳皮可煮作飲以時驗而知也栩杼釋曰栩一名杼郭云柞樹詩唐風云集于苞栩陸機疏云今柞櫟也徐州人謂櫟為杼或謂之為栩其子為皂或言皂斗其殼為汁可以染皂今京洛及河內言杼斗謂櫟為杼五方通語也藲荎釋曰别二名也郭云今之刺榆詩唐風云山有樞陸機疏其針刺如柘其葉如榆草瀹為茹美滑於白榆也榆之類有十種葉皆相似皮及木理異耳杜甘棠釋曰杜一名甘棠郭云今之杜梨下云杜赤棠白者棠舍人曰杜赤色名赤棠白者亦名棠然則其白者名棠其赤者為杜為甘棠為赤棠詩召南云蔽芾甘棠小雅云有杕之杜傳云杜赤棠是也朹檕梅釋曰朹一名檕梅郭云朹樹狀似梅子如指頭赤色似小㮈可食魄榽橀釋曰魄一名榽橀郭云魄大木細葉似檀今江東多有之齊人諺曰上山斫檀榽橀先殫殫訓盡也梫木桂釋曰梫一名木桂郭云今南人呼桂厚皮者為木桂桂樹葉似枇杷而大白華華而不著子叢生巖嶺枝葉冬夏常靑間無雜木案夲草謂之牡桂者是也棆無疵釋曰棆蓁也無疵病因名之郭云棆楩屬似豫章案楩及豫章皆南方大木之名也椐匱釋曰別二名也郭云腫節可以為杖詩大雅皇矣其柳其椐陸機疏云節中腫以扶老今人以為馬鞭及杖恆農郡北山甚有之柳河柳釋曰柳一名河柳郭云今河旁赤莖小楊陸機疏云生水旁皮正赤如絳一名雨師枝葉似松旄澤柳釋曰柳生澤中者别名旄郭云生澤中者楊蒲柳釋曰楊一名蒲柳生澤中可為箭笴注左傳所謂董澤之蒲釋曰按左傳宣十二年晉楚戰于邲晉師敗績楚熊負羈囚知罃知莊子以其族反之厨武子御下軍之士多從之每射抽矢菆納諸厨子之房厨子怒曰非子之求而蒲之愛董澤之蒲可勝既乎杜注云董澤澤名河東聞喜縣東北有董池陂既盡也是其事也杜赤棠白者棠釋曰郭云棠色異異其名樊光云赤者為杜白者為棠陸機疏云赤棠與白棠同耳但子有赤白美惡子白色為白棠甘棠也少酢滑美赤棠子澀而酢無味俗語云澀如杜是也赤棠木理韌亦可以作弓幹諸慮山櫐釋曰諸慮一名山櫐郭云今江東呼櫐為藤似葛而粗大欇虎櫐釋曰欇一名虎櫐郭云今虎豆纒蔓林樹而生莢有毛刺今江東呼為㯿或曰葛類也子如菉豆而葉大𣏌枸檵釋曰𣏌一名枸檵郭云今枸𣏌也詩小雅四牡云集于苞𣏌陸機疏云一名苦𣏌一名地骨春生羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣耳杬魚毒釋曰杬一名魚毒郭云杬大木子似栗生南方皮厚汁赤中藏卵果檓大椒釋曰檓者大椒之別名也郭云今椒樹叢生實大者名為檓詩唐風云椒聊且陸機疏云椒樹似茱茰有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香今成臯諸山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥也可著飲食中又用蒸雞豚最佳香東海諸島上亦有椒樹枝葉皆相似子長而不圎甚香其味似橘皮島上獐鹿食此椒葉其肉自然作椒橘香楰鼠梓釋曰李巡云鼠梓一名楰郭云楸屬也今江東有虎梓詩小雅云北山有楰陸機疏云其樹葉木理如楸山楸之異者今人謂之苦楸是也楓欇欇釋曰説文云楓木厚葉弱枝善搖一名欇欇郭云楓樹似白楊葉圎而岐有脂而香今之楓香是也本草唐本注云樹髙大葉三角商洛之間多有之是也又山海南荒經云有宋山者木生山上名曰楓木楓木蚩尤所棄其桎梏是謂楓木注云即今楓香樹也寓木宛童釋曰寓木一名宛童郭云寄生樹一名蔦詩小雅頍辨云蔦與女蘿陸機疏云蔦一名寄生葉似當盧子如覆盆赤黑恬美是也無姑其實夷釋曰無姑一名姑榆其實名夷郭云無姑姑榆也生山中葉圎而厚剝取皮合漬之其味辛香所謂無夷云所謂者所謂本草無夷一名無姑也櫟其實梂釋曰櫟似樗之木也梂盛實之房也孫炎曰櫟實橡也郭云有梂彚自裹詩秦風云山有苞櫟陸機疏云秦人謂柞櫟為櫟河內人謂木蓼為櫟椒榝之屬也其子房生為梂木蓼子亦房生故説者或曰柞櫟或曰木蓼機以為此秦詩也冝從其方土之言柞櫟是也檖羅釋曰檖一名羅郭云今楊檖也實似梨而小酢可食詩秦風云隰有樹檖陸機疏云檖一名赤羅一名山梨也今人謂之楊檖實如梨但小耳一名鹿梨一名朂梨今人亦種之極有脆美者亦如梨之美者楔荆桃至山桃釋曰别桃類也楔一名荆桃郭云今櫻桃廣雅云櫻桃含桃也月令仲夏云羞以含桃是也桃子冬熟者名旄生山中者名榹桃郭云實如桃而小不解核休無至赤李釋曰别李屬也李之無實者名休郭云一名趙李痤椄慮李郭云今之麥李與麥同熟因名云李之子赤者名駁棗壷棗至棯棗釋曰别棗類也云棗者目諸棗也壷棗者棗形似壷也郭云今江東呼棗大而鋭上者為壷壷猶瓠也邊大而腰細者名邊腰棗郭云子細腰今謂之鹿盧棗棗子白熟者名櫅實小而味酢者名樲棗楊徹齊棗注未詳遵一名羊棗郭云實小而貟紫黑色今俗呼之為羊矢棗洗最大之棗名也郭云今河東猗氏縣出大棗子如雞卵煮填棗注未詳蹶泄者味苦之棗名也晳者無實之棗名也還味者短味也名棯棗注孟子曰養其樲棗釋曰案孟子曰人之於身也體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人今有場師舍其梧檟養其樲棗則為賤場師焉趙歧注云樲棗小棗所謂酸棗是也注孟子曰曽晳嗜羊棗釋曰孟子云曽晳嗜羊棗而曽子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曽子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也是其事櫬梧釋曰櫬一名梧郭云今梧桐詩大雅云梧桐生矣于彼朝陽是也朴枹者釋曰朴屬枹綴皆木叢生之名也郭云朴屬叢生者為枹注詩所謂棫朴枹櫟釋曰棫朴者詩大雅云芃芃棫朴薪之槱之是也枹櫟者秦風云山有苞櫟隰有六駁是也謂櫬采薪采薪即薪釋曰郭云指解今樵薪一名櫬一名采薪一名即薪公羊謂之薪采左傳云不樵樹史記云樵蘇後爨師不宿飽注云樵取薪蘇取草皆謂取草木為薪也棪樕其釋曰棪一名樕其郭云棪實似奈赤可食山海經云堂庭之山多棪木注云子似奈而赤可食是也劉劉杙釋曰劉一名劉杙其子可食郭云劉子生山中實如梨酢甜核堅出交趾櫰槐大葉而黑釋曰櫰槐一也大葉而黑名櫰不爾者即名槐郭云槐樹葉大色黑者名為櫰守宫槐葉晝聶宵炕釋曰此亦槐也聶合也炕張也言其葉晝合夜開者别名守宫槐郭云槐葉晝日聶合而夜炕布者名為守宫槐槐小至皵檟釋曰别楸檟之異也楸之小葉者名檟樊光云大者老也皵措皮也謂樹老而皮粗皵者為楸小少也樹少而皮粗皵者為檟注左傳曰使檡美檟釋曰案襄二年夏齊薑薨𥘉穆薑使擇美檟以自為櫬與頌琴季文子取以葬是其事也椅梓釋曰别二名也郭云即楸詩鄘風云椅桐梓漆陸機疏云梓者楸之疏理白色而生子者為梓梓實桐皮曰椅則大類同而小别也桋赤梀白者梀釋曰梀赤者名桋白者即名梀某氏曰其色雖異為名即同郭云赤梀樹葉細而岐鋭皮理錯戾好叢生山中中為車輞白梀葉貟而岐為大木也詩小雅云隰有𣏌夷陸機疏云梀葉如柞皮薄而白其木理赤者為赤梀一名夷白者為梀其木皆堅韌今人以為車轂終牛棘釋曰終一名牛棘郭云即馬棘也其刺粗而長謂棘之針刺粗長者因名牛棘馬棘也灌木叢木釋曰灌木者即叢生之木也下云木族生為灌郭云族叢也是灌木為叢木也詩周南云黃鳥于飛集于灌木是也瘣木苻婁釋曰某氏云詩云譬彼瘣木疾用無枝苻婁尪傴內疾瘣磊故疾用無枝郭云謂木病尪傴癭腫無枝條舍人曰苻婁屬下句獨為異也蕢藹釋曰蕢亦樹實名又名藹郭云樹實繁茂菴藹枹遒木魁瘣釋曰木叢攢迫而生者名枹遒木魁瘣讀若磈磊謂根節盤結處也郭云謂樹木叢生根枝節目盤結磈磊棫白桵釋曰棫一名白桵郭云桵小木叢生有刺實如耳璫紫赤可啖詩大雅云芃芃棫朴陸機云三蒼説棫即柞也其材理全白無赤心者為白桵直理易破可為櫝車輻又可為矛戟矜今人謂之白梂或曰白柘此二説不同未知孰是梨山樆釋曰梨生山中者名樆郭云即今梨樹言其在山之名則曰樆人植之曰梨桑辨有椹梔釋曰説文云甚桑實也郭云辨半也舍人云桑樹一半有椹半無椹為梔女桑桋桑釋曰女桑一名桋桑郭云今俗呼桑樹小而條長者為女桑樹詩幽風七月云猗彼女桑是也榆白枌釋曰榆之皮色白者名枌郭云枌榆先生葉却著莢皮色白詩陳風云東門之枌是也唐棣栘釋曰舍人曰唐棣一名栘郭云似曰楊江東呼夫栘詩召南云唐棣之華陸機云奧李也一名雀梅亦曰車下李所在山皆有其華或白或赤六月中熟大如李子可食常棣棣釋曰舍人曰常棣一名棣郭云今山中有棣樹子如櫻桃可食詩小雅云常棣之華陸機疏云許愼曰白棣樹也如李而小子如櫻桃正白今官園種之又有赤棣樹亦似白棣葉如刺榆葉而微貟子正赤如郁李而小五月始熟自關西天水隴西多有之檟苦荼釋曰檟一名苦荼郭云樹小似梔子冬生葉可煮作羮飲今呼早采者為荼晚取者為茗一名荈蜀人名之苦荼樕朴心釋曰孫炎曰朴樕一名心某氏曰朴􅈪槲樕也有心能濕江河間以作柱是朴樕為木名也故郭云槲樕别名詩召南云林有朴樕此作樕朴文雖倒其實一也或者傳寫誤榮桐木釋曰桐木一名榮郭云即梧桐與上櫬梧一也棧木干木釋曰棧木一名干木郭云橿木也江東呼木觡檿桑山桑釋曰山桑一名檿桑郭云似桑材中作弓及車轅冬官考工記云弓人取幹柘為上檿桑次之是也木自弊至梢梢棹釋曰此别死頓相磨皮甲抽擢之異名也云木者揔在下之稱也自弊踣者名柛立死不弊頓者名椔枝葉蔽蔭覆地者名翳木兩枝相切磨者名槸木皮甲粗錯者名措亦名柯木無枝相長而殺者名梢一名梢棹小爾雅曰柭根曰棹注詩云其椔其翳釋曰詩大雅皇矣篇文也毛傳云木立死曰災自斃為翳説者引李巡曰以當死害生曰災斃死也然則以立死之木妨他木生長為木之害故曰災也自斃者生木自倒枝葉覆地為隂翳故曰翳也爾雅直云斃者詩傳以其非人斃之故曰自斃其文與此不同者所見本異也樅松至松身釋曰此辨樅檜之異名也松葉柏身者名樅柏葉松身者名檜注今大至美樅釋曰云今大廟梁材用北木者以時驗而言也云尸子所謂巳下者綽子篇文也注詩曰檜楫松舟釋曰詩鄘風竹竿篇文也毛傳云楫所以棹舟是也句如至如槐曰茂釋曰此别木之曲直叢生茂盛之異名也句曲也樹枝曲卷似鳥毛羽名喬樹枝下垂而曲名朻詩周南云南有樛木是也木枝上竦而曲卷者亦名喬如木楸上竦者亦曰喬郭云楸樹性上竦詩周南云南有喬木是也凡木如竹箭叢生者曰苞禹貢曰草木漸包是也凡木枝葉婆娑者曰茂詩小雅云如松柏之茂是也枝葉扶踈茂盛如槐者亦曰茂槐棘至醜核釋曰此辨木之枝條子實形狀之異醜類也喬髙也槐棘之類枝皆翹竦桑柳之類皆阿那垂條莍者實之房也椒榝之類實皆有莍彚自裹李巡曰榝茱茰也椒茱茰皆有房故曰莍莍實也郭云莍蓃子聚生成房貌今江東亦呼莍榝似茱茰而小赤色桃李之類皆子中有核人曲禮云其有核者懷其核瓜曰至鑽之釋曰此辨啖食治擇瓜果之名也云瓜曰華之者此為國君削瓜之禮也華謂半破也降於天子故破而不四析也亦橫斷之而巾以綌也云桃曰膽之者桃多毛拭治去毛令色青滑如膽也或曰膽謂苦桃有苦如膽者擇去之云棗李曰疐之者謂治棗李皆去其疐疐者柢也云樝梨曰鑽之者恐有蟲故一一鑽看其蟲孔也注皆啖至禮記釋曰云樝似梨而酢澀者案鄭注禮記內則云柤梨之不臧者今之所謂樝子者是也云見禮記者案曲禮云為天子削瓜者副之巾以絺為國長呼為吐古案方言云蚰􅣓由延二音自關而東謂之蚓􅣓或謂之入耳或謂之䗅􅫡音麗趙魏之間或謂之蚨虶扶于二音北燕謂之䖡蚭䖡奴六切蚭音尼江東人呼蛩音鞏皆今蚰蜒喜入人耳者也蜩蜋蜩至螇螰釋曰此辨蟬之大小及方言不同之名也云蜩者目諸蜩也蜋蜩五彩貝者也螳蜩俗呼胡蟬似蟬而小鳴聲淸亮者也蚻一名蜻蜻如蟬而小有文者也蠽一名茅蜩似蟬而小靑色者也蝒一名馬蜩一名馬蟬蟬中最大者也霓一名寒蜩又名寒螿似蟬而小靑赤色者也關東謂蟪蛄為蜓蚞齊謂之螇螰也注夏小至彩具釋曰在五月記時也注夏小至音荑釋曰云螳蜩者蝘者亦在五月舍人曰皆蟬也方語不同三輔以西為蜩梁宋以東謂蜩為蝘陸機云螳一名蝘虭字林虭或作嘹也靑徐人謂之螇螰然則螳蝘亦皆蟬也大雅蕩篇云如蜩如螳是也注如蟬至虎縣釋曰舍人曰小蟬也蜻蜻者案方言云蟬楚謂之蜩宋衛之間謂之螳蜩陳鄭之間謂之蜋蜩秦晉之間謂之蟬海岱之間謂之䗁其小者謂之麥蚻有文者謂之蜻蜻是也詩碩人云螓首蛾眉鄭云螓謂蜻蜻此蟲額廣而且方故以比婦人之首也某氏解此云鳴蚻蚻者也云夏小正曰者在四月彼云鳴蚻蚻者虎縣也鳴而後知之故先鳴而後蚻是也注月令曰寒蟬鳴釋曰在七月鄭注云寒蟬寒蜩謂霓也是注即蝭至螇螰釋曰案方言云蛥蚗音折玦齊謂之螇螰楚謂之蟪蛄楚辭云蟪蛄鳴兮啾啾是也或謂之蛉蛄音零秦謂之蛥蚗自關而東謂之虭蟧貂料二音或謂之蝭蟧音帝或謂之蜓蚞然則亦皆蟬之別名耳蛣蜣蜣蜋釋曰蛣蜣一名蜣蜋黑甲翅在甲下噉糞土喜取糞作丸而轉之莊子曰蛣蜣之智在於轉丸是也蝎蛣􅔒釋曰木中蠧蟲解在下蠰齧桑釋曰蠰一名齧桑江東呼齧髮形似天牛長角體有白點喜齧桑樹作孔入其中因名云蜉蝣渠略釋曰舍人曰蜉蝣一名渠略南陽以東曰蜉蝣梁宋之間曰渠略似蛣蜣身狹而長有角黃色叢生糞土中朝生暮死豬好啖之夏小正曰蜉蝣渠略也朝生而莫死詩曹風云蜉蝣之羽陸機疏云蜉蝣方土語也通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美如蟬也樊光謂之糞中蝎蟲隨隂雨時為之朝生而夕死蛂蟥蛢釋曰蛂一名蟥蛢甲蟲也形大如虎豆緑色蠸輿父守瓜釋曰蠸輿父一名守瓜黃甲小蟲喜食瓜葉因名守瓜蝚蛖螻注蛖螻螻蛄類釋曰案方言蛄詣謂之杜蛒音格螻蛭謂之螻蛄音窒或謂之蟓蛉象鈴二音南楚謂之杜狗或謂之蛞螻然則此言蝚及蛖螻者亦螻蛄之異名耳蛄䗐強䖹釋曰方言云蛄䗐謂之強蛘今米榖中小黑蠹蟲也江東謂之加蟲音加建平人呼䖹子音楚姓芉之芉不過蟷蠰其子蜱蛸釋曰不過一名蟷蠰一名螳蜋螵蛸母也其子一名蜱蛸一名䗚蟭一名螵蛸蟷蠰卵也方言云談魯以南謂之蟷蠰三河之域謂之螳蜋燕趙之際謂之食厖齊𣏌以東謂之馬榖其子同名螵蛸也月令仲夏云螳蜋生是也蒺藜蝍蛆釋曰蒺藜一名蝍蛆廣雅云蝍蛆蜈蚣也郭云似蝗而大腹長角能食蛇腦則非蜈蚣也莊子云蝍蜇甘帶是也蝝蝮蜪釋曰蝝一名蝮蜪蝗子未有翅者春秋宣十五年冬蝝生是也注外傳曰蟲舍蚳蝝釋曰此魯語里革諫宣公之辭也韋氏解曰蚳蟻子也可以為醢蝝蝮蜪也可食舍不取也蟋蟀蛬釋曰蟋蟀一名蛬今促織也亦名青􅖹詩唐風云蟋蟀在堂歲聿其莫陸機疏云蟋蟀似蝗而小正黑有光澤如􅃮有角翅一名蛬一名蜣􅖹楚人謂之王孫幽州人謂之趨織里語曰趨織鳴懶婦驚是也蟼蟆注蛙類釋曰此自一種蝦蟆也蛝馬䗃釋曰蛝蟲一名馬䗃一名馬蠲蚐俗呼馬􅢡方言云馬蚿音弦北燕謂之蜇蟝音子余切其大者謂之馬柚音逐是也蛗螽至蠰溪釋曰蛗螽之族厥類實煩此辨之也蛗螽一名蠜李巡曰蝗子也陸機疏云今人謂蝗子為螽子兖州人謂之螣許愼云蝗螽也蔡雍云螽蝗也明是一物草蟲一名負蠜一名常羊陸機云小大長短如蝗也竒音青色好在茅草中又一名草蟲詩云喓喓草蟲躍躍蛗螽是也蜤螽周南作螽斯七月作斯螽雖字異文倒其實一也一名蜙蝑一名蜙䗥一名蝽􅡂陸機云幽州人謂之舂箕舂箕即舂黍蝗類也長而青長角長股股鳴者也或謂似蝗而小班黑其股似玳瑁又五月中以兩股相切作聲聞數十步者是也蟿螽一名螇蚸形似蜙䗥而細長飛翅作聲者是也土螽一名蠰溪今謂之工江南呼虴蛨又名虴蜢形似蝗而小善跳者是也注詩云喓喓草蟲躍躍阜螽釋曰召南草蟲篇文也螼蚓蜸蠶釋曰螼蚓一名蜸蠶即蜿蟺也廣雅云蜿蟺蚯蚓也月令四月蚯蚓出十一月蚯蚓結是也江東呼寒蚓郭云蚯蚓土精無心之蟲與蛗螽交者也莫貈螳蜋蛑釋曰莫貈一名螳蜋一名蛑即上不過也捕蟬而食有臂若斧奮之當軼不避莊子云猶螳蜋之怒臂以當車軼是也江東呼為右蜋又名齕肱注孫叔然以方言説此義亦不了釋曰方言云螳蜋謂之髦或謂之虰或謂之芉芉孫炎取此方言之文以虰上屬為説案説文以虰蛵負勞為一則方言之説既失其指孫氏引之為説是亦不了也虰蛵負勞釋曰即蜻蛉六足四翼蟲也一名虰蛵一名負勞江東呼狐梨方言云蜻蛉謂之蝍蛉淮南人又呼䗧􅢤音康伊字林云一名桑根陶注本草云一名蜻蜓是也注或曰至未聞釋曰云所未聞者雖有或人之説但經典未聞所出示其無質故云所未聞蜭毛蠹釋曰蜭一名毛蠹即蠔也説文云蠔毛蟲今俗呼為毛蠔有毒螫人楚辭云蠔緣兮我裳是也蟔蛅蟴釋曰蟔一名蛅蟴即蠔類也青州人呼蛅蟴注孫叔然云八角螫蟲失之釋曰此即毛蟲何止八角故云失之螫猶蠚也字林云蟲行毒也蟠鼠負釋曰此與下蛜威委黍是一故下注委黍云舊説鼠􅣁别名則此蟲一名蟠一名鼠負負或作􅣁本草作婦一名蛜威一名委黍也陸機云在壁根下甕器底土中生似白魚者是也陶注本草云多在鼠坎中鼠背負之然與鼠􅣁及鼠婦則似乖詩東山云伊威在室是也蟫白魚釋曰此衣書中蟲也一名蟫一名白魚一名蛃魚本草謂之衣魚是也蛾羅釋曰此即蠶蛹所變者也説文云蛾羅也是螒天雞釋曰此黑身赤頭小蟲也一名螒一名天雞一名莎雞又曰樗雞李巡曰一名酸雞詩豳風七月云六月莎雞振羽陸機疏云如蝗而班色毛翅數重其翅正赤六月中飛而振羽索索作聲幽州人謂之蒲錯是也強蚚釋曰強蟲名也一名蚚好自摩捋者蓋蠅類螝蛹釋曰即蠶所變者一名螝又名蛹也蜆縊女釋曰蜆小黑蟲也赤頭喜自縊故又名縊女説文云蛻為蝶是也注喜自經死釋曰經即縊也晉語申生使猛足辭於狐突乃雉經於新城廟僖四年左氏傳云十二月戊申縊于新城是謂縊為經也蚍蜉至子蚳釋曰此辨衆蟻及其子名也蟻通名也其大者别名蚍蜉俗呼馬蚍蜉小者即名蟻齊人呼蟻蛘方言云蚍蜉齊魯之間謂之蚼蟓養二音西南梁益之間謂之玄蚼燕謂之蛾蛘蟻養二音其場謂之坻或謂之垤是也其大而赤色斑駁者名蠪一名朾蟻有翅而飛者名螱即飛蟻也其子在卵者名坻可以作醢注周禮曰蜃蚳醬釋曰案周禮醢人職曰饋食之豆蜃蚳醢醢則醬之有肉者故此云醬也次蟗至草鼅蛛釋曰此辨鼅蛛方言及在土在草之名也次蟗即鼅蛛别名也又一名蛛蝥今江東呼蝃蝥説文謂之蟊作罔蛛蟊也方言云自關而西秦晉之間謂之蛛蝥自關而東趙魏之郊謂之鼅蛛或謂之蠾燭臾二音北燕朝鮮洌水之間謂之蝳蜍毒餘二音郭又云齊人又呼社公亦言罔公其在地中布網者名土鼅蛛其作網絡幕草上者名草鼅蛛也土蜂木蜂釋曰此辨蜂在土在木之異也説文云蜂飛蟲螫人者其形大在地中作房而啖其子者名土蜂又名馬蜂今荆巴間呼為蟺其形差小在樹上作房者名木蜂亦食其子注音憚釋曰嫌讀為蜿蟺之蟺故音之蟦蠐螬蝤蠐蝎釋曰此辨蝎在土在木之異名也其在糞土中者名蟦蠐又名蠐螬其在木中者方言云關東謂之蝤蠐梁益之間謂之蝎上文蝎蛣􅔒郭云木中蠹下文蝎桑蠧郭云即蛣􅔒然則蟦蠐也蠐螬也蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也以在木中白而長故詩人以比婦人之頸碩人云領如蝤蠐是也蟰蛸長踦釋曰此小鼅蛛長腳者一名蟰蛸一名長踦俗呼為喜子詩東山云蟰蛸在戶陸機疏云一名長腳荆州河內人謂之喜母此蟲來著人衣當有親客至有喜也幽州人謂之親客亦如蜘蛛為羅罔居之是也國貉蟲蠁釋曰此蛹蟲也今俗呼為蠁一名國貉一名蟲蠁説文云知聲蟲也廣雅云土蛹蠁蟲是也蠖蚇蠖釋曰蠖一名蚇蠖郭云今蝍􅠸方言云蠀􅠸謂之蚇蠖音即踧郭云又呼步屈説文云蠖屈伸蟲也易繫辭云尺蠖之屈以求信者是也果裸蒲盧螟蛉桑蟲釋曰案詩小雅小宛云螟蛉有子蜾裸負之果裸一名蒲盧即細腰蜂也俗呼為蠮螉方言云蜂燕趙之間謂之蠓螉其本者謂之蠮螉鄭注中庸以蒲盧為土蜂説文云細要土蜂説文地之性細要純雄無子螟蛉一名桑蟲一名桑蟃一名戎女陸機云螟蛉者桑上小靑蟲也似步屈其色靑而細小或在草菜上蜾螺土蜂也似蜂而小腰取桑蟲負之於木空中七日而化為子法言云螟蛉之子殪而逢蜾螺祝之曰類我類我久則肖之是也熒火即照釋曰熒火一名即照夜飛腹下有火蟲也夲草又一名夜光一名熠耀月令季夏腐草為熒腐草此時得暑濕之氣故為熒至秋而天沈隂數雨熒火夜飛之時也詩東山云熠耀宵行是也蚅烏蠋釋曰蚅一名烏蠋形似𧖟而大如指詩大雅韓奕云鞗革金厄毛亦云厄烏蠋是也注似𧖟見韓子釋曰案韓子內儲説上七術其三日信賞盡能云鱣似蛇𧖟似蠋人見蛇則驚駭見蠋則毛起然而婦人拾𧖟而漁者握鱣利之所在則忘其所惡皆為孟賁是其事也蠓蠛蠓釋曰小蟲似蚋亂飛者也名蠓又名蠛蠓列子云生朽壤之上因雨而生得陽而死一名醯雞莊子云孔子與老聃語出告顔回曰丘之於道也其猶醯雞與郭象云醯雞者甕中蠛蠓是也王蛈蝪釋曰此鼅蛛之一種也一名螲蟷穴居布罔穴口有蓋河北人呼蛈蝪者是也蟓桑至蕭繭釋曰此皆蠶類作繭者因所食葉異而異其名也食桑葉作繭者名蟓即今蠶也食樗葉棘葉欒葉者名雔由食蕭葉作繭者名蚢翥醜至醜扇釋曰此辨蟲類所生及所好之狀不同者也翥飛也醜類也蟲類能飛翥者謂蟬屬皆剖坼母背以為孔鏬而生螽蝗之類好奮迅作聲而飛強蚚之類好以腳自摩捋蜂類好垂其腴以休息説文云螸垂腴也腴即腹下也靑蠅之類好搖翅自扇食苗至根蟊釋曰此分別蟲啖食禾所在之名也李巡云食禾心為螟言其姦冥冥難知也食禾葉者言假貸無厭故曰􅬑也食禾節者言貪狼故曰賊也食禾根者言其稅取萬民財貨故云蟊也孫炎曰皆政貪所致因以為名也郭璞直以蟲食所在為名而李巡孫炎並因託惡政則災由政起雖以食所在為名而所在之名緣政所致理為兼通也陸機疏云螟似子方而頭不赤螣蝗也賊似桃李中蠧蟲赤頭身長而細耳或説云蟊螻蛄也食苗根為人患許愼云吏冥冥犯法即生螟吏乞貸則生􅬑吏抵冒取民財則生蟊舊説云螟螣蟊賊一種蟲也如言寇賊姦宄內外言之爾故揵為文學曰此四種蟲皆蝗也實不同故分别釋之注皆見詩釋曰詩小雅大田云去其螟螣及其蟊賊無害我田稚是也有足謂之蟲無足謂之豸釋曰此對文爾散文則無足亦曰蟲月令季春曰其蟲鱗鄭注云龍蛇之屬是也釋魚第十六釋曰案説文云魚水蟲也此篇釋其見於經傳者是以不盡載魚名至於龜蛇貝鱉之類以其皆有鱗甲亦魚之類故揔曰釋魚也鯉釋曰今赤鯉魚也詩云豈其食魚必河之鯉是也鱣釋曰郭義具注陸機云鱣出江海三月中從河下頭來上鱣身形似龍鋭頭口在頷下背上腹下皆有甲縱廣四五尺今於盟津東石磧上釣取之大者千餘斤可蒸為􅌜又可為鮓魚子可為醬詩衛風碩人云鱣鮪發發是也鰋釋曰注云今鰋額白魚郭以目驗言之也詩頌云鰷鱨鰋鯉是也鮎釋曰郭氏云別名鯷江東通呼鮎為鮧案此經鯉鱣鰋鮎舍人曰鯉一名鱣孫炎曰鰋一名鮎則是舍人以鯉鱣為一魚孫炎以鰋鮎為一魚郭氏以為四魚者如陸機之言又以今語驗之則鯉鮪鱣鮥皆異魚也故郭氏云先儒及毛詩訓傳皆謂此魚有兩名今此魚種類形狀有殊無緣強合之為一物是郭氏所以異也鱧注鮦也釋曰今鯉魚也鮦與鮦音義同詩小雅云魚麗于罶魴鱧是也鯇注今鯶魚似鱒而大釋曰舍人云鱧一名鯇郭氏所不取也鯊鮀釋曰鯊一名鮀詩小雅云魚麗于罶鱨鯊陸機云魚狹而小常張口吹沙故郭氏云今吹沙小魚也鮂黑鰦釋曰鮂一名黑鰦郭云即白鯈江東呼為鮂者以時驗而言之也詩頌曰鰷鱨鰋鯉是也鰼鰌釋曰鰼一名鰌即今泥鰌也穴於泥中因以名云鰹大鮦小者鮵釋曰此即上文鱧也其大者名鰹小者名鮵故注云今青州呼小鱺為鮵鱺與鱧音義同魾大鱯小者鮡釋曰鮡魚名似鮎而大白色鱯之大者别名魾小者别名鮡也鰝大蝦釋曰蝦之大者長二三丈鬚長數尺若此之類者名鰝鯤魚子釋曰凡魚之子揔名鯤詩云其魚魴鰥鄭云鰥魚子鯤鰥字異蓋古字通用也魯語云宣公夏濫於泗淵里革斷其罟而棄之曰魚禁鯤鱬鳥翼鷇卵蕃庶物也是亦以鯤為魚子也注鱀䱜至有之釋曰鱀一名是鱁䱜之屬也云體似鱏者字林云鱏長鼻魚也重千斤傳曰伯牙鼓琴鱏魚出聽是也鱀魚之體似之也云尾如䱡魚者説文云䱡魚名出樂浪潘國一曰䱡魚出江東有兩乳今鱀魚之尾如䱡魚之尾故云尾如䱡魚也云大腹以下者時驗而言也注家語曰其小者鱦魚也釋曰案家語宓子賤仕魯為單父宰孔子使巫馬期往觀政焉期隂免衣弊裘入界見漁者得魚輒捨之期問焉曰凡漁者為得魚也何以得魚卻捨之曰魚之大者名為鱄鱨吾大夫愛之其小者名為鱦吾大夫欲長之是以得二者輒捨之是也引之證鱦是小魚之名也鮥鮛鮪釋曰郭義具注陸機云鮪魚形似鱣而靑黑頭小而尖似鐵兜鍪口亦在頷下其甲可以摩薑大者不過七八尺益州人謂之鱣鮪大者為王鮪小者為鮛鮪一名鮥肉色白味不如鱣也今東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉也溺死海中化為此魚又曰河南鞏縣東北崖上山腹有穴舊説云此穴與江湖通鮪從此穴而來北入河西上龍門入􅃮沮故張衡賦云王鮪岫居山穴為岫謂此穴也月令季春薦鮪於寢廟天官駇人春獻王鮪是也鯦當魱釋曰鯦一名當魱海魚也注海魚至音胡釋曰云似鯿而大鱗者案鯿似魴而大腝細而長今鯦魚似之但鱗大耳云肥美以下者時驗而知也鮤蠛刀釋曰鮤一名蠛刀郭氏云今之鮆魚也説文云鮆飲而不食刀魚也九江有之亦呼為魴魚是則此魚一名鮤一名蠛刀一名魛魚一名鮆魚也鱊鮬鱖鯞釋曰郭云小魚也似鮒子而黑廣雅云鮒鰿也此魚似其小者故云似鮒子而黑色為異也江東呼為妾魚説文云鯜魚出樂浪潘國是也魚有力者鰴釋曰凡魚之強大多力異於羣輩者名鰴魵蝦釋曰魵魚一名蝦郭云出穢邪頭國見吕氏字林案説文亦云鮅鱒釋曰鮅一名鱒詩云九罭之魚鱒魴陸機云鱒似鯶魚而鱗細於鯶赤眼是也魴魾釋曰魴一名魾江東呼為鯿詩云其魚魴鰥陸機云魴今伊洛濟潁魴魚也廣而薄肥恬而少肉細鱗魚之美者遼東梁水魴特肥而厚尤美於中國魴故其鄉語曰居就糧梁水魴是也蜎蠉釋曰井中小赤蟲也一名蜎一名蠉又名蛣蟩又一名孑孓廣雅云孑孓蜎是也蛭蟣釋曰此水中蟲喜入人肉者江東呼為蟣本草謂之水蛭一名馬蜞一名馬耆即楚王食寒菹得而吞之能去結積者是也科斗活東釋曰郭云蝦蟆子此蟲一名科斗一名活東頭圎大而尾細古文似之故孔安國云皆科斗文字是也魁陸釋曰即魁蛤也見夲草注本草至蚶也釋曰案夲草蟲魚部云魁蛤一名魁陸生東海正圎兩頭空表有文陶隱居注云形似紡軖音狂小狹長外有縱橫文理云是老蝙蝠化為者是也云即今之蚶也者案字書云蚶蛤也出會稽可食是也然則又一名蚶也鼁􅖚蟾諸在水者黽釋曰此有多種鼁􅖚一名蟾諸郭云似蝦蟆居陸地淮南謂之去蚥然蟾諸非蝦蟆但相似耳案本草蝦蟆陶注云此是腹大皮上多痱磊者也蟾諸亦類此抱朴子曰蟾諸壽三千歲者頭上有角頷下有丹書八字玄中記云蟾諸頭生角者食之壽千歲是也其居水者名黽一名耿黽一名土鴨狀似靑蛙而腹大為異陶注本草云大而靑脊者俗名土鴨其鳴甚壯即此黽也陶又云一種小形善鳴喚名為蛙者即郭云青蛙者也蜌螷釋曰此一名螷蚌屬也説文云修為螷圎為􅛔郭云今江東呼蚌長而狹者為螷其肉可為醢周禮醢人掌饋食之豆云脾析蠯醢是也蚌含漿釋曰説文云蜃屬郭云即蜃也謂老産珠者也一名蚌一名含漿周禮謂之貍物鱉三足能龜三足賁釋曰鱉龜皆四足三足者異故異其名鱉之三足者名能龜之三足者名賁也注山海至六眼龜釋曰案中山經云遊戲山東南二十里曰從山從水出其上潛其下其中多三足鱉食之無蟲疾是從山多三足鱉也又云放皋山東五十七里曰大苦山陽狂水出焉西南注伊水中多三足龜食者無大疾可以巳腫是大苦山多三足龜也云吳興郡以下者以時驗而言也蚹螺螔蝓釋曰蚹螺一名螔蝓郭云即蝸牛也案本草蝸牛陶注云生山中及人家頭形似蛞蝓但背負殼爾海邊又一種正相似以火炙殼便走出食之益顔色名寄居亦可作醢周禮饋食之豆葵菹螺醢是也螺小者蛹釋曰螺與螺音義同其小者名蜬螖蠌小者蟧釋曰螖即彭螖也似蟹而小一名蠌其小者別名蟧案蜱蒼即云螺屬郭氏兩從之蜃小者珧釋曰蜃大蛤也月令孟冬之月云雉入大水為蜃其小者名珧一名王珧可飾佩刀削詩傳云天子玉琫而珧珌是也山海經嶧皋山皋水出焉東注激女水其中多蜃珧龜俯至不若釋曰此辨龜之俯仰前後左右其形不同其名亦異也云龜者目諸龜也云俯者靈者謂行時頭低周禮天龜曰靈屬是也云仰者謝者謂行時頭仰周禮地龜曰繹屬是也云前弇諸果者諸辭也謂甲前長弇覆者名果周禮東龜曰果屬是也云後弇諸獵者諸亦辭也謂甲後長弇覆者名獵周禮南龜曰獵屬是也云左倪不類者倪􅋻也不發聲也謂行時頭左邊􅋻下者名類周禮西龜曰靁屬是也云右倪不若者不亦發聲也謂行時頭右邊􅋻下者名若周禮北龜曰若屬是也周禮又云各以其方之色與其體辨之鄭注云屬言非一也色謂天龜玄地龜黃東龜靑西龜白南龜赤北龜黑龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜卻西龜左北龜右各從其耦也是周禮先有成文故此釋之鄭取此文為説其言正同惟繹與謝靁與類小異耳其義亦同注行頭至卜審釋曰案賈公彥説周禮以倪為睥睨則左倪右倪是左顧右顧也郭氏以􅋻解倪及云今江東所謂左食者皆以時驗而言也云以甲卜審言用此龜之甲以卜吉凶審諦也貝居至而橢釋曰此辨貝居陸居水大小文彩不同之名也云貝者目諸貝也説文云貝海介蟲也取其甲以飾器物古者貨貝周而有泉至秦廢貝行錢居陸者名贆在水者名蜬至大者名魧至小者名鰿黑色之貝名貽貝黃為質白為文點者名餘貾白為質黃為文點者名餘衆中央廣兩頭鋭者名蚆大而汚薄者名蜠小而狹長者名鰿注書大至魧屬釋曰案大傳云西伯既戡耆紂囚之牖里散冝生之江淮之浦取大貝大如大車之渠以備其辜是也考工記謂車􅦿為渠故云渠謂車􅦿其貝形曲及大小如車􅦿故比之也引之以證此經魧是其大如車􅦿者故云即魧屬注以白至文點釋曰舍人云貝水中蟲也李巡曰餘貾貝甲黃為質白為文彩餘泉貝甲白為質黃為文彩陸機疏云貝水中介蟲也龜鱉之屬其文彩之異大小之殊甚衆古者貨貝是也餘貾黃為質以白為文餘泉白為質以黃為文又有紫貝其白質如玉紫點為文皆行列相當其貝大者當至一尺六七寸者今九真交趾以為杯盤寶物也是先儒相傳為然但解紫貝與郭氏少異陸機以白為質紫為文郭氏以紫為質黑為文是其異也書云文貝仍几詩云成是貝錦山海經隂山濁浴水出焉南流注蕃澤其中多文貝皆謂此餘貾餘泉也注即上至形容釋曰云即上小貝知者以其同名鰿也云橢謂狹而長者詩云嶞山喬嶽楚辭云南北順橢其循幾何皆是橢為狹長之名也蠑螈至守宫也釋曰詩小雅正月云胡為虺蜴謂此也蠑螈蜥蜴蝘蜓守宫一物形狀相類而四名也字林云蠑螈蛇醫也説文云在草曰蜥蜴在壁曰蝘蜓方言云秦晉西夏謂之守宫或謂之蠦􅨦盧纏兩音或謂之刺易南陽人呼蝘蜓其在澤中者謂之易蜥南楚謂之蛇醫或謂之蠑螈又東方朔云非守宫即蜥蜴案此諸文則是在草澤中者名蠑螈蜥蜴在壁者名蝘蜓守宫也博物志云以器養之食以真朱體盡赤重七斤搗萬杵以點女人體終身不滅耦則落故號守宫陸機疏云靑緑色大如指形狀可惡是也镻蝁釋曰蛇也蝮虺之屬大眼有毒一名镻又名蝁淮南人呼蝁子者是也螣螣蛇釋曰蛇似龍者也名螣一名螣蛇能興雲霧而遊其中也注淮南云蟒蛇釋曰蟒當為奔案淮南子覽冥篇説女媧云功烈上際九天下契黃壚名聲被後丗光輝熏萬物乘雷車服應龍驂青虯援絶瑞席蘿圖雲黃璐前白螭後奔蛇許愼云奔蛇馳蛇是也或曰淮南人呼此螣為蟒蛇義亦通蟒王蛇釋曰此蛇之最大者也名蟒又名王蛇與上螣蛇異蝮虺至如擘釋曰博廣也首頭也擘拇指也比自一種毒蛇名蝮虺身廣三寸其頭大如人拇指注身廣至蝮虺釋曰案郭注三蒼云擘大指也蒼頡篇以為足大指鄭注儀禮以為手大指然則手足大指皆得名擘故注云頭大如人擘指又名拇孫炎云頭如拇指是也案舍人曰蝮一名虺江淮以南曰蝮江淮以北曰虺孫炎曰江淮以南謂虺為蝮廣三寸頭如拇指有牙最毒郭璞曰此自一種蛇人自名為蝮虺今蛇細頸大頭色如艾綬文文間有毛似豬鬛鼻上有針大者長七八寸一名反鼻如虺類足以明此自一種蛇如郭意此蛇人自名蝮虺非南北之異蛇實是蟲以有鱗故在釋魚且魚亦蟲之屬也鯢大者謂之蝦釋曰鯢雌鯨也大者長八九尺别名蝦魚枕至之丙釋曰此釋魚之骨體腸尾之名也其魚頭中骨為枕其骨形似篆書丁字故因謂之丁其腸似篆書乙字尾似篆書丙字亦因名之也注禮記曰魚去乙釋曰此禮記內則文也鄭玄注云乙魚體中害人者名也今東海鰫魚有骨名乙在目旁狀如篆乙食之鯁人不可出者與此經違非郭義也一曰至火龜釋曰易損卦六五爻辭云十朋之龜弗克違馬鄭皆取此文解之則此經十龜所以釋易也神龜者龜之最神明者也禮統曰神龜之象上圎法天下方法地皆上有盤法丘山玄文交錯以成列宿長尺二寸明吉凶不言而信者是也靈龜龜之有靈次神龜者雒書曰靈龜者玄文五色神靈之精也攝龜龜之小者腹甲曲折能自張閉者也寶龜傳國所寶者春秋經曰盜竊寶玉大弓公羊傳曰寶者何龜靑純何休云謂之寶者言丗丗保用之辭是也文龜甲有文彩者筮龜在蓍叢下者山龜生山中者澤龜生澤中者水龜生水中者火龜生火中者注書曰遺我大寶龜釋曰此周書大誥文也注河圖至靑文釋曰引此以證龜甲有文彩也其實河圖説靈龜也非此經之文龜取其一邊耳注常在至䇿傳釋曰龜䇿傳云傳曰上有搗蓍下有神龜又云聞蓍滿百莖者其下必有神龜守之其上常有靑雲覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百是也注火龜猶火鼠耳釋曰嫌龜不生於火故以火鼠猶之也郭注山海經云今去天南東萬里有耆薄國復五千里許有火山國其山雖霖雨火常燃火中白鼠時出山邊求食人捕得之以毛作布名之火浣布是也爾雅疏卷第九
