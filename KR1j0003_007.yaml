body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺奉勑校定釋地第九釋丘第十釋山第十一釋水第十二釋地第九釋曰案説文云元氣𥘉分輕淸陽為天重濁隂為地萬物所陳列也白虎通云地者易也言養萬物懷任佼易變化含吐應節也釋名云地底也其體在底下載萬物也禮統云地施也諦也應變施化審諦不誤也此篇釋地之所載四方中國州府陵藪之異故曰釋地兩河至九州釋曰此釋九州之名及其界域也兩河間曰兾州注自東河至西河釋曰周禮職方氏云河內曰兾州禹貢不説境界孔安國云此州帝都不説境分以餘州所至即可知以其禹貢兖州云濟河自東河以東也豫州云荆河自南河以南也雍州云西河自西河以西也明東河之西西河之東南河之北是兾州之境也言東河西河南河者皆據帝都兾州而言也案禹貢導河自積石龍門南流謂之西河至于華隂折而東經底柱孟津過洛汭皆東流謂之南河至于大伾折而北流過降水至于大陸又北播為九河同為逆河入于海謂之東河此惟云兩河者從可知李巡曰兩河間其氣淸厥性相近故曰兾兾近也河南曰豫州注自南河至漢釋曰職方與此同禹貢云荊河惟豫州孔安國云西南至荆山北距河水以其荆山在荆州漢水所經故文不同其實一也李巡云河南其氣著密厥性安舒故曰豫豫舒也河西曰雍州注自西河至黑水釋曰周禮正西曰壅州禹貢云黑水西河惟雍州孔安國云西距黑水東據河案酈元水經黑水出張掖雞山南流至燉煌過三危山南流入于南海然則雍州之境東據龍門河西距此黑水也李巡云河西其氣蔽壅厥性急凶故曰雍雍壅也兼得梁州之地西北之位陽所不及隂壅也漢南曰荊州注自漢南至衡山之陽釋曰周禮正南曰荆州禹貢荆及衡陽惟荊州孔安國云北據荆山南及衡山之陽言北據荆山則至漢水也李巡曰漢南其氣燥剛稟性強梁故曰荆荆強也釋名以為取荊山之名荆警也南蠻數為寇逆常警備也江南曰揚州注自江南至海釋曰周禮東南曰揚州禹貢淮海惟揚州孔安國云北據淮南距海然則揚州之境跨江北至淮此云江南者舉逺大而言也李巡曰江南其氣燥徑厥性輕揚太康地記云以揚州漸太陽位天氣奮揚履正含文故取名焉濟河間曰兖州注自河東至濟釋曰周禮河東曰兖州禹貢濟河惟兖州孔安國云東南據濟西北距河孔傳凡云據者謂跨之也距至也濟河之間相去路近兖州之境跨濟而過東南越濟水西北至東河也李巡云濟河間其氣專質厥性信謙故曰兖兖信也釋名以為取兖水之義濟東曰徐州注自濟東至海釋曰禹貢海岱及淮惟徐州孔傳云東至海北至岱南及淮此云自濟東則是西至濟也李巡曰淮海間其氣寬舒稟性安徐故曰徐徐舒也周合其地於青州燕曰幽州注自易水至北狄釋曰周禮東北曰幽州李巡曰燕其氣深要厥性剽疾故曰幽幽要也禹貢其地合於兾州地理志云涿郡故安縣閻鄉易水所出東至范入濡也從此易水至於北狄幽州之境也齊曰營州注自岱東至海此蓋殷制釋曰周禮正東曰青州禹貢海岱惟靑州孔傳云東北據海西南距岱然則此營州則靑州之地也博物志云營與靑同海東有青丘齊有營丘豈是名乎太康地記云東方少陽其色靑其氣淸歲之首事之始故以青為名焉云此蓋殷制者以此文上與禹貢不同下與周禮又異禹別九州有靑徐梁而無幽井營是夏制也周禮周公所作有青幽井而無徐梁營是周制也此有徐幽營而無靑梁井疑是殷制以無正文故云蓋也此上釋九州之名故題云九州也魯有大野釋曰此下至周有焦護釋十藪之名也禹貢徐州云大野既豬地理志云大野澤在山陽巨野縣北巨即大也由其旁有大澤故縣以巨野為名哀十四年左傳云西狩於大野以其澤在曲阜西故云西狩也郭云今髙平巨野縣者東晉時巨野屬髙平郡故與志不同凡注言今者皆謂東晉時也晉有大陸注今巨鹿此廣河澤是也釋曰孫炎曰廣河猶大陸以地名言之近為是也禹貢兾州云大陸既作是也案定元年左傳晉魏獻子田於大陸焚焉還卒於寧杜預注嫌巨鹿絶逺疑此田在汲郡吳澤寧今修武縣近吳澤計此二澤相去甚逺亦得言大陸者以其廣平曰陸但廣而平者則名大陸故異所而同名也澤雖卑下旁帶廣平之地故統名焉秦有楊陓注今在扶風汧縣西釋曰周禮兾州云其澤藪曰陽陓鄭注云所在未聞又雍州云其澤藪曰弦蒲鄭注云在汧案地理志汧吳山在西古文以為汧山北有蒲谷鄉弦中谷雍州藪今注亦云在汧然則周禮弦蒲即此楊陓也宋有孟諸注今在梁國睢陽縣東北釋曰周禮靑州其澤藪曰望諸鄭注云望諸明都也在睢陽禹貢豫州云導菏澤被孟豬左傳亦作孟諸文不同者聲轉字異正是一地也楚有雲夢注今南郡華容縣東南巴丘湖是也釋曰周禮荊州云其澤藪曰雲瞢鄭注云雲瞢在華容禹貴云雲土夢作乂昭三年左傳楚于與鄭伯田于江南之夢又定四年楚子涉睢濟江入于雲中杜預云南郡枝江縣西有雲夢城江夏安陸縣東南亦有夢城或曰南郡華容縣東南有巴丘湖江南之夢也雲夢一澤而每處有名者司馬相如子虛賦云雲夢者方九百里則此澤跨江南北亦得單稱雲單稱夢瞢即夢也吳越之間有具區注今吳縣南太湖即震澤是也釋曰周禮揚州云其澤藪曰具區鄭注云在吳南地理志云會稽吳縣故周泰伯所封國也具區在西古文以為震澤禹貢揚州云三江既入震澤砥定是也齊有海隅注海濵廣斥釋曰此營州藪也云海濵廣斥禹貢文也孔傳云濵涯也言復其斥鹵案説文云鹵鹹地也東方謂之斥西方謂之鹵海畔逈闊地皆斥鹵故云廣斥也燕有昭余祁注今太原塢陵縣北丸澤是也釋曰周禮并州其澤藪曰昭餘祁鄭注云在塢地理志云塢丸澤在北是為昭餘祁并州藪是也鄭有圃田注今熒陽中牟縣西圃田澤是也釋曰周禮豫州云其澤藪曰圃田鄭注云在中牟地理志云中牟圃田澤在西豫州藪僖三十三年左傳云鄭之有原圃猶秦之有具囿也又詩車攻云東有甫草鄭玄以為甫田之草皆謂此也周有焦護注今扶風池陽縣瓠中是也釋曰孫炎云周歧周也詩六月云玁狁匪茹整居焦護是也時人謂之瓠中也十藪釋曰此題上事也説文云大澤也風俗通云藪厚也有草木魚鱉所以厚養人也東陵至是也釋曰此五方之陵名也其義及所在未詳云鴈門是也者此指解北陵也即鴈門山是也陵莫大於加陵釋曰莫無也陵大阜也言陵無大於加陵者謂加陵最大也今所在未聞梁莫大於溴梁注溴水名梁隄也釋曰釋宫云隄謂之梁詩傳云石絶水曰梁然則以土石為隄障絶水者名梁雖所在皆有而無大於溴水之旁者杜預云湨水出河內軹縣東南至溫入河春秋襄十六年公會晉侯以下于湨梁是也墳莫大於河墳釋曰墳大防亦謂隄雖水所皆有而河墳最大也八陵釋曰此亦題上事也大阜曰陵溴梁河墳雖非大阜以其絶大若陵故通謂之八陵也東方至生焉釋曰此釋八方中國名山所産之物也注醫無至玉屬釋曰案地理志遼東郡無慮縣應劭曰慮音閭顔師古曰即所謂醫巫閭是縣因山為名故云山名今在遼東周禮幽州鎮也云珣玗琪玉屬者説文云珣周書所謂夷玉也玗石之似玉者琪玉也皆玉之類也故云玉屬注會稽至縣也釋曰周禮揚州云其山鎮曰會稽鄭注云在山隂地理志會稽郡山隂縣云會稽在南上有禹家禹井故云山名今在山隂縣南也云竹箭篠也者禹貢揚州云篠簜既敷釋草云篠竹箭也郭云别二名則一箭一名篠是竹之小者可以為箭幹者也南方之美者有梁山之犀象焉釋曰郭氏不注梁山所在犀象二獸皮角牙骨材之美者也注黃金礝石之屬釋曰經惟言金知毒金者以三品之中黃金為上此言美者故知黃金礝石石之次玉者玉藻云士佩瓀玫而緼組綬是也其類非一故云之屬注霍山至精好釋曰周禮兾州其山鎮曰霍山鄭云在彘案地理志河東郡彘縣云霍大山在東兾州山周厲王所奔應劭曰順帝改曰永安然則東晉時屬平陽郡而縣名永安故云今在平陽永安縣也云珠如今雜珠而精好者郭氏時驗為然也注璆琳至玕樹釋曰璆與球同説文云璆玉磬也琳美玉名書云戞擊鳴球美玉可以為磬故皆云美玉也云山海經曰者案海內西經云帝之下都昆崘之虛方八百里髙萬仞其上有三頭人琅玕樹注云琅玕子似珠是也注幽都至筋角釋曰山海經云北海之內有山名曰幽都之山是也東北至皮焉釋曰斥山山名也文皮虎豹之屬其皮毛有文采細縟故謂之文皮焉中有至生焉釋曰岱嶽泰山也此言中國也五榖黍稷麻麥豆也泰山東近海禹貢海岱惟青州厥貢鹽絺海物惟錯言其饒多非一釋詁注云言泰山有魚鹽之饒也九府釋曰此亦題上事也府聚也財物之所藏也言此八方及中皆美物之所聚藏故題云九府也東方至氣也釋曰此釋五方異氣而産非常之物也云東方有比目魚焉者言東方水中有魚其形狀似牛脾鱗細紫黑色一眼兩片相合兩目相比乃得行故曰比目魚云不比不行者比合也言一片不能行須兩片相合乃行故云不比不行也云其名謂之鰈者言鰈為此魚之名也一名比目魚一名鰈郭云江東又呼為王餘魚注似鳬至乃飛釋曰案山海經云崇五山有鳥狀如鳬一翼一目相得乃飛名曰蠻蠻郭云比翼鳥也色青赤不比不能飛爾雅作鶼鶼者正謂此也西方至之蟨釋曰云西方有比肩獸焉者此謂蟨也與卬卬岠虛相比蟨則肩卑不能走而能取甘草卬卬岠虛則肩髙不得取甘草而善走穆天子傳曰卬卬岠虛走百里是也故各以其能而濟所不能蟨常為卬卬岠虛齧取甘美之草仰而食之即有急難卬卬岠虛則皆資而走者其名謂之蟨也注吕氏至音厥釋曰云吕氏春秋者案漢書藝文志云吕氏春秋二十六篇秦相吕不韋輯略士作也云曰北方有獸至則顚者大愼覽順説篇之文也引之反以證卬卬岠虛之形也然則以下郭氏注云今鴈門廣武縣云云者目驗知之也北方至迭望釋曰此即半體人也兩半相比乃得為人動作及禦非常以肩在上而顯故謂之比肩民焉迭更也謂一體取食則一體瞻望所以備驚急也故云迭食而迭望中有枳首蛇焉釋曰枳岐也此即兩頭蛇也江東呼越王約髮言是越王約髮所變也亦名弩弦即以形相似而名之也五方釋曰亦題上事也言是五方風氣殊異而生此怪物也邑外至曰畬釋曰此釋郊野之地逺近髙下不同之名也云邑外謂之郊者邑國都也謂國都城之外名郊也云郊外謂之牧者言可放牧也書牧誓云王朝至于商郊牧野乃誓是也云牧外謂之野者言牧外之地名野詩傳云郊外曰野者以細别言之則郊外之地名牧牧外之地名野若大判而言則野者郊外通名故周禮六遂在逺郊之外遂人職云凡治野田是其郊外之地揔稱野也云野外謂之林者言野外之地名林以其去都邑逺薪采者少其地可長木林因名云也云林外謂之坰者言林外之地最為逺野名坰魯頌云駉駉牡馬在坰之野毛傳云坰逺野是也注邑國至里也釋曰云邑國都也者案周禮四縣為都四井為邑春秋莊二十八年左氏傳曰凡邑有宗廟先君之主曰都無曰邑然則邑與都異此為一者彼對文之例耳但都者聚居之處故詩小雅云彼都人士説文云邑國也是天子諸侯所居國城或謂之邑或謂之都故以國都解邑也云假令百里之國五十里之界界各十里也者以其百里之國國都在中去境五十里每十里而異其名則坰為邊畔去國最逺故毛傳以為逺野也此假令者據小國言之郊為逺郊牧野林坰自郊外為差耳然則郊之逺近計國境之廣狹以為差也聘禮云賔及郊注云郊逺郊周制天子畿內千里逺郊百里以此差之逺郊上公五十里侯四十里伯三十里子二十里男十里也近郊各半之是鄭之所約也是以司馬法云王國百里為逺郊又此經從邑之外止有五名明當每皆百里故知逺郊百里也知近郊半之者書序云周公既沒命君陳分正東郊成周於時周都王城而謂成周為東郊則成周在其郊也於漢王城為河南成周為洛陽相去不容百里則所言郊者謂近郊故鄭注云天子近郊五十里今河南洛陽相去則然是鄭以河南洛陽約近郊之里數也周禮杜子春注云五十里為近郊白虎通亦云近郊五十里逺郊百里是儒者相傳為然也下溼曰隰者謂地形􅋻下而水溼者李巡曰下溼謂土地窊下常沮洳名為隰也云大野曰平者大野之澤一名平魯有大野是也云廣平曰原者謂澤之廣平者亦名原漢以平原為郡名屬靑州云髙平曰陸大陸曰阜大阜曰陵大陵曰阿者李巡曰髙平謂土地豐正名為陸土地髙大名曰阜最大名為陵陵之大者名阿詩大雅皇矣云無矢我陵我陵我阿是也此上七者或萊沛沮洳或險峭磽確雖不可種榖給食亦得其名也云可食曰原陂者曰阪下者曰隰此三者釋地形雖有髙下不平皆可種穀給食髙而可食者名原詩大雅云篤公劉于胥斯原是也陂陀不平而可食者名阪詩小雅正月云瞻彼阪田有菀其特是也下平而可食者名隰本作溼誤注公羊傳曰下平曰隰釋曰此昭元年傳文也案彼云晉荀吳帥帥敗狄干大原此大鹵也曷為謂之大原地物從中國邑人名從主人原者何上平曰原下平曰隰何休云分别之者地勢各有所生原冝粟隰冝麥當教民所冝因以制貢賦是也田一歲曰災二歲曰新田三歲曰畬釋曰此釋耕田年歲逺近名義不同之事也災者災也畬和柔之意也孫炎云災始災殺其草木也新田成柔田也畬和也田舒緩也郭云今江東呼𥘉耕地反草為災注詩曰于彼新田釋曰此小雅采芭篇文也案彼云薄言采芭于彼新田于此災畝毛傳取此文為説故引為證也注易曰不災畬釋曰此無妾六二爻辭也鄭注亦取此文故引以為證也野釋曰此亦題上事也上自邑外謂之郊以下雖逺近髙下其名不同野為揔稱故題云野東至至人武釋曰此釋九州之外四方極逺之國名及其人性稟氣不同也泰逺邠國濮鉛祝栗此四方極逺之國名也觚竹者漢書地理志遼西令支有孤竹域是乎北戶者即日南郡是也顔師古曰言其在日之南所謂北戶以向日者西王母者山海西荒經云西海之中流沙之濵赤水之後黑水之前有大山名昆崘之丘有人戴勝虎齒有尾穴處名曰西王母又穆天子傳曰天子賔于西王母乃紀其迹于弇山名曰西王母之山是也曰下者謂日所出處其下之國也山海東荒經云大荒之中有山名曰大言日月所出有波谷山者有大人之國又云大荒之中有山名曰合虛日月所出有中容之國如此之類是也云謂之四荒者言聲教不及無禮義文章是四方昏荒之國也在上四極之內云九夷八狄七戎六蠻謂之四海者孫炎云海之言晦晦暗於禮義也注九夷至荒者釋曰知在東西南北者以曲禮云其在東夷北狄西戎南蠻雖大曰子故也案風俗通云東方人好生萬物抵觸地而出夷者抵也其類有九依東夷傳夷有九種曰畎夷一夷方夷黃夷白夷赤夷玄夷風夷陽夷又一曰玄菟二曰樂浪三曰髙驪四曰滿飾五曰鳧更六曰索家七曰東屠八曰倭人九曰天鄙蠻者風俗通云君臣同川而俗極為簡慢蠻者慢也其類有八李巡云一曰天笁二曰咳首三曰僬僥四曰跛踵五曰穿胸六曰儋耳七曰狗軏八曰旁舂戎者風俗通云斬伐殺生不得其中戎者凶也其類有六李巡云一曰僥夷二曰戎央三曰老白四曰耆羌五曰鼻息六曰天剛狄者風俗通云父子嫂叔同穴無別狄者辟也其行邪辟其類有五李巡云一曰月支二曰穢貃三曰胸奴四曰單于五曰白屋案李巡所注爾雅本謂之四海下更三句云八蠻在南方六戎在西方五狄在北方故得此解孫炎郭氏諸夲皆無此三句案明堂位稱九夷八蠻六戎五狄周禮職方氏掌四夷八蠻七閩九貉五戎六狄之人鄭注云四八七九五六周之所服國數也遍檢經傳四夷之數參差不同先儒舊解此爾雅上文殷制明堂位及職方井爾雅下文皆為周制義或當然此在四荒之內九州之外於王者丗一見周禮曰九州之外謂之蕃國丗一見是也故云次四荒者岠齊州以南戴日為丹穴釋曰此明四海之中別有下四種之名也岠去也齊中也中州猶言中國也戴值也言去中國以南北戶以北值日之下其處名丹穴天老説鳯云濯羽弱水莫宿丹穴又山海經云禱過山東五百里曰丹穴山是乎云北戴斗極為空桐者斗北斗也極者中宫天極星其一明者泰一之常居也以其居天之中故謂之極極中也北斗栱極故云斗極值此斗極之下其處名空桐注即蒙汜也釋曰即者即淮南子云日出扶桑入於蒙汜是也注地氣使之然也釋曰言是土地之氣剛柔不同使之仁智信武耳若考工記云鄭之刀宋之斤魯之削吳越之劒遷平其地而弗能為良地氣然也釋丘第十釋曰案廣雅云小陵曰丘説文解字曰土之髙也非人所為也從北從二地也人居在丘南故從北中邦之居在昆崘東南一曰四方髙中央下為丘象形此下云非人為之丘然則土有自然而髙小於陵者名丘也其體雖一其名則多或近道途或因水澤所如則陵畝各異其重則再三不同通見詩書此篇具釋故名釋丘丘一成為敦丘釋曰成重也言丘上更有一丘相重纍者名敦丘詩衛風氓篇云送子涉淇至于頓丘是也注成猶至為敦釋曰孫炎云形如覆敦敦器似盂今案下文別云如覆敦者敦丘則此自是丘之一重者故郭氏云成猶重也與孫氏意異云周禮曰為壇三成者此秋官司儀職文也鄭司農云三成三重也引之證成為重也再成為陶丘釋曰丘形上有兩丘相重纍者名陶丘李巡曰再成其形再重也禹貢曰濟水東出于陶丘北是也注今濟至陶丘釋曰濟隂郡名定陶縣名地理志云定陶縣西南有陶丘亭是也再成鋭上為融丘釋曰丘形再重而頂鑯者名融丘也三成為昆崘丘釋曰丘形三重者名為昆崘丘注昆崘山三重故以名云釋曰昆崘山記云昆崘山一名昆丘三重髙萬一千里是也凡丘之形三重者因取此名云耳如乘者乘丘釋曰郭氏兩解一云形似車乘也繩證切二或云乘謂稻田塍埒乘市陵切許叔重云塍埒稻田畦隄埒畔也案地理志云泰山有乘丘春秋莊十五年公敗宋師于乘丘是因丘以為名乎如渚者渚丘釋曰渚水中可居之小者丘形似之名為渚丘也水潦所止泥丘釋曰水潦雨水也丘形頂上汚下雨水停止而成泥濘者名泥丘方丘胡丘釋曰丘形四方者名胡丘絶髙為之京釋曰言卓絶髙大如丘而人力為作之者名京案春秋宣十二年左氏傳楚敗晉師於邲潘黨曰君盍築武庫而收晉尸以為京觀楚子曰云云今罪無所而民皆盡忠以死君命又可以為京乎是其類也非人為之丘釋曰李巡云謂非人力所為自然生者孫炎曰地性自然也故郭云地自然生水潦所還埒丘釋曰還環繞也埒小隄也壝土為之言此丘邊有其界埒外則為水潦環繞者名埒丘上正章丘釋曰丘頂上平正者名章丘章亦平也澤中有丘都丘釋曰都水所聚也言在池澤中者因名都丘當途梧丘釋曰途道也梧遇也當道有丘名梧丘言若相遇於道路然也途出其右而還之畫丘釋曰右謂西也還繞也畫規畫也言道出丘西而復環繞之者名畫丘若為道所規畫然也途出其前戴丘釋曰謂道過丘南若為道負戴故名戴丘途出其後昌丘釋曰謂道過丘北者名昌丘水出至營丘釋曰此釋丘之前後左右有水過之者名也左右猶東西也注今齊至及東釋曰地理志云齊郡臨淄城中有丘即營丘也志又云泰山萊蕪縣淄水所出東至博昌入泲然則淄水出萊蕪經臨淄過營丘南折而北至博昌入泲也言此以證水出其左名營丘也如覆敦者敦丘注敦盂釋曰案周禮九嬪職云凡祭祀贊玉齍注云玉齍玉敦也受黍稷器又少牢禮曰主婦執一金敦黍有蓋凡設四敦皆南首注云敦有首者尊者器飾也飾象龜形孝經緯説敦與簠簋容受雖同上下內外皆圎為異郭氏言敦孟舉其類而言之也丘形如覆敦者名敦丘也邐迆沙丘注旁行連延釋曰説文云邐行也迣邪行也故注云旁行連延也連延謂連接延長丘形邪行連接而長者名沙丘地理志云巨鹿有紂所作沙丘臺在東北七十里左髙至陵丘釋曰此四者釋丘形左右前後髙而名不同者也注詩云旄丘之葛兮釋曰邶風旄丘篇文也偏髙阿丘注詩云陟彼阿丘釋曰謂丘形四隅有一髙而不正在左右前後者名阿丘也詩云者鄘風載馳篇文也宛中宛丘注宛謂中央隆髙釋曰案詩陳風云宛丘之上兮毛傳云四方髙中央下曰宛丘李巡孫炎亦皆云中央下而郭氏以為中央髙者以其四方髙中央下即是上文水潦所止泥丘也又下云丘上有丘為宛丘作者嫌人不曉故重辨之既言丘上有丘非中央隆髙而何此郭氏所以不從先儒也丘背有丘為負丘釋曰此解宛丘之狀也言中央隆峻若丘背之上更有一丘而負戴之者名宛丘又名負丘也左澤定丘釋曰謂丘之東有水澤者名定丘右陵秦丘釋曰謂丘之西有大阜者名泰丘注宋有大丘社曰見史記釋曰案六國年表周顯王三十三年秦惠文王二年宋大丘社亡是也宋依丘作社在宋國於時亡去故云大丘社亡亦咎徴也如畝畝丘釋曰李巡曰謂丘如田畝曰畝丘孫炎曰方百步郭以為畝田之壟也丘形有界埒似之因名云詩小雅巷伯云楊園之道猗於畝丘是也如陵陵丘注陵大阜也釋曰丘形如大阜者名陵丘云陵大阜者釋地文也注説者至在耳釋曰此郭氏破先儒説天下名丘未當也碌小石也碌碌多貌恐此州黎等五丘碌碌然小耳史記毛遂入楚謂平原君諸舍人曰公等碌碌所謂因人成事者也意相類也殆近也近自更有魁梧然桀大者五但名號所在今所未詳知也此巳上釋衆丘之名義故題曰丘也望崖灑而髙岸釋曰望視也崖水邊也灑水深也言視水邊之崖其下水深其崖髙峻者名岸詩衛風云淇則有岸夷上灑下不漘釋曰李巡云夷上平上灑下峭下故名漘孫炎曰平上峭下故名曰漘不者蓋衍字郭云崖上平坦而下深者為漘不發聲也詩王風葛藟云在河之漘是也隩隈釋曰隩一名隈也孫炎云隈水曲中也詩衛風云瞻彼淇隩故此釋之也注淮南子曰漁者不爭隈釋曰案淮南子原道篇云昔舜耕於歷山期年而曰者爭處墝埆以封畔肥饒相讓釣於河濵期年而漁者爭處湍瀨以曲隈深潭相豫是不爭隈之事也引之以證隈即崖內深隩之處也崖內為隩外為隈釋曰别崖表裏之名也孫炎云內曲裏也外曲表也李巡曰崖內近水為隩其外為鞫此句覆釋上文隩隈之處也云外為隈者隈當作鞫傳寫誤也詩大雅公劉云芮鞫之即毛傳云水之外曰鞫然則崖在水曲其內名隩又名隈其外名鞫又作𨸰音義同今以隩隈一事分為外內之名故知誤也畢堂牆釋曰李巡云堂牆名崖似堂牆曰畢郭以畢終南山之道名也其邊之崖如堂室之牆言平正也詩秦風云終南何有有紀有堂是也重崖岸釋曰言兩崖相重纍者亦名岸也岸上滸釋曰岸上平地去水稍逺者名滸詩大雅綿篇云率西水滸之類是也墳大防釋曰李巡曰墳謂崖岸狀如墳墓名大防也詩周南云遵彼汝墳又釋地云墳莫大於河墳是也涘為崖釋曰李巡曰涘一名崖崖謂水邊也詩秦風云所謂伊人在水之涘是也窮瀆汜釋曰謂窮困不通之水瀆名汜也亦得名溪即釋山云山豄無所通溪郭注云所謂窮瀆者雖無所通與水注川同名是也谷者溦釋曰謂窮瀆汜若能通於谷者則别名溦也此巳上釋崖岸之名也故題崖岸釋山第十一釋曰案釋名云山産也言産生萬物説文云山宣也宣氣散生萬物有石而髙象形也此篇釋諸山之名故云釋山河南華至江南衡釋曰篇首載此五山者以為中國之名山也案周禮職方氏河南曰豫州其山鎮曰華山正西曰雍州其山鎮曰嶽正東曰兖州其山鎮曰岱山正北曰并州其山鎮曰恆山正南曰荆州其山鎮曰衡山鄭注云鎮名山安地德者也又為五嶽知者案鄭注大司樂云五嶽岱在兖州衡在荆州華在豫州嶽在雍州恆在并州是也案下文及經典羣書言五嶽者皆數嵩髙不數嶽而鄭云然者蓋鄭有所案據更見異意也其正名五嶽必取嵩髙為定解下文别釋云河南華注華隂山者案禹貢導河積石至于龍門南至于華隂東至于底柱孔安國云河自龍門南流至華山北而東行然則此山在河之南故曰河南華下皆放此在華隂縣界故曰華隂山也云河西嶽注吳嶽者在西河之西一名吳嶽鄭玄云在汧云河東岱注岱宗泰山者在東河之東一名岱宗一名泰山鄭玄云在博云河北恆注北嶽恆山者下文恆山為北嶽是也鄭玄云在上曲陽云江南衡注衡山南嶽者禹貢云岷山導江又曰岷山之陽至于衡山孔注云衡山江所經然則江水經此山之北東入于海故曰江南衡也鄭注大宗伯云五嶽南曰衡也是也山三襲陟注襲亦重釋曰山之形若三山重纍者名陟重衣謂之襲故以襲為重也上篇注已云成猶重也故此云亦也再成英注兩山相重釋曰成重也山形兩重者名英今南郡英山縣蓋取此名也一成坯注書曰至于大伾釋曰案此文則山上更有一山重纍者名坯書曰者禹貢文也孔安國云山再成曰伾與此不同者蓋所見異也鄭玄云大伾在修武武德之界張揖云成皋縣山也漢書音義臣瓉以為皆非今黎陽縣山臨河豈不是大岯乎瓉意當然山大而髙嵩注今中嶽髙山蓋依此名釋曰詩大雅云嵩髙維嶽毛傳云嵩髙貌釋名云嵩竦也亦髙稱也李巡曰髙大曰嵩此則山髙大者自名嵩本不指中嶽今之中嶽名嵩髙或取此文以立名乎無正文故云蓋以疑之山小而髙岑注言岑崟釋曰言山形雖小而髙嶔崟者名岑也鋭而髙嶠注言鑯峻釋曰鋭則鐵也言山形鑯峻而髙者名嶠列子曰渤海之東有壑其中山曰貟嶠蓋同此也卑而大扈注扈廣貌釋曰言山形卑下而廣大者名扈禮記檀弓云南官縚之妻之姑之喪夫子誨之髽曰爾母扈扈爾鄭注云扈扈謂大廣蓋取此義也小而衆巋注小山叢羅釋曰言山小而衆叢萃羅列者名巋小山岌大山峘注岌謂髙過釋曰言小山與大山相並而小山髙過於大山者名峘非謂小山名岌大山名峘也屬者嶧注言駱驛相連屬釋曰言山形相連屬駱驛然不絶者名嶧駱驛連屬不絶之辭禹貢云嶧陽孤桐地理志云東海下邳縣西有葛嶧山取此名也獨者蜀注蜀亦孤獨釋曰言山之孤獨者名蜀案説文云蜀蟲名詩云蜎蜎者蜀釋蟲云蚅烏蠋郭云大蟲如指似蠶此蟲更無羣匹故云蜀亦孤獨既蟲之孤獨者名蜀是以山之孤獨者亦名蜀也上正章注山上平釋曰正猶平也言山形上平者名章宛中隆注山中央髙釋曰言山形中央藴聚而髙者名隆山脊岡注謂山長脊釋曰孫炎云長山之脊也言髙山之長脊名岡詩云陟彼髙岡是也未及上翠微注近上旁陂釋曰謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微也山頂冢崒者厜㕒釋曰此二句釋小雅十月云山冢崒崩之文也毛傳云山頂曰冡鄭箋云崒者崔搜雖音字小異義實同也是取此文為説彼云冡者謂山頂也釋言云顚頂也故此郭云山巔彼云崒者謂山巔之末其峯巉巖厜㕒然者也山如堂者密釋曰言山形如堂室者名密注尸子至美摐釋曰此尸子綽子篇文引之證山有名密者如防者盛注防隄釋曰此盛讀如粢盛之盛隄防之形嶞而髙峻若黍稷之在器故其山形如隄防者亦名盛也巒山嶞釋曰凡物狹而長者謂之嶞則此言山嶞者謂山形狹長者一名巒也注詩曰嶞山喬嶽釋曰周頌般篇文也重甗隒注謂山至名云釋曰孫炎云山墓有重岸也郭云甗甑者鄭衆注考工記云甗無底甑方言云甑自關而東謂之甗故知甗甑也左右有岸厒注夾山有岸釋曰謂山兩邊有水山與水為岸此山名厒大山官小山霍釋曰宫猶圍繞也謂小山在中大山在外圍繞之山形若此者名霍非謂大山名宫小山名霍也注宫謂至是也釋曰云禮記曰者喪大記文也鄭注云宫謂圍障之也引之者證宫為圍繞之義也小山引大山鮮注不相連釋曰謂小山與大山分别不相連屬者名鮮李巡云大山少故曰鮮山絶陘注連山中斷絶釋曰謂山形連延中忽斷絶者名陘多小石磝注多礓礫釋曰礓礫即小石也山多此小石者名磝釋名曰小石曰礫多大石礐注多盤石釋曰盤大石也山多此盤石者名礐多草木岵無草木峐注皆見詩釋曰峐當作屺音起案詩魏風云陟彼岵兮瞻望父兮又曰陟彼屺兮瞻望母兮毛傳云山無草木曰岵山有草木曰屺與此不同者當是傳寫誤也王肅解依爾雅山上有水埒注有停泉釋曰謂山巔之上有停泉者名埒夏有水冬無水澩注有停潦釋曰潦兩水也言山上汚下夏有停潦至冬竭固者名澩山豄無所通溪釋曰豄即溝瀆也山有豄而無通流者名溪注所謂至同名釋曰云所謂者所謂釋丘云窮瀆汜者也云與水注川同者即釋水云水注川曰溪是也石戴至為砠釋曰詩周南卷耳云陟彼崔嵬又云陟彼砠矣毛傳云崔嵬土山之戴石者石山戴土曰砠與此正反者或傳寫誤也山夾水澗陵夾水澞釋曰謂山間有水者名澗詩云考槃在澗是也其陵間有水者名澞山有穴為岫釋曰謂山有巖穴者為岫也山西日夕陽注暮乃見日釋曰日即陽也夕始得陽故名夕陽詩大雅公劉云度其夕陽豳居允荒是也山東曰朝陽注旦即見日釋曰謂山頂之東皆早朝見日但是山東之岡脊總曰朝陽詩大雅卷阿曰梧桐生矣于彼朝陽是也泰山至中嶽釋曰案周禮太宗伯云以血祭祭社稷五祀五嶽故此釋之也白虎通云嶽者何謂嶽之為言捔捔功德也東方為岱者言萬物皆相代於東方也南方為霍霍之為言護也言太陽用事護養萬物也西方為華華之為言獲也言萬物成熟可得獲也北方為恆恆者常也萬物伏藏於北方其常也中央為嵩嵩言其峻大也風俗通云嶽捔考功德黜陟也然則以四方方有一山天子巡守至其下捔考諸侯功德而黜陟之故謂之嶽也案詩傳言四嶽之名東嶽岱南嶽衡此及諸經傳多云泰山為東嶽霍山為南嶽者皆山有二名也風俗通云泰山山之尊一曰岱宗岱始也宗長也萬物之始隂陽交代故為五嶽長王者受命恆封禪之衡山一名霍言萬物霍然大也華變也萬物成變由於西方也恆常也萬物伏北方有常也嵩髙也言髙大也是解衡之與霍泰之與岱皆一山而有二名也若此上云江南衡地理志云衡山在長沙湘南縣張楫廣雅云天柱謂之霍山地理志云天柱在廬江潛縣則在江北矣而云衡霍一山二名者本衡山一名霍山漢武帝移嶽神於天柱又名天柱亦為霍故漢已來衡霍别耳郭云霍山今在廬江潛縣西南别名天柱山漢武帝以衡山遼曠移其神於此今其土俗人皆呼之為南嶽南嶽本自以兩山為名非從近也而學者多以霍山不得為南嶽又言從漢武帝始乃名之如此言為武帝在爾雅前乎斯不然矣竊以璞言為然何則孫炎以霍山為誤當作衡山案書傳虞夏傳及白虎通風俗通廣雅並云霍山為南嶽豈諸文皆誤明是衡山一名霍也注即天柱山潛水所出釋曰此據作注時霍山為言也此山本名天柱漢武帝移江南霍山之祀於此故又名霍山其經之霍山即江南衡是也故上注云衡山南嶽也注大室山也釋曰案山海經云半石山東五十里曰少室山又東三十里曰泰室山郭注云即中嶽嵩髙山也今在陽城縣西戴延之西征記云其山東謂之太室西謂之少室相去十七里嵩其揔名也以其下各有室焉故謂之室是也梁山晉望也注晉國至河上釋曰言梁山在晉國境內晉以歲時望祭之故云晉望也云晉國所望祭者案春秋僖三十一年經云夏四月四卜郊不從乃免牲猶三望公羊傳云三望者何望祭也鄭君以為望者祭山川之名也諸侯之祭山川在其地者非其地則不祭賈逵服虔杜預皆以為三望分野之里國中山川楚語云天子遍祀羣神品物諸侯二王後祀天地三辰及其土地之山川注國語者皆云諸侯二王後祀天地三辰日月星也非二王後祀分野星辰山川也以此言之則分野之星國內山川其義是也今案昭元年左傳云辰為商星參為晉星又禮記禮器云晉人將有事於河必先有事於呼池及此云梁山晉望也然則晉國二望謂參也梁山也河也故云晉國所望祭者云今在馮翊夏陽縣西北者地理志文也知臨河上者成五年公羊傳曰梁山者何河上之山也故知臨河上釋水第十二釋曰説文解字云水凖也北方之行家衆水並流中有微陽之氣也白虎通云水之為言準也是平均法則之稱此篇釋諸水之名故曰釋水泉一見三名為瀐釋曰説文云泉水原也言此泉其水有時出見有時不出而竭涸者名瀐謂瀐微也故注云才有貌井一有水一無水為瀱汋釋曰説文云井鑿地取水也釋名云井清也泉之清潔者也丗本云伯益作亦云黃帝始穿此言井或一時有水一時無水者名瀱汋也注山海至類也釋曰案中山經云帝囷山東南五十里曰視山其上多韭有井焉名天井夏有水冬竭者是也孫子兵法云地陷曰天井然則非人為之者曰天井云即此類也者以此經但言井山海經言天井非正相當故云類也濫泉正出正出涌出也釋曰時大雅瞻卬云觱沸檻泉故此釋之也詩言檻泉者正直上出之泉也其水涌出故更云正出涌出也李巡曰水泉從下上出曰涌泉濫檻音義同注公羊至正也釋曰案昭五年傳云叔弓帥師敗莒師于濆泉濆泉者何直泉也直泉者涌泉也是其事也郭云直出者蓋以義言之彼言直此言正其意一也故云直猶正也沃泉縣出縣出下出也注從上溜下釋曰李巡亦云水泉從上溜下然則相傳為然也曹風云洌彼下泉則此沃泉也氿泉穴出穴出仄出也注從旁出也釋曰李巡曰水泉從旁出名曰氿氿仄出是側出曰氿泉也大東云有洌氿泉是也湀闢流川注通流釋曰説文解字云川貫穿通流水也虞書曰濬畎澮距川言深畎澮之水會為川也釋名云川穿也穿地而流也然則湀闢者則通流大川之别名也過辨回川注旋流釋曰回旋也言川水之中有回旋而流者名過辨灉反入釋曰反復也謂河水決出而復入河者名灉即下云水自河出為灉是也灘沙出釋曰言灘者是沙堆出於水中之名也故云沙出汧出不流釋曰謂水泉潛出停成汙池者名汧地理志云扶風汧縣雍州弦蒲藪汧出西北入渭以其𥘉出不流停成弦蒲澤藪故曰汧出不流也其終則入渭也歸異出同流肥釋曰謂小水支分歸入大水則異其泉源𥘉出則同流者名肥即詩邶風泉水云我思肥泉兹之永歎毛傳云所出同所歸異為肥泉是也瀵大出尾下釋曰尾猶底也言源深大出於底下者名瀵瀵猶灑散也注今河至底也釋曰河東馮翊者皆郡名也云河中渚上者皆謂水中可居之小者云人壅其流以為陂種稻者澤障曰陂謂人壅畜此水以為陂澤而溉稻田也云瀵魁者魁師也首也以其水源故謂之魁也水醮曰厬釋曰醮盡也凡水之盡皆曰厬厬則竭涸之一名也水自至汝為濆釋曰此十者皆大水分出别為小水之名也注書曰灉沮會同釋曰禹貢兖州云雷夏既澤灉沮會同孔安國云雷夏澤名灉沮二水會同此澤引之證水自河出别名為灉也注書曰沱潛既道釋曰禹貢梁州云岷嶓既藝沱潛既道孔安國云岷山嶓冢皆山名沱潛發源此州入荆州案地理志云蜀郡有湔道岷山在西徼外江水所出也隴西郡西縣嶓冢山西漢水所出是二者皆山名也沱出于江潛出于漢二水發源此州而入荆州故荆州亦云沱潛既道案郭氏音義云沱水自蜀郡都水縣揃山與江别而更流又云有水從漢中沔陽南流至梓潼漢壽入太穴中通洞山下西南潛出一名沔水舊俗云即禹貢潛也郭氏此言並解梁州沱潛也然則此注言書曰者亦指梁州者也所以荆州亦有沱潛者蓋以水從江漢出者皆曰沱潛所以荆梁二州皆有也注書曰岷山導江東别為沱釋曰亦禹貢文也孔安國云江東南流沱東行引之證江水溢出名沱也注詩曰遵彼汝墳釋曰此周南汝墳篇文也毛傳云汝水名也墳大防也毛意以為伐薪冝於崖岸之上故以大防解之郭意以為汝濆所分之處有美地因謂之濆且毛傳墳從土此濆從水所以異也水決之澤為汧釋曰凡水為人所決陂障為澤者亦與上出不流者同名汧也決復入為汜釋曰凡水決之歧流復還本水者名汜詩召南云江有汜是也河水至為徑釋曰案詩魏風伐檀篇云河水清且漣猗又曰河水清且直猗又曰河水清且淪猗故此釋之毛傳云風行水成文曰漣直直波也小風水成文轉如輪也李巡云分别水大小曲直之名郭氏云瀾言渙瀾淪言藴淪徑言徑涏然則瀾直淪論水波之異皆辭也案詩漣淪皆言波名直波不言徑而言直又在淪漪前者取韻故也瀾漣雖異而義同瀾漪先舉詩文然後釋之直淪不舉者省文從可知也滸水崖注水邊地釋曰謂水邊崖岸之地别名滸李巡曰滸水邊地名崖也詩大雅江漢云江漢之滸是也注詩曰居河之湄釋曰此小雅巧言之篇文也以詩有此言故釋之云水草交為湄李巡曰水中有草水交會曰湄今詩作麋音義同濟有至為厲釋曰案詩邶風匏有苦葉篇云匏有苦葉濟有深涉深則厲淺則揭故此先引詩文然後釋之云揭者揭衣也謂渡處水淺惟褰裳可涉者名揭注云謂褰裳也者對文言之則在上曰衣在下曰裳散而言之則通是以此經言揭衣注言褰裳曲禮云兩手摳衣去齊尺衣亦謂裳也云以衣涉水為厲者此衣謂褌也言水深至於褌以上者而涉渡者名厲云繇膝以下為揭者此更釋揭涉及厲之名繇與由同繇由也言水淺自膝以下為揭水差深自膝以上者為涉水若深至衣帶以上者為厲注云繇自也釋詁文潛行為泳釋曰謂人潛隱水底而行者名為泳詩周南漢廣云漢之廣矣不可泳思是矣注晏子至七里釋曰晏子者名嬰諡平仲相齊景公孔子稱善與人交者也著書謂之晏子春秋云景公蓄勇士公孫接田開強古冶子事景公以勇力搏於虎問晏子而趨三子者不起晏子見公請去之公乃使人餽之二桃令三子計功而食公孫接曰接一搏特􅢢再搏乳虎若接之功可以食桃而母與人同矣援桃而起田開強曰吾杖兵郤三軍者再若開強之功可以食桃而母與人同矣援桃而起古冶子曰吾嘗從君濟於河黿銜左驂以入砥柱之一流當是時也冶少不能遊潛行逆流百步順流九里得黿而殺之左操馬尾右挈黿頭鶴躍而出津人皆曰河伯也冶之視之則大黿之首也若冶之功可以食桃而母與人同矣二子恥功不逮而自殺古冶子亦自殺是其所引之文也以證潛行為泳之事也但彼作九里此作七里蓋傳寫誤或所見本異也泛泛至緌也釋曰泛泛楊舟紼縭維之此詩小雅采菽篇文也云紼􅛢也縭緌也此釋詩紼縭之義也李巡云􅛢竹為索所以維持舟者郭云緌繫孫炎云舟止繫之於樹木戾竹為大索然則紼訓為􅛢􅛢是大絙縭訓為緌緌又為繫正謂舟之止息以絙繫而維持之也天子至乘泭釋曰此釋尊卑橋船之異制也云天子造舟者詩大雅大明云造舟為梁是也言造舟者比船於水加版於土即今之浮橋故杜預云造舟為梁則河橋之謂也維舟以下則水土浮而行但船有多少為等差耳云庶人乘泭者詩漢廣云江之永矣不可方思毛傳云方泭也釋言云舫泭郭注云水中竺二稗筏論語曰乘桴浮於海注云桴編竹木大曰筏小曰桴是也桴泭音義同水注至曰瀆注此皆道水轉相灌注所入之處名也釋曰郭云轉相灌注者蓋以川瀆皆水之大者也虞書云濬畎澮距川下云江河淮濟為四瀆是也今若言水注川曰溪謂水之注入川者名溪則注入溝者名澮溝小如澮豈能容乎若言注溝曰澮謂注溝水入之名澮則注川水入之者名溪杜預云溪亦澗也豈能容受川水乎然則水注川曰溪是澗溪之水注入於川也故李巡云水出於山入於川曰溪注溪曰谷謂山谷中水注入澗溪也山谷曰溝此以下與土不類謂山谷中水無澗溪者注入平地之溝溝廣深四尺注溝曰澮廣二尋深二仞曰澮謂注溝水入之者名澮注澮水入之者名瀆故注云轉相灌注也逆流至泝遊注皆見詩釋曰案詩秦風蒹葭云遡洄從之道阻且長遡遊從之宛在水中央是也孫炎曰逆渡者逆流也順渡者順流也然則逆流順流皆謂渡水有逆順也正絶流曰亂釋曰正直也謂橫絶其流而直渡名曰亂注書曰亂于河釋曰案禹貢梁州云入于渭亂于河孔安國云越沔而北入渭浮東渡河而還帝都曰所治以帝都在河之東故直橫渡河陸行而還帝都也彼孔氏引此文故以為證也江河至者也釋曰案白虎通云瀆者何謂瀆中國恬濁發源而注海其功著大稱瀆也案禹貢云導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過降水至于大陸又北播為九河同為逆河入于海岷山導江東别為沱又東至于澧過九江至于東陵東迆北會于匯東為中江入于海導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海導淮自桐柏東會于泗沂東入于海是發源注海者也水泉釋曰題上事也下皆倣此水中至為潏釋曰此一段釋水中之地名也故下題云水中案李巡云四方皆有水中央獨可居但大小異其名耳若人所作者則名潏周南云在河之洲召南云江有渚采繁云于沼于沚秦風兼葭云宛在水中坻是其所出之文也河出至一直釋曰此一假釋河源所自及逺近曲直之勢也故下題云河曲云河出昆崘虛色白者昆崘山名虛山下基也言河源出於昆崘山下之基其初纎微源髙激湊故水色白也云所渠并千七百者謂所受之渠并計凡有一千七百也云一川色黃者以其所受渠多沙壤溷淆故為一川而水色黃也云百里一小曲千里一曲一直者此河自然之勢也故謂之河曲注山海至北隅釋曰案海內西經云帝之下都昆崘之虛方八百里髙萬仞河水出東北隅以行其北西南又入渤海又出海外即西北而北入禹所謂石山又北山經云敦夢山敦夢水出焉西注泑澤出乎昆崘東北隅實惟河源郭注云即河出昆崘虛也今注云西北者蓋所見本異或傳寫誤注潛流至濁黃釋曰云潛流地中者案漢書西域傳云河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤者去玉門陽關三百餘里廣袤三四百里其水停居冬夏不增減皆以為潛行地下南出于積石為中國河又山海經云不周山東望泑澤河水之所潛也其源渾渾泡泡郭注云河出昆崘潛行地下至蔥嶺山于闐國復分流歧出合而東流注泑澤又復潛行南出于積石而為中國河泑澤一名蒲昌海潛行渾渾泡泡水濆涌之貌是潛流地中也説文云泪水流也溷濁也淆雜亂也言水流漱其沙壤所受之渠又多衆水溷濁雜亂所以冝其水濁且黃也注公羊至一直釋曰此文十二年傳文也案彼經云晉人秦人戰于河曲傳云曷為以水地河曲疏矣河千里而一曲也言其河曲之地疏闊故可戰也引之證河必千里一曲一直之義然此注以疏為流又加一直字誤也徒駭至鬲津釋曰案禹貢云九河既導故此釋其名下即題云九河也李巡曰徒駭者禹疏九河以徒衆起故曰徒駭太史禹大使徒衆通其水道故曰太史馬頰河勢上廣下狹狀如馬頰也覆釡水中多渚往往而處形如覆釡胡蘇其水下流故曰胡蘇胡下也蘇流也簡大也河水深而大也潔言河水多山石治之苦潔潔苦也鉤盤言河水曲如鉤屈折如盤也鬲津河水狹小可隔以為津也孫炎曰徒駭禹疏九河用功雖廣衆懼不成故曰徒駭胡蘇水流多散胡蘇然其餘同李巡郭云徒駭今在成平東光縣今有胡蘇亭馬頰覆釜鬲津之名同李巡簡云水多約潔鉤盤水曲如鉤流盤桓也餘名皆云其義未詳計禹陳九河云復其故道則名應先有不冝徒駭太史因禹立名此郭氏所以未詳也或九河雖舊有名至禹治水更别立名即此所云是也漢書溝洫志成帝時河隄都尉許啇上書曰古記九河之名有徒駭胡蘇鬲津今見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝也許商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也此九河之次從北而南既知三河之處則其餘六者太史馬頰覆釡在東光之北成平之南簡潔鉤盤在東光之南鬲縣之北也其河填塞時有故道鄭玄云周時齊桓公塞之同為一河今河間弓髙以東至平原鬲津往往有其遺處春秋緯寶乾圖云移河為界在齊吕填閼八流以自廣鄭玄蓋據此文為齊桓公塞之也言閼八流拓境則塞其東流八枝并使歸於徒駭也此九河之名義也案胡蘇在東光定本注作東管管當作光字之誤也從釋地巳下至九河皆禹所名也釋曰謂釋地巳下凡四篇其中五嶽四瀆及諸山川丘陵之名皆禹所制也然山川等名其來尚矣治水之後更復改新言此名是禹所制非禹始為名也爾雅疏卷第七
