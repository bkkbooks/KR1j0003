body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋詁下卬吾台豫朕身甫余言我也釋曰我者施身自謂也此皆我之別稱也卬者郭云卬猶姎也語之轉耳説文云女人稱我曰姎由其語轉故曰卬邶風匏有苦葉云人涉卬否吾者孔子曰吾自衛反魯身者我之躬也余者邶谷風云伊余來墍餘皆見注注書曰至見詩釋曰云書曰非台小子者湯誓文云古者貴賤皆自稱朕者大禹謨云帝曰朕宅帝位禹曰朕德罔克屈原亦云朕皇考曰伯庸是貴賤皆自稱朕史記秦始皇二十六年定為至尊之稱漢因不改以迄於今云禮記云授政任功曰豫一人畛於鬼神曰有某甫者皆下曲禮文云言見詩者周南葛覃云言告師氏言告言歸是也朕余躬身也釋曰身即我也郭云今人亦自呼為身舍人曰余謙卑之身也孫炎曰余舒遲之身也僖九年左傳云齊侯曰小白余杜注云小白齊侯名余身也邶谷風云我躬不閲台朕賚卑卜陽豫也釋曰豫即與也皆謂賜與台者遺與也讀助也不以力助以心助也郭云紹介勸尚皆相佑助孫炎曰介者相助之義如人之左右手故以介為左右也大雅生民云攸介攸止故轉為右左右即亮也亦皆謂佐助反覆相訓以盡其義亮涼音義同緝熙烈顯昭晧熲光也釋曰顯者光明也大雅假樂云顯顯令德説文云昭曰明也大雅雲漢云昭回于天皓者亦日光也熲火光也小雅無將大車云不出于熲注詩曰至烈光釋曰云學有緝熙于光明者周頌敬之文又曰休有烈光周頌載見文劼鞏堅篤掔虔膠固也釋曰皆牢固也劼者確固也鞏者説文云以革有所束也堅者剛強之固也論語曰不曰堅乎磨而不磷篤者厚也物厚者牢固掔者掔亦牢固之意虔者恭之固也膠著所以固物小雅隰桑云德音孔膠注劼虔至志也釋曰云劼􅐚皆見詩書者酒誥云劼毖殷獻臣大雅韓奕云虔共爾位云易曰鞏用黃牛之革固志也者案革卦云初九鞏用黃牛之革遁卦六二象曰執用黃牛固志也文與此異然則郭云固志者所以釋革卦之鞏非謂遁之固志疇孰誰也釋曰皆謂語辭不為義也又猶言誰人也論語云君孰與不足陳風墓門云誰昔然矣注易曰疇離祉釋曰否卦九四爻辭也暀暀皇皇藐藐穆穆休嘉珍禕懿鑠美也釋曰皆謂美盛也少儀云祭祀之美齊齊皇皇鄭玄云皇皇讀如歸往之往彼言皇皇則此暀暀也少儀又云言語之美穆穆皇皇曲禮云天子穆穆諸侯皇皇鄭注皆云行容止之貌然則皇皇穆穆者皆言語容止之美盛也大雅嵩髙云既成藐藐毛傳云藐藐美貌休者大禹謨云戒之用休又曰嘉乃丕績儒行云席上之珍以待聘禕者歎美也懿者周頌時邁云我求懿德鑠者周頌酌篇云於鑠王師是皆謂美之常語爾諧輯協和也關關噰噰音聲和也協燮和也釋曰皆謂和同協者説文云衆之同和也關關噰噰者皆鳥鳴音聲相和也周南關雎云關關雎鳩邶風匏有苦葉云噰噰鳴鴈協即古文協字注書曰至柔克釋曰書曰八音克諧虞書舜典文云左傳曰百姓輯睦者案僖十五年及成十六年皆云羣臣輯睦其是乎云書曰夑友柔克者周書洪範文從申神加弼崇重也釋曰隨從申重加增弼輔崇充皆所以為重疊也大雅鳧鷖云福祿來崇觳悉卒泯忽滅罄空畢罊殱拔殄盡也注觳今至見詩釋曰此皆謂終盡觳今直語耳忽然盡貌左傳曰皇陶庭堅不祀忽諸云今江東呼厭極為罊者以時驗而言也説文云器中盡也云餘皆見詩者悉者説文云詳盡也卒者終盡也衛風日月云畜我不卒泯者滅盡也大雅桑柔云靡國不泯滅絶盡也小雅正月云寧或滅之罄者説文云器中空也小雅蓼莪云瓶之罄矣空者小雅大東云杼柚其空畢者小雅無羊云畢來既外殱者舍人曰衆之盡也秦風黃鳥云殱我良人拔者搴除使盡也殄者詩云邦國殄瘁苞蕪茂豐也釋曰皆豐盛也苞者草木叢生也禹貢云草木漸苞蕪者繁蕪也洪範云庶草蕃廡蕪廡音義同茂者茂盛也小雅天保云如松柏之茂揫斂屈收戢搜裒鳩樓聚也釋曰皆會聚也斂者率聚也禮記大學曰百乘之家不畜聚斂之臣收者周頌維天之命云我其收之戢者藏聚也周頌時邁云載戢干戈餘皆見注注禮記至聚也釋曰云禮記曰秋之言揫揫斂也者鄉飲酒義文云春獵為搜搜者以其聚人衆也者春獵為搜釋天文也云詩曰屈此羣醜者魯頌泮水文云原隰裒矣者小雅常棣文云左傳曰以鳩其民者隱八年文云樓猶今言拘樓聚也者以時驗而言也肅齊遄速亟屢數迅疾也釋曰皆謂急疾也肅者召南小星云肅肅宵征毛傳云肅肅疾貌齊者壯疾也遄者邶風泉水云遄臻于衛速者論語云無欲速亟者欺兾切論語曰好從事而亟失時一云亟居力切大雅靈臺云匪亟其欲屢者小雅巧言云君子屢盟數者祭義云祭不欲數迅者疾走也論語云迅雷風烈必變注詩曰仲山甫徂齊釋曰大雅蒸民文寁駿肅亟遄速也釋曰速亦疾也肅亟遄轉相訓耳駿者猶迅也禮記大傳云逡奔走駿逡音義同鄭注云疾奔走言勸事也注詩曰不疌故也釋曰鄭風遵大路文壑坑坑滕徴隍漮虛也釋曰皆謂空虛也壑者溪壑也大雅韓奕云實墉實壑坑坑者坎陷之虛也但重言耳隍者城池無水者易曰城復于隍漮者注引方言云康之言空也彼注云漮㝗空貌亦丘墟之空無小雅賔之初筵云酌彼康爵鄭箋云康虛也漮康音義同黎庶蒸多醜師旅衆也釋曰皆謂衆夥也注云皆見詩者大雅雲漢云周餘黎民靈臺云庶民子來蒸民云天生蒸民周頌載見云思皇多祜大雅綿篇云戎醜猶行棫朴云六師及之小雅采芭云振旅闐闐之類是也洋觀裒衆那多也釋曰皆謂重多也洋者洋溢亦多貌魯頌閟官云萬舞洋洋裒者聚之多也易曰君子以裒多益寡衆者周頌臣工云命我衆人注詩曰至不那釋曰詩曰薄言觀者小雅采緑文又曰受福不那者桑扈文流差柬擇也釋曰皆選擇也周南關雎云左右流之小雅吉日云既差我馬邶風云簡兮簡兮皆是也簡柬音義同戰栗震驚戁竦恐懾懼也釋曰皆惶怖也論語曰使民戰栗詩秦風黃鳥云惴惴其栗易曰震來􅊒􅊒又曰驚逺而懼邇也詩云不㸐不竦月令曰國時有恐樂記曰柔氣不懾是皆懼也懾即懾也注詩曰不戁不竦釋曰商頌長發文也痡瘏虺穨玄黃劬勞咎悴瘽愈鰥戮癙癵㾖癢疧疵閔逐疚痗瘥痱􅓠瘵瘼癠病也釋曰疾甚曰病此皆病之通名耳孫炎曰痡人疲不能行之病瘏馬疲不能進之病虺穨馬罷不能升髙之病玄黃馬更黃色之病然則虺穨者病之狀玄黃者病之變色郭云皆人病之通名而説者便為之馬病失其義也蓋指孫炎不能弘通故云失其義也咎者罪病也悴者小雅雨無正云維躬是瘁悴瘁音義同瘽者勞苦之病也愈者小雅角弓云交相為愈戮者相戮辱亦可恥病也癙及癢者小雅正月云癙憂以癢舍人云癙癵㾖癢皆心憂憊之病也孫炎云癙者畏之病也㾖者小雅十月云悠悠我里㾖里音義同疧者孫炎云滯之病也小雅白華云俾我疧兮疵者瑕釁小病也閔者豳風鴟梟云鬻子之閔斯逐者衛風考槃云碩人之軸鄭箋云軸病也軸與逐蓋今古字郭氏未詳疚者小雅采薇云憂心孔疚痗者小雅十月云亦孔之痗瘥者節南山云天方薦瘥痱者四月云百卉具腓痱腓音義同􅓠者大雅板篇云下民卒􅓠瘵者大雅瞻卬云士民其瘵瘼者大雅桑柔云瘼此下民餘皆見注注詩曰至見詩釋曰云生我劬勞者小雅蓼莪文云書曰智藏􅘃在者周書召誥文云今江東呼病曰瘵者以時驗而言云東齊曰瘼者方言文云禮記曰親癠色容不盛者玉藻文恙寫悝盰繇慘恤罹憂也釋曰皆謂憂愁也恙者聘禮云公問君賔對公再拜鄭注云拜其無恙郭云今人云無恙謂無憂也寫者有憂者思散寫也小雅車舝云我心寫兮繇者繇役亦為憂愁慘者心憂也恤者小雅祈父云胡轉子于恤罹者王風兔爰云逢此百罹注詩曰至盱矣釋曰云詩曰悠悠我悝者小雅十月文云何盱矣者卷耳及都人士文也倫勩邛敕勤愈庸疸勞也釋曰皆謂勞苦也倫者理也理治事務者必勞勩者廣雅云苦也孫炎曰習事之勞也敕者相約敕也亦為勞苦勤者勞力也梓材云既勤垣墉愈者懶也郭云勞苦者多惰愈今字或作寙同庸者民功曰庸疸者説文云勞病也注詩曰至庸者釋曰云詩曰莫知我勩者小雅雨無正文云維王之邛者巧言文云哀我疸人者大東文云國語曰無功庸者案晉語韓獻子老使公族穆子受事於朝辭曰屬公之亂無忌備公族不能死臣聞之曰無功庸者不敢居髙位今無忌智不能匡君使至於難仁不能救勇不能死敢辱君朝以忝韓宗請退也固辭不立悼公聞之曰難雖不能死而能讓不可不賞使掌公族大夫是其事也勞來強事謂翦篲勤也釋曰皆謂勤勞也勞來者以其有勤勞也自勉強者亦為勤由能事事有功者亦為勤注詩曰職勞不來逮其謂之釋曰云職勞不來者小雅大東文人以不被勞來者為不見勤故采薇序曰杖杜以勤歸即是勞來也云逮其謂之者召南摽有梅文也悠傷憂思也釋曰皆感思也悠者秦風渭陽云悠悠我思傷者周雨卷耳云維以不永傷憂者愁思也懷惟慮願念惄思也釋曰皆思念也方言云鬱悠懷惄惟慮願念靖愼思也晉宋衛魯之間謂之鬱悠惟凡思也慮謀思也願欲思也念常思也東齊海岱之間曰靖秦晉或曰愼凡思之貌亦曰愼或曰惄舍人曰惄志而不得之思也注詩曰惄如調飢釋曰周南汝墳文祿祉履戩祓禧禠祜福也釋曰皆福祜也福祿對文則小異散則祿亦福也商頌玄鳥云百祿是何鄭箋謂當簷負天之多福祉者繁多之福也周頌烈文云錫兹祉福祜者小雅信南山云受天之祜注詩曰至康矣釋曰云詩曰福履綏之者周南樛木文云俾爾戩榖者小雅天保文云祓祿康矣者大雅卷阿文禋祀祠蒸嘗禴祭也釋曰皆祭之別名祭際也人神交際説文云從示從又從肉又手也以手持肉示神所以祭也禋者説文云潔祀也祀者説文云祭無巳也餘者四時祭名疏具釋天注書曰禋于六宗釋曰虞書舜典文孔安國云精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也儼恪祗翼諲恭欽寅熯敬也釋曰皆謂謹敬也儼者郭云儼然敬貌論語云儼然人望而畏之恪者心敬也周書微子之命云恪愼克孝祗者虞書大禹謨云祗承于帝翼者小心之敬也云恭者敬貌也大雅桑柔云溫溫恭人欽者堯典云欽若昊天注書曰至熯矣釋曰云書曰夙夜惟寅者虞書舜典文云詩曰我孔熯矣者小雅楚茨文朝旦夙晨晙早也釋曰早者説文云晨也從日在甲上十古文甲字今即以不晚為早朝者鄘風蝃蝀云崇朝其雨毛傳云崇終也從旦至食時為終朝旦者説文云明也從日在一上一地也陳風東門之枌云榖旦于差夙者齊風東方未明云不夙則莫晨者説文云晨昧爽也東方未明云不能晨夜晙亦明之早也􅓄俟替戾底止徯待也釋曰皆相待也􅓄者邶風匏有苦葉云卬須我友俟者齊風著篇云俟我于著乎而􅓄須俟俟音義同替戾砥者郭云皆止也止亦相待注書曰徯我后釋曰商書大甲文噊幾災殆危也釋曰皆危險也説文云危在髙而懼幾者幾猶殆也周書顧命云無以釗冒貢于非幾殆者小雅節南山云無小人殆􅠟汽也釋曰説文云剴摩也郭讀􅠟為剴云謂相摩近孫炎云汽近也大雅民勞云汽可小康鄭箋云汽幾也反覆相訓故汽得為幾也昭二十年左傳亦引此詩杜預云汽期也然則期字雖別皆是近義言其近當如此史記稱漢髙祖欲廢大子周昌曰臣口不能言然臣期知其不可陛下雖欲廢大子臣期不奉詔言期者意亦與此同也治肆古故也釋曰肆之為故語更端辭也商書湯誥曰肆台小子古之為故謂舊故也周頌良耜云續古之人肆故今也釋曰詩大雅綿篇云肆不殄厥愠毛傳云肆故今也即以肆之一字為故今因上起下之語郭氏字別為義云肆既為故又為今今亦為故故亦為今此義相反而兼通者事例在下在下者謂在下文徂在存也注惇亶祜篤掔仍肶埤竺腹厚也釋曰皆重厚也惇者周書武成云惇信明義亶者誠之厚也大雅桑柔云逢天僤怒小雅天保云俾爾單厚周頌昊天有成命云單厥心皆訓厚也亶僤單音義同祜者福厚也篤者周頌維天之命云曽孫篤之掔然厚貌頻仍埤益肶輔皆重厚釋天云仍飢為荐邶風北門云政事一埤益我小雅節南山云天子是毗又采菽云福祿膍之肶毗膍音義同竺與篤同腹者小雅蓼莪云出入腹我月令云水澤腹堅載謨食詐偽也釋曰皆虛偽也郭云載者言而不信謨者謀而不忠者以載詁為言謨為謀今又為偽故以為言而不信謀而不忠不信不忠則是偽也食者孫炎曰食言之偽也哀二十五年左傳云孟武伯惡郭重曰何肥也公曰是食言多矣能無肥乎然則言而不行如食之消盡後終不行前言為偽故通謂偽言為食言故此訓食為偽也詐者方言云膠譎詐也涼州西南之間曰膠自關而東西或曰譎或曰膠詐通語也注書曰朕不食言釋曰商書湯誥文話猷載行訛言也釋曰皆謂言辭也話者善言也孫炎曰善人之言也猷者道也道亦言也載者載於簡䇿之言也郭云今江東通謂語為行丗以妖言為訛注詩曰至之載釋曰云詩曰愼爾出話者大雅抑篇文云周禮曰作盟詛之載者春官詛祝職文也遘逢遇也遘逢遇遻也遘逢遇遻見也釋曰皆謂相遭遇觸遻而相見也召南草蟲云亦既遘止周書洪範云子孫其逢吉鄭風野有蔓草云邂逅相遇轉復相訓三者又為相觸遻遘逢遇遻四者皆行而相值之名行而相值即見也故又為見顯昭覲釗覿見也釋曰顯昭皆明見也周頌敬之云天維顯思又時邁云明昭有周覲釗覿者皆下見上也曲禮云天子當依而立諸侯北面而見天子曰覲郊特牲云不敢私覿注逸書曰釗我周王釋曰不在今尚書之內故曰逸監瞻臨涖眺相視也釋曰皆謂察視也小雅節南山云何用不監又曰民具爾瞻大雅大明云上帝臨女文王丗子云成王幼不能涖阼眺者考工記云瑑圭璋八寸璧琮八寸以眺聘鄭注云眺視也聘問也衆來曰眺特來曰聘相者小雅小辨云相彼投兔鞠訩溢盈也釋曰皆謂盈多訩訟滿溢皆盈多也注詩曰降此鞠訩釋曰小雅節南山文毛傳云鞠盈訩訟也鄭箋云盈猶多也以盈者必多故鄭轉云盈猶多也孔魄哉延虛無之言間也釋曰間謂間隙也孔者孔穴小雅角弓云如酌孔取魄者形也謂月之無光之處名魄也康誥云惟三月哉生魄延者今墓道也虛無者空無所有也是皆有間隙也瘞幽隱匿蔽竄微也釋曰微謂逃藏也瘞者埋藏之微也幽者深微也隱者潛隱而微也匿者舍人曰藏之微也蔽者覆障使微也竄者行之微是皆微昧不顯揚也注左傳曰其徒微之是也釋曰案昭十七年傳云楚白公勝作亂殺子西子期葉公子髙至遇針尹固帥其屬將與白公子髙曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之是也訖徽妥懷安按替戻底底尼定曷遏止也釋曰皆謂止住也訖者終止也妥者坐止也懷至止也安休止也抑按替廢皆止住也大雅云以按徂旅小雅云勿替引之定者靜止也曷者俗以抑止為曷今以逆相止為遏餘皆見注注戾底至尼之釋曰云戾底義見詩者小雅采菽云亦是戾矣底者在物之下是亦止也凡注言見詩今毛詩無者蓋在齊魯韓詩也云國語曰戾久將砥者案晉語云文公在翟十二年狐偃曰日吾來此也非以翟為榮可以成事也吾曰奔而易逹困而有資休以擇利可以戻也今戻久矣戻久將砥砥著滯淫誰能興之盍速行乎是其事也云孟子曰行或尼之者案孟子魯平公將見孟子嬖人臧倉止之樂正子見孟子曰克告於君君為來見也嬖人有臧倉沮君君是以不來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氐之子焉能使子不遏哉是其事也此云行或尼之者所見夲異或傳寫誤豫射猒也注詩曰服之無斁釋曰謂猒倦也云詩曰者周南葛覃文也烈績業也釋曰謂功業也烈者周頌執競云無競維烈績者大雅文王有聲云維禹之績績勳功也釋曰謂功勞也績者虞書大禹謨云嘉乃丕績勳者案周禮司勳職云王功曰勳鄭注云輔成王業若周公功績質登平明考就成也釋曰皆謂成濟也勳功績業皆有成也事有分明亦成濟也舜典云三載考績周頌敬之云曰就月將皆言成功也注詩曰至成也釋曰云詩曰質爾民人者大雅抑篇文云禮記曰年榖不登者下曲禮文云榖梁傳曰平者成也者宣十五年文也梏梗較頲庭道直也釋曰梏梗較頲皆正直也庭條直也道者頲道無所屈注詩曰既庭且碩釋曰小雅大田文密康靜也釋曰皆安靜也周頌昊天有成命夙夜基命宥密大雅生民云不康禋祀豫寧綏康柔安也釋曰皆安樂也大雅板篇云不敢戲豫虞書大禹謨云萬邦咸寧商書大甲云撫綏萬邦大雅民勞云汔可小康虞書舜典云柔逺能邇平均夷弟易也釋曰易者不難也和平均一皆易直也周頌天作云𡵨有夷之行大雅泂酌云豈弟君子矢弛也弛易也釋曰郭云弛放也以弓釋弦曰弛故云弛放禮記雜記云一張一弛弛又為易謂相延易也希寡鮮罕也鮮寡也釋曰皆簡少之稱也論語云希不失矣易説卦云巽為寡髮大雅抑篇云鮮不為則郭云罕亦希也鄭風大叔于田云叔發罕忌鮮又為寡轉互相訓皆謂希少爾酬酢侑報也釋曰皆相報答也郭云此通謂相報答不主于飲酒者以飲酒之禮主人酌酒於賔曰獻賔既卒爵洗而酌主人曰酢主人既卒酢爵又酌自飲卒爵復酌進賔曰酬故説者以酬酢主謂飲酒相報答郭以易繫辭云可與酬酢謂應對萬物也小雅楚茨云萬壽攸酢是神報主人也故云不主于飲酒侑者案公食大夫禮賔三飯之後云公受宰夫束帛以侑注云束帛十端帛也侑猶勸也主國君以為食賔殷勤之意未至復發幣以勸之欲其深安賔也是侑者主人所以報賔也毗劉暴樂也釋曰舍人曰毗劉爆樂之意也木枝葉稀踈不均為爆樂郭云謂樹葉缺落蔭疏爆樂見詩者大雅桑柔云捋采其劉毛傳云劉爆爍而希也是矣覭髳佛離也釋曰郭云謂草木之叢茸翳薈也茀離即彌離彌離猶蒙蘢耳孫叔然字別為義失矣郭以時驗而為此解孫氏每字各別為義故云失矣蠱諂二疑也釋曰皆謂疑惑也郭云蠱惑有二心者皆疑也者案昭元年左傳晉趙孟問於醫和曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱是蠱惑也二者心疑不一也大雅大明云無二尓心毛傳云無敢懷二心也云左傳曰天命不諂者哀十七年葉公子髙辭也楨翰儀幹也釋曰舍人曰楨正也築牆所立兩木也翰所以當牆兩邊障土者也大雅生民云維周之楨又嵩髙云維周之翰儀表亦體幹也弼棐輔比俌也釋曰俌猶輔也弼者商書説命云夢帝賴豫良弼棐者周書康誥云天威棐忱輔者商書湯誓云爾尚輔豫一人比者易比卦彖云比輔也強界邊衛圉垂也釋曰謂四垂也郭云疆埸竟界邊旁營衛守圉皆在外垂也舍人曰圉拒邊垂也孫炎曰圉國之四垂也注左傳曰聊以固吾圉也釋曰隱十一年鄭伯辭也昌敵強應丁當也釋曰皆相當也昌者言當也敵者仇匹相當也文六年左傳曰敵惠敵怨強者好與物相當值應者對當也大雅下武云應侯順德丁者雲漢云寧丁我躬注書曰禹拜昌言釋曰虞書大禹謨文浡肩搖動蠢迪俶厲作也釋曰皆興作也浡然興作貌莊公十一年左傳云禹湯罪巳其興也悖焉肩者勝任之作也搖者考工記矢人云夾而搖之以視其豐殺之節也動者商書咸有一德云德惟一動罔不吉蠢者鄉飲酒義云春之為言蠢也俶者始作也厲者方言云厲卬為也甌越曰卬吳曰厲為亦作也注公羊至樂矣釋曰云公羊傳曰俶甚也者隱九年云三月庚辰大雨雪何以書記異也何異爾俶甚也云穀梁傳曰始厲樂矣者隱五年云九月考仲子之宫初獻六羽始僭樂矣尸子曰舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣兹斯咨呰巳此也釋曰此者對彼之稱言近在是也兹者虞書大禹謨云念兹在兹斯者召南殷其雷云何斯違斯咎與兹同呰巳與此皆音相近故得為此也郭云呰巳皆方俗異語嗟咨􅜚也釋曰皆歎也周南卷耳云嗟我懷人堯典云疇咨若時登庸郭云今河北人云􅜚歎間狎串貫習也釋曰皆便習也莊二十二年左傳曰赦其不間於教訓曲禮曰賢者狎而敬之大雅皇矣云串夷載路齊風猗嗟云射則貫兮皆是言也郭云串厭串貫貫伏也今俗語皆然者當東晉時有此厭串貫伏之語故以為證也曩塵佇淹留久也釋曰曩嚮塵垢佇企淹滯留止皆稽久也通見詩書逮及暨與也釋曰皆相親與也郭云公羊傳曰會及暨皆與也者隱元年文也云逮亦及也者方言文騭假格陟躋登升也釋曰皆謂升上陟者周南卷耳云陟彼髙岡餘見注注方言至升也釋曰云方言曰者案彼云躡郅音質跋音企􅛕躋躍音躍登也自關而西秦晉之間曰躡東齊海岱之間謂之躋魯衛曰郅梁益之間曰􅛕或曰跋騭郅格􅛕音義同云禮記曰天王登遐者下曲禮文云公羊傳曰躋者何升也者文公二年文也揮盝歇涸竭也釋曰皆謂竭盡也揮者郭云揮振去水亦為竭曲禮曰執玉器者弗揮是也盝即漉也郭云歇通語謂歇即竭之通語也涸水竭也注月令至成梁釋曰云月令云無漉陂池者案月令仲春之月是月也無竭川澤無漉陂池無焚山林鄭注云順陽養物也畜水曰陂穿地通水曰池云國語曰水涸而成梁者案周語定王使單襄公聘於宋遂假道於陳以聘楚單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室今陳國火朝覿矣而道路若塞野埸若棄澤不陂障川無舟梁是廢先王之教也引之者證涸為水竭挋拭刷淸也釋曰郭云振訊抆拭掃刷皆所以為潔清禮記喪大記云挋用巾哀十四年公羊傳云反𬒮拭面周禮凌人職云夏頒冰掌事秋刷後鄭云秋涼冰不用可以淸除其室鴻昏於顯間代也注鴻鴈至相代釋曰皆謂更代也云鴻鴈知運代者鴻鴈之屬九月而南正月而北是知其時運而更代南北也云昏主代明者釋經昏字也日入後二刻半為昏昏來則明往故云昏主代明云明亦代昏者釋經顯也顯即明也云間錯亦相代者謂間厠交錯亦相更代也儀禮鄉飲酒云乃間歌魚麗鄭注云間代也謂一歌則一吹是也又周頌桓篇云皇以間之饁餉饋也釋曰饋者以食遺與也野饋曰饁舍人曰餉自家之野也注國語曰其妻饁之釋曰晉語云臼季使舍於兾野兾缺耨其妻饁之敬相代如賔從而問之兾芮之子也與之歸既復命而進之曰臣得賢人敢以告是也遷運徙也釋曰皆謂移徙也大雅皇矣云帝遷明德易曰日月運行郭云今江東通言遷徙者時驗而言也秉拱執也釋曰皆謂持執也周書金縢二植壁秉圭郭云兩手持為拱老子云雖有拱壁廞熙興也釋曰皆謂興作郭云書曰庶績咸熙者虞書舜典文云廞見周官者周官即周禮也笙師職云大喪廞其樂器鄭注廞興也興謂作之衛蹶假嘉也釋曰謂嘉美也郭云詩序曰假樂嘉成王也者大雅假樂篇序也廢稅赦舍也釋曰皆舍置也廢者宣八年公羊傳云廢其無聲者赦者放置也虞書舜典云青災肆赦郭云詩曰召伯所稅者召南甘棠文也棲遲憩休苦㕟齂呬息也釋曰皆止息也舍人曰棲遲行步之息郭云棲遲遊息也陳風衡門云衡門之下可以棲遲憩者召南甘棠云召伯所憩休者止而息也周南漢廣云不可休息苦者郭云苦勞者冝止息㕟齂呬者郭云皆氣息貌案方言云䭒消息喙呬息也周鄭宋沛之間曰䭒自關而西秦晉之間或曰喙或曰䭒東齊曰呬故郭云今東齊呼息為呬也供峙共具也釋曰皆謂備具也供者論語云子路共之供共音義同峙者周書費誓云峙乃糗糧周頌臣工云庤乃錢鎛峙庤音義同共者小雅小旻云靖共爾位􅤷憐惠愛也釋曰愛謂寵惜也方言云憮亡輔切㤿音掩憐牟愛也韓鄭曰憮晉衛曰㤿汝潁之間曰憐宋魯之間曰牟秦或曰憐憐通語也故郭云􅤷韓鄭語今江東通呼為憐􅤷憮音義同惠者仁愛也邶北風云惠而好我娠蠢震戁妯騷感訛蹶動也釋曰皆謂動作娠者説文云妊娠動也郭云娠猶震也者以大雅生民云載震載夙昭元年左傳曰邑薑方震大叔哀元年左傳曰后緡方震皆謂有身為震故云娠猶震也蠢者郭云蠢戁騷蹶自搖動貌小雅采芭云蠢爾蠻荆震者大雅常武云震驚徐方戁者恐動也商頌長發云不戁不竦騷者大雅常武云徐方繹騷蹶者大雅綿篇云文王蹶厥生注詩曰至或訛釋曰云詩曰憂心且妯者小雅鼓鍾文云無感我帨兮者召南野有死麕文云或寢或訛者小雅無羊文覆察副審也釋曰郭云覆校察視副長皆所為審諦覆者月令季春云命舟牧覆舟五覆五反察者周書吕刑云惟察惟法副者次長之稱契滅殄絶也釋曰皆謂斷絶契者郭云今江東呼刻斷為契斷定九年左傳曰盡借邑人之車契其軸杜注云契刻也滅者小雅正月云寧或滅之殄者大雅桑柔云不殄心憂郡臻仍乃侯乃也釋曰乃語辭也乃乃音義同大雅綿篇云乃慰乃止是也迪繇訓道也釋曰虞書大禹謨云惠迪吉小雅巧言云秩秩大猷猷繇音義同周書顧命云命汝嗣訓僉咸胥皆也釋曰謂衆皆也舜典云僉曰伯禹作司空商書云咸有一德郭云東齊曰胥見方言者案方言云僉胥皆也自山而東五國之郊曰命東齊曰胥是也育孟耆艾正伯長也釋曰皆謂長上也郭云育養亦為長邶谷風云既生既育鄭箋云育謂長老也孟庶長也又周書康誥云王若曰孟侯孔安國云孟長也五侯之長耆艾皆老長也曲禮曰五十曰艾服官政六十曰耆指使正伯皆官長大雅雲漢云以戾庶正盤庚云邦伯師長艾歷也釋曰艾又為歷郭云長者多更歷歷秭算數也釋曰皆算數也郭云歷歷數也推律所生之數虞書大禹謨云天之歷數在汝躬秭者周頌豐年云萬億及秭毛傳云數億至萬曰億數億至億曰秭郭云今以十億為秭者以時驗而言也注論語云何足算也釋曰案論語子貢問曰今之從政者何如子曰噫斗筲之人何足算也鄭曰算數也歷傅也釋曰謂傅近也隱十一年左傳云庚辰傅於許艾歷覛胥相也釋曰皆謂相共也覛者郭云覛謂相視也説文云覛邪視也郭云公羊傳曰胥盟者何相盟也者桓三年文乂亂靖神弗淈治也注論語至詩書釋曰皆治理也舍人曰亂義之治也孫炎曰亂治之理也云論語曰豫有亂臣十人者泰伯篇文也淈書序作汩音同耳者虞書序云帝釐下土方設居方别生分類作汩作孔傳云汩治作興也言其治民之功興故為汩作之篇亡云餘並見詩書者舜典云有能俾乂小雅菀柳云俾豫靖之大雅生民云茀厥豐草弗茀音義同頥艾育養也釋曰頥者易曰頥貞吉育者易無妄象曰先王以茂對時育萬物郭云汝潁梁宋之間曰艾方言云者案方言云台胎陶鞠養也晉衛燕魏曰台音頤陳楚韓鄭之間曰鞠秦或曰陶汝潁梁宋之間曰胎或曰艾是也汏渾隕墜也釋曰皆墜落也郭云汏渾皆水落貌春秋僖公十六年經云星隕如雨際接翜捷也釋曰郭云捷謂相接續也際者相會之捷也左傳曰爾未際也小雅菀柳云無自瘵焉鄭箋云瘵接也接者曾子問云接祭而巳謂捷速而祭也翜者未詳毖神溢愼也釋曰謂謹愼也毖者周書洛誥云夙夜毖祀溢者舍人曰溢行之愼周頌維天之命云假以溢我故注云見詩書鬱陶繇喜也注孟子至字耳釋曰皆謂歡恱鬱陶者心初恱而末暢之意也云孟子曰鬱陶思君者案孟子云象往入舜宫舜在牀琴曰鬱陶思君爾忸怩趙氏注云象見舜生在牀鼓琴愕然反辭曰我鬱陶思君故來爾辭也忸怩而慙是其情也云禮記曰人喜則斯陶陶斯詠詠斯猶者下檀弓文鄭注云陶鬱陶也咏嘔也猶當為搖聲之誤也搖謂身動搖也秦人猶搖聲相近云猶即繇也古今字耳者言禮記猶即此輕繇也古今字異耳馘穧獲也釋曰皆謂克獲也郭云今以獲賊耳為馘者大雅皇矣云攸馘安安毛傳云不服者殺而獻其左耳曰馘魯頌泮水云在泮獻馘鄭箋云馘所格者之左耳皆謂臨陳格殺之而取其耳也云獲禾為穧者小雅大田云此有不斂穧穧者禾之鋪而未束故云獲禾為穧是並見詩也阻艱難也釋曰皆險難也秦風蒹葭云道阻且長商書説命云非知之艱剡㗉利也釋曰皆耜之利也小雅大田云以我覃耜剡覃音義同周頌載芟云有略其耜㗉略音義同允任壬佞也釋曰皆謂諂佞也允信也佞人似信任者孫炎云似可任之佞也虞書舜典云而難任人壬猶任也臯陶謨云何畏乎巧言令色孔壬俾拼抨使也俾拼抨使從也釋曰皆謂使今隨從也郭云見詩者魯頌閟宫云俾爾熾而昌大雅桑柔云荓云不逮拚荓音義同抨義亦同此皆為使令也俾拼抨使四者又為隨從儴仍因也釋曰皆因緣也費誓曰無敢寇攘鄭注云因其亡失曰攘儴攘音義同施博土讀曰襄周書君奭云襄我二人郭無明説義得兩通論語云仍舊貫董督正也釋曰皆謂御正也虞書大禹謨云董之用威春秋僖公十二云晉衛之間曰蘖陳鄭之間曰烈者方言文迓迎也釋曰謂相逢逆也郭云公羊傳曰跛者迓跛者此成二年傳文案彼云晉郤克與臧孫許同時而聘于齊蕭同姪子者齊君之母也踊于掊而窺客則客或跛或眇於是使跛者迓跛者眇者迓眇者是也引之以證迓為迎也宣二年左傳曰狂狡輅鄭人杜注云輅迎也周禮秋官有訝士及聘禮云厥明訝賔于館鄭注皆云訝迎也召南鵲巢云百兩御之鄭注亦云御迎也字形雖別音義實同蓋以作非一人致兹異也當以迓為正字餘皆假借元良首也釋曰謂頭首也郭云左傳曰狄人歸先軫之元者僖三十三年狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生是也引證元為首良未詳薦摯臻也釋曰臻至也薦進執摯皆所以表至也賡揚續也釋曰謂相繼續也郭云書曰乃賡載歌者虞書益稷文祔祪祖也釋曰謂先祖也説文云祔後死者合食於先祖也郭云祔付也付新死者於祖廟士虞記云明日以其班祔毀廟之主名祪耶尼也釋曰尼近也言即今相近也尼定也釋曰尼詁為止止即定舍人曰尼者私之定也邇幾昵近也釋曰皆謂殆近也邇者鄭風東門之墠云其室則邇幾者聘義曰日幾中而后禮成昵者郭云親近也小雅菀柳云無自昵焉妥安坐也釋曰妥者安定之坐也郭云禮記曰妥而后傳命者案士相見禮云凡言非對也妥而後傳言鄭注云凡言謂巳為君言事也妥安坐也傳言猶出言也此言禮記曰妥而后傳命者傳寫誤也或所見本異貉縮綸也釋曰郭云綸者繩也謂牽縛縮貉之今俗語亦然據時驗而言也大雅綿篇云其繩則直縮板以載貉嗼安定也釋曰皆靜定也大雅皇矣云貃其德音毛傳云貃靜也鄭箋云德正應和曰貃嗼者皇矣又云求民之莫鄭箋云求民之定謂所歸就也貉貃嗼莫音義同安者小雅斯干云乃安斯寢伊維也伊維侯也釋曰皆發語辭轉互相訓邶谷風云伊余來墍大雅大明云維此文王小雅六月云侯誰在矣時實是也釋曰是此也秦風駟驖云奉時辰牡郭云公羊傳曰實來者何是來也者案春秋桓五年冬州公如曹六年春正月實來公羊傳曰實來者何猶曰是人來也引之證實為是也卒猷假輟巳也釋曰皆謂終巳也卒者終盡之巳也輟止巳也論語曰耰而不輒求酋在卒就終也釋曰皆謂終盡也求者大雅下武云丗德作求郭云詩曰嗣先公爾酋矣者大雅卷阿文卒者邶風日月云畜我不卒就者凡事物成就亦終也崩薨無祿卒徂落殪死也釋曰此皆死之别稱也曲禮云天子死曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死鄭注云異死名者為人褻云無知若猶不同然也自上顚壞曰崩薨顚壞之聲卒終也不祿不終其祿死之言澌也精神澌盡也又曰壽考曰卒短折曰不祿鄭注云祿謂有德行任為大夫士而不為者老而死從大夫之稱少而死從士之稱此云無祿者即彼之不祿也徂落者李巡曰徂落堯死之稱郭云古者死亡尊卑同稱耳故尚書堯曰殂落舜曰陟方乃死者皆虞書舜典文也謂之殂落者蓋殂為往也言人命盡而往落者若草木葉落也殪者案隱九年左傳云衷戎師前後擊之盡殪杜注云殪死也爾雅疏卷第二
