body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋宫第五釋器第六釋樂第七釋宮第五釋曰易繫辭云上古穴居而野處後丗聖人易之以宫室上棟下宇以待風雨蓋取諸大壯此其始也白虎通云黃帝作宮室世本曰禹作宫室其臺榭樓閣之異門墉行步之名皆自於宫故以釋宫惣之也宫謂之室室謂之宫釋曰別二名也郭云皆所以通古今之異語明同實而兩名釋名云宫穹也言屋見於垣上穹崇然也室實也言人物實滿於其中也是所從言之異耳詩云作于楚宫又曰入此室處是也古者貴賤所居皆得稱宫故禮記曰由命士以上父子皆異宫又喪服傳繼父為其妻前夫之子築宫廟是士庶人皆有宫稱也至秦漢以來乃定為至尊所居之稱牖尸至之家釋曰牖者戶西窗也此牖東戶西為牖戶之間其處名扆云其內者其扆內也自此扆內即謂之家説文云家居也禮記云巳受命君言不宿於家郭云今人稱家義出於此言其稱家之義本出於此也注禮云至名之釋曰云禮云斧扆者案覲禮云天子設斧依於戶牖之間左右几鄭注云依如今綈素屏風也有繡斧文所以示威也斧謂之黼是也云以其所在處名之者言本牖戶之間名扆覲禮天子設屏風之狀於牖户之間因名此屏風為扆是以其在扆處即名之曰扆也東西牆謂之序釋曰此謂室前堂上東廂西廂之牆也所以次序分別內外親疏故謂之序也尚書顧命云西序東嚮敷重砥席東序西嚮敷重豐席及禮經每云東序西序者皆謂此也西南至之窔釋曰此別室中四隅之異名也云奧者孫炎云室中隱奧之處也古者為室戶不當中而近東則西南隅最為深隱故謂之奧而祭祀及尊者常處焉曲禮云凡為人子者居不主奧是也西北隅名屋漏東北隅名宧東南隅名窔窔亦隱暗之義也與奧相類故郭云亦也注詩曰至未詳釋曰云詩曰尚不愧於屋漏者大雅抑篇文也鄭箋云尚無肅敬之心不慙愧於屋漏有神見人之為也屋小帳也漏隱也禮祭於奧既畢改設饌於西北隅而䨾隱之處此祭之末也孫炎云屋漏者當室之白日光所漏入郭云其義未詳者以孫鄭之説皆無所據故不取也注官見禮亦未詳釋曰李巡云東北者陽始起育養萬物故曰宧宧養也説文亦云郭云亦未詳者以頥養之字作頥又室中四隅無取隂陽之義與屋漏意同故云亦未詳也注禮曰掃室聚窔釋曰案既夕記云朔月童子執帚卻之左手奉之從徹者而入比奠舉席掃室聚諸窔布席如初卒奠掃者執帚垂末內鬣從執燭者而東是其事也柣謂至之㞎釋曰此别門戶上下及兩旁之木名也柣者孫炎云門限也經傳諸注皆以閾為門限謂門下橫木為內外之限也俗謂之地柣一名閾曲禮云不履閾是也棖者門兩旁長木一名楔李巡曰棖謂梱上兩旁木禮記玉藻云君入門士介拂棖鄭注云棖門楔也楣即梁也吕伯雍云門樞之橫梁也郭云門戶上橫梁鄉射記云堂則物當楣是也樞者門扉開闔之所由也一名椳易曰樞機之發是也其持樞之木或逹北檼以為牢固者名落時檼即棟也落時又名􅩖是持樞一木有此二名也垝謂至之堊釋曰此别宫室垣墉及修飾之名也坫者堂角也一名垝牆者室之防也一名墉李巡曰謂垣牆也郊特牲曰君南鄉於北墉下注云社內北牆是也亦為城王制注云小城曰附庸大雅皇矣云以伐崇墉義得兩通也鏝者泥鏝也一名杇塗土之作具也論語曰糞土之牆不可杇是也椹者斫木所用以藉者之木名也一名榩孫炎云斫木質也詩商頌云方斫是􅐚是也又名櫍榖梁傳曰裘纒櫍以為臬是也以黑飾地謂之􅉳以白飾牆謂之堊周禮守祧職云其祧則守祧􅉳堊之是也注在堂隅坫㙐也釋曰坫名見於經傳者有三案禮記明堂位云反坫出尊崇坫亢圭及論語邦君為兩君之好有反坫此二者在兩楹之間以土為之非此經所謂也案既夕記云設棜于東堂下南順齊于坫士冠禮云爵辨皮辨緇布冠各一匴執以待于西坫南則此經所謂也鄭注云坫在堂角然則堂之東南角為東坫西南角為西坫故郭云在堂隅坫㙐也端則端也言坫是堂角端也注書曰既勤垣墉釋曰此周書梓材篇文也案彼云若作室家既勤垣墉惟其塗墍茨孔傳云如人為室家巳勤立垣墉惟其當塗墍茨蓋之此喻教化也樴謂至之閣釋曰此别杙所在長短之名也杙即橛也一名樴置杙在牆者名楎在地及門中者名臬玉藻云公事自闑西私事自闑東是也大者名栱長者名閣也注禮記曰不敢縣於夫之楎椸釋曰此內則文也鄭注云竿謂之椸楎杙也闍謂至之榭釋曰别臺榭之制也積土四方而髙者名臺即下云四方而髙者也一名闍李巡云積土為之所以觀望詩云出其闉闍彼以闍為城臺於此臺上有木起屋者名榭月令仲夏云可以處臺榭謂此也雞棲至為塒釋曰李巡曰別雞所棲之名也弋橛也鑿牆為雞作棲曰塒注今寒至見詩釋曰云今寒鄉穿牆棲雞者謂苦寒之鄉也避寒故穿牆以棲雞云皆見詩者案王風君子于役云雞棲于塒又曰雞棲于桀是也植謂之傳傳謂之突釋曰植謂戶之維持鎖者也植木為之因名云又名傳又名突也文見埤蒼杗廇至之樀釋曰此别梁柱棟榱之名也梁即屋大梁也一名杗廇楹柱也其梁上短柱名梲禮器云藻梲者謂畫梁上柱為藻文也一名侏儒柱以其短小故也閞者柱上木名也又謂之槉又名欂亦名枅字林云枅柱上方木是也又曰㭼是一物五名也栭一名楶即櫨也皆謂斗栱也禮器云管仲山節者謂刻柱頭為斗栱形如山也棟屋檼也一名桴今屋脊也易曰棟隆吉是也桷屋椽也一名榱吕沈云齊魯名桷周人名榱易曰鴻漸于木或得其桷左傳子産曰棟折榱崩僑將壓焉是也屋椽長直而遂逹五架屋際者名閲郭云謂五架屋際椽正相當若其椽直不上於簷者名交言相交於檼上也郭云謂五架屋際椽不直上簷交於檼上屋簷一名樀一名屋梠又名字皆屋之四垂也故士喪禮曰為銘置于宇西階上鄭注云宇梠是也容謂之防釋曰容者射禮唱獲者蔽身之物也一名防言所以容身防矢也一名乏鄉射禮云乏三侯道居侯黨之一西五步鄭注云容謂之乏所以為獲者御矢也謂之乏者言矢至此力乏也郭云形如今牀頭小曲屏風唱射者所以自防隱見周禮者案夏官射人職云以射法治射儀王以六耦射三侯三獲三容鄭司農云容者乏也待獲者所蔽也是矣連謂之簃釋曰簃樓閣邊相連小屋名也郭云堂樓閣邊小屋今呼之簃厨連觀也屋上薄謂之筄釋曰屋上薄一名筄今謂之屋笮也兩階間至屏謂之樹釋曰此別君臣之位處也人君南面鄉明而治其位在兩階間因名云也云中庭之左右謂之位者左右猶東西也位羣臣之列位也案明堂位云三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上是也云門屏之間謂之寧者謂路門之外屏樹之內人君視朝寧立之處因名為寧李巡云正門內兩孰間曰寧曲禮曰天子當寧而立諸公東面諸侯西面曰朝是也云屏謂之樹者屏蔽也樹立也立牆當門以自蔽也李巡曰垣當門自蔽名曰樹郭云小牆當門中禮禕云天子外屏諸侯內屏郊特牲云旅樹鄭注云旅道也屏謂之樹樹所以蔽行道以此推之則諸侯內屏在路門之內天子外屏在路門之外而近應門者矣閍謂至謂之閎釋曰此别門闕之異名也李巡曰閍廟門名其路門之外受朝正門一名應門應門之外門曰雉門雉門之旁名觀又名闕宮中相通小門名闈闈之小者名閨閨之小者名閣弄頭之門名閎門側之堂夾門東西者名孰門中之橛名闑一名閫闔門扇也一名扉於門辟旁樹長橛所以止扉者名閎注詩曰祝祭於祊釋曰小雅楚茨篇文也案祊本廟門之名設祭於廟門因名其祭亦名祊凡祊有二種一是正祭之時既設於廟又求神於廟門之內郊特牲云索祭祝于祊及詩云祝祭于祊注云祊平生門內之旁待賔客之處與祭同曰也二是明日繹祭之時設饌於廟門外西室亦謂之祊即郊特牲注云祊之禮冝於廟門外之西室及禮器云為祊乎外是也然則廟門內外皆有祊稱注朝門釋曰案詩大雅云乃立臯門臯門有伉乃立應門應門將將鄭箋云諸侯之宫外門曰皋門朝門曰應門內有路門天子之宫加以庫雉案鄭玄注周禮秋官朝士職王五門皋庫雉應路也又曰天子諸侯皆有三朝外朝一內朝二其天子外朝一者在臯門之內庫門之外大詢衆庶之朝也朝士掌之內朝二者正朝在路門外司士掌之燕朝在路門內大僕掌之諸侯之外朝一者在臯門內應門外內朝二者亦在路寢門之外內以正朝在應門內故謂應門為朝門也注宫門雙闕釋曰周禮大宰正月之吉縣治象之法于象魏使萬民觀治象鄭衆云象魏闕也劉熙釋名云闕在門兩旁中央闕然為道也白虎通云闕是闕疑義亦相兼然則其上縣法象其狀魏魏然髙大謂之象魏使人觀之謂之觀也是觀與象魏闕一物而三名也以門之兩旁相對為雙故名雙闕注左傳曰盟諸僖閎釋曰襄十一年傳文也案彼云季武子將作三軍叔孫穆子曰然則盟諸乃盟諸僖閎杜注云僖宫之門是也注公羊傳曰齒著于門闔釋曰莊十二年傳文也案彼云宋萬摶閔公絶其脰仇牧聞君弒趨而至遇之于門手劒而叱之萬臂榝仇牧碎其首齒著乎門闔何休云闔扇也是矣注左傳曰髙其閈閎釋曰襄三十一年傳云子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修寇盜充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館髙其閈閎是也案説文云閈門也汝南平輿里門曰閈閈既為門故郭氏以閎為長杙即門橛也杜預云閎門也非郭義也瓴甋謂之甓釋曰瓴甋一名甓郭云㼾甎也今江東呼瓴甓詩陳風云中唐有甓是也宫中至之逵釋曰此别弄道之異名也宫中弄閣間道名壼孫炎曰巷舍間道也王肅曰今後宫稱永巷是宫內道名也廟中之路名唐堂下至門徑名陳路旅皆途之別名也途即道也路埸猷行四者復是道之異名也一達長道謂之道路岐分二達者謂之路旁言𡵨道旁出也𡵨分三達者謂之劇旁孫炎云旁出𡵨多故曰劇交道四達謂之衢交道四出復有一旁達謂之康孫炎云康樂也交會樂道也交道六出謂之莊孫炎云莊盛也道煩盛三道交出復有岐出者謂之劇驂四道交出謂之崇期四道交復有一𡵨出者謂之逵注詩曰中唐有甓釋曰此詩陳風防有鵲巢篇文也注史記所謂康莊之衢釋曰案史記列傳云騶奭者齊諸騶子亦頗采騶衍之術以紀文於是齊王嘉之自如淳于髠以下皆命曰别大夫為開第康莊之衢是也注左傳曰得慶氏之木百車於莊釋曰案襄二十八年齊慶封謀殺子雅子尾陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車於莊杜注云慶封時有此木積於六軌之道是也注四道交出復有旁通釋曰詩周南云施于中逵毛傳云逵九達之道是也案左傳隱十一年云及大逵桓十四年焚渠門入及大逵莊二十八年衆車入自純門及逵市宣十二年入自皇門至于逵路杜預皆以為道並九軌案周禮經塗九軌不名曰逵杜意蓋以鄭之城內不應有九出之道故以為並九軌於此則不合也室中至之奔釋曰此皆人行步趨走之處因以名云室中名時時然後動堂上曰行謂平行也堂下曰步自虎通云人踐三尺法天地人再舉足曰步備隂陽也門外曰趨鄭玄云行而張拱曰趨中庭曰走走疾趨也大路曰奔奔大走也書曰駿奔走案此經所釋謂祭祀之禮知者以召誥云王朝步自周則至于豐注云告文王廟告文王則告武王可知出廟入廟不以逺為文是也若迎賔則樂師云行以肆夏趨以采薺行謂大寢之庭至路門趨謂路門至應門隄謂至之徛釋曰此別橋彴之名也隄一名梁郭氏兩解一云即橋也以木為之一云以石絶水石杠一名徛郭氏亦兩解一云聚石水中以為步渡彴也廣雅云彴步橋也一云或曰今之石橋注或曰石絶水者為梁見詩傳釋曰案衛風云有狐綏綏在彼淇梁傳云石絶水曰梁是也注孟子曰歲十月徒杠成釋曰案孟子云子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政歲十一月徒杠成十二月輿梁成民未病涉也趙𡵨注云以為子産有惠民之心不知為政當以時修橋梁民何由病苦涉水乎是也引之以證石杠為步橋也此注作十月誤脫或所見本異室有至曰樓釋曰此明寢廟樓臺之制也凡太室有東西廂夾室及前堂有序牆者曰廟但有大室者曰寢月令仲春云寢廟畢備鄭注云前曰廟後曰寢以廟是接神之處其處尊故在前寢衣冠所藏之處對廟為卑故在後無室者名榭春秋宣十六年夏成周宣榭火杜預云宣榭講武屋引此文無室曰榭謂屋歇前然則榭有二義一者臺上構木曰榭上云有木曰榭及月令云可以處臺榭是也二屋歇前無壁者名榭其制如今廳事也春秋云成周宣榭公羊以為宣宫之榭及鄉射禮云榭則鉤楹內是也郭云榭即今堂隍者堂隍即今殿也殿亦無室故云即今堂隍四方而髙者名臺即上闍也修長也凡臺上有屋狹長而屈曲者曰樓釋器第六釋曰案説文云器皿也從犬犬所以守之以此篇釋諸器之名故曰釋器木豆謂之豆注豆禮器也釋曰案周禮瓬人為豆實三而成觳崇尺鄭注云崇髙也豆實四升又祭統云夫人薦豆執校執醴授之執鐙鄭注云校豆中央直者也鐙豆下跗也又禮圖云口圎徑尺黑􅃮飾朱中大夫以上畫以雲氣諸侯以象天子以玉皆謂飾其豆口也然則豆者以木為之髙一尺口足徑一尺其足名鐙中央直豎者名校校徑二寸揔而言之名豆豆實四升用薦菹醢周禮醢人掌四豆之實朝事之豆其實韭菹醓醢之類是也其飾則三代不同明堂位曰夏后氏以楬豆殷玉豆周獻豆注云楬無異物之飾也獻疏刻之是也以供祭祀燕饗故云禮器也竹豆謂之籩注籩亦禮器釋曰案鄭注籩人及士虞禮云籩以竹為之口有藤緣形制如豆亦受四升盛棗栗桃梅菱芡脯修膴鮑糗餌之屬是也亦祭祀享燕所用故云亦禮器瓦豆謂之登釋曰對文則木曰豆瓦曰登散則皆名豆故云瓦豆謂之登冬官瓬人掌為瓦器而云豆中縣鄭云縣繩正豆之柄是瓦亦名豆也詩大雅生民云于豆于登毛傳云豆薦菹醢登大羮也公食大夫禮云大羹湆不和實於登湆者肉汁大古之羹也不調以鹽菜以其質故以瓦器盛之郭云即膏登也盎謂之缶釋曰孫炎云缶瓦器郭云盆也詩陳風云坎其擊缶則缶是樂器易離卦九三不鼓缶而歌則大耊之嗟注云艮爻也位近丑丑上值辨星似缶詩云坎其擊缶則樂器亦有缶又史記藺相如使秦王擊缶是樂器為缶也案坎卦六四樽酒簋二用缶注云爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋二副也建星上有辨星辨星之形又如缶天子大臣以王命出會諸侯主國尊於簋副設玄酒以缶則缶又是酒器也比卦𥘉六爻有孚盈缶注云爻辰在木上值東井井之水人所汲用缶缶汲器襄九年宋災左傳曰具綆缶備水器則缶是汲水之器也然則缶是瓦器可以節樂若今擊甌又可以盛水盛酒即今之瓦盆也甌瓿謂之瓵釋曰甌一名瓿甊一名瓵郭云甌甊小罌長沙謂之瓵方言云缸音瓦都感同切㼾音武䍃音由㽀音鄭㼻仕江切甀度睡切甕瓿甊瓿音部甊落口切㽈牛志切罌也靈桂之郊謂之缸其小者謂之缸周魏之間謂之秦之舊都謂之㽀淮汝之間謂之䍃江湖之間謂之㼻自關而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿甊自關而東趙魏之郊謂之甕或謂之罌東齊海岱之間謂之㽈罌其通語也罃陳魏宋楚之間曰㼶音臾或曰㼡音殊燕之東北朝鮮洌水之間謂之瓺音暢亦陽齊之東北海岱之間謂之儋音擔周洛韓鄭之間謂之甀或謂之罃罃謂之㼰鼓􅽧謂之㽄缶謂之瓿㼴音隅其小者謂之瓶罃甈謂之盎自關而西或謂之盆或謂之盎其小者謂之升甌甂音邊陳魏宋楚之間謂之㼵杜啓切自關而西謂之甂其大者謂之甌是其方俗之異名也康瓠謂之甈釋曰康瓠一名甈瓠即壺也説文云破罌也方言云甈謂之盎皆非郭義也注賈誼説曰寶康瓠是也釋曰案漢書云賈誼洛陽人也年十八以誦詩屬文漢文帝召為博士為絳灌之屬害之天子踈誼為長沙王傅以謫去意不自得及渡湘水為賦以弔屈原其詞曰斡棄周鼎寶康瓠兮是也斪斸謂之定釋曰斪斸一名定郭云鋤屬李巡曰鋤别名也廣雅云定謂之耨丗本云垂作耨吕氏春秋云耨柄尺此其度也其耨六寸所以間稼也髙誘注云耨藝苗也六寸所以入苗間詩頌臣工云庤乃錢鎛毛傳云鎛耨也鎛耨及定當是一器但先儒或即云鋤或云鋤屬古器變易未能識之斫謂之釋曰斫一名鐯郭云钁也説文云钁大鋤也􅝁謂之釋曰郭云皆古鍬鍤字方言云燕之東北朝鮮洌水之間謂之􅝁宋魏之間謂之鏵或謂之鍏音韋江淮南楚之間謂之臿趙魏之間謂之噪音鍪是皆謂今鍬也緵罟至覆車也釋曰此别羅網之異名也罟罔也緵罟一名九罭即魚罔也婺矛牙婦之笱取魚器也一名罶罺一名汕罩捕魚籠一名篧積柴水中取魚名槮又名涔鳥罔名羅兔罔名罝麋罔名罞罞冒也言冒覆其頭也彘豬也其罔名羉羉幕也言幕絡其身也魚之大罔名罛翻車小罔捕鳥者名繴也罿也罬也罦也皆謂覆車也注今之至為緵釋曰云今之百囊罟是亦謂之􅧡今江東呼為緵者以時驗而言也孫炎云九罭謂魚之所入有九囊也詩豳風云九罭之魚鱒魴是也注毛詩至魚笱釋曰云毛詩傳曰罶曲梁也者小雅云魚麗于罶傳云罶曲梁也是矣云謂以簿為魚笱者孫炎云罶曲梁其功易故謂之寡婦之笱然則曲簿也婺矛牙寡也以簿為魚笱其功易號之寡婦之笱耳非寡婦所作也注今之撩罟釋曰李巡云汕以簿汕魚也案詩小雅云南有嘉魚蒸然汕汕傳云樔也箋云樔今之撩罟也皆以今曉古注捕魚籠也釋曰李巡云篧編細竹以為罩捕魚也孫炎云今楚篧也然則罩以竹為之無竹則以荊故謂之楚篧皆謂捕魚籠也詩小雅云南有嘉魚蒸然罩罩是也注今之至取之釋曰李巡曰今以木投水中養魚曰涔孫炎曰積柴養魚曰槮郭云今之作罧者聚積柴木於水中魚得寒入其裏藏隱因以簿圍捕取之小爾雅曰魚之所息謂之潛潛槮也積柴水中魚舍也詩周頌云潛有多魚是也槮罧潛涔古今字注謂羅絡之釋曰李巡云鳥飛張網以羅之然則張網以羅絡飛鳥詩王風云雉離于羅是也注罝猶遮也見詩釋曰詩周南云肅肅兔罝是也李巡云兔自作徑路張罝捕之也然則張罔遮兔因名曰罝注最大罟也今江東云釋曰李巡曰魚罟捕魚具也然則捕魚之具最大者名罛詩衛風云施罛濊濊是也注今之至異語釋曰孫炎曰覆車網可以掩兔者也一物五名方言異也郭云今之翻車也有兩轅中施罥以捕鳥展轉相解廣異語廣雅云罥罟也案詩王風云雉離于罦又曰雉離于罿然則捕鳥之具也孫氏云掩兔非也絇謂之救釋曰郭氏兩解一云救絲以為絇絇屨頭飾也士冠禮曰玄端黑履靑絇鄭注云絇之言拘也以為行戒狀如刀衣鼻在屨頭是也或曰絇履屬小爾雅曰舄而今絇也一云亦罥名者言此經絇亦罥罟之別名也義疑故兩存焉律謂之分釋曰律一名分鄭注月令云律候氣之管也以銅為之律歷志云黃帝使伶倫氏自大夏之西昆崘之隂取竹之解谷斷兩節間而吹之以為黃鍾之官制十二筒以聽鳳皇之鳴其雄鳴則為六律雌鳴則為六呂陽管為律律法也言陽氣與隂氣為法鄭云律述也述氣之管隂管為吕律歷志云吕助也言助陽宣氣又云吕拒也言與陽相承更迭而至又隂律稱同言與陽同也揔而言之隂陽皆稱律故月令十二月皆云律中是也以其分候十二月氣故又名分郭云律管可以分氣是也大版至縮之釋曰此解詩云縮版以載也大版名業以繩束版謂之縮注築牆版也釋曰孫炎曰業所以飾栒刻版捷業如鋸齒也毛詩傳云業大版也所以飾栒為縣也捷業如鋸齒或曰畫之然則業者是樂縣之飾郭必以為築牆版者以此文與縮之相連詩云縮版以載作者以類相從縮既築牆所用之繩則業是築牆之版明矣散而言之則業亦樂縣之飾故詩大雅云虡業維樅周頌云設業設虡而毛鄭皆以為大版所以飾栒為縣也注縮者至以載釋曰孫炎云繩束築版謂之縮然則縮者束物之名用繩束版故謂之縮復言縮之明用繩束之也故云縮者約束之云詩曰縮版以載者大雅綿篇文也彞卣至之坎釋曰別酒尊大小之異名也彞其揔名彞者法也與諸尊為法司尊彞云雞彞鳥彞斝彞黃彞虎彞蜼彞是也卣者下云卣中尊也孫炎云尊彞為上罍為下卣居中郭云不大不小者是在罍彞之間即周禮犧象壷著大山等六尊是也罍者尊之大者也即周禮司尊彞云皆有罍諸臣之所酢是也案禮圖云六彞為上受三斗六尊為中受五斗六罍為下受一斛故異義罍制韓詩説金罍大夫器也天子以玉諸侯大夫皆以金士以梓毛詩説金罍酒器也諸臣之所酢人君以黃金飾尊大一碩金飾龜目蓋刻為雲雷之象謹案韓詩説天子以玉經無明文謂之罍者取象雲雷博施如人君下及諸臣又司尊彞云皆有罍諸臣之所酢注云罍亦刻而畫之為山雲之形言刻畫則用木矣故禮圖依制度云刻木為之韓説言士以梓士無飾言其木體則以上同用梓而加飾耳毛説言大一碩禮圖亦云大一斛則大小之制尊卑同也雖尊卑飾異皆得畫雲雷之形以其云罍取於雲雷故也是彞卣罍三者皆為盛酒器也其罍之小者别名坎衣裗至謂之釋曰此別衣服之異名也云衣者目之也裗一名䘽刺繡黼文於衣領名襮衣之緣飾名純禮記深衣云衣純以繢衣純以青之類是也袕衣開孔也名褮説文云鬼衣也衣眥名襟謂交領也方言云襟謂之交是也衱一名裾即衣後裾也襟衣小帶也一名袸士昏禮曰施襟結帨是也佩下之帶名褑衽裳際也手執持其衽名袺扱衽於帶名襭詩周南云薄言袺之薄言襭之是也衣之蔽前者名襜婦人之香纓名褘又謂之縭縭緌也緌猶繫也取繫屬之義衣下曰裳削殺也裳削殺其幅者名謂深衣之裳也注衣縷至之飾釋曰此郭氏兩解一云衣縷也本或作褸音婁方言云褸謂之衽又謂之袩子切彼注云即衣襟也云齊人謂之攣者以目驗而言也一云或曰袿衣之飾者釋名曰婦人上服曰袿廣雅云袿長襦也言飾者蓋以繒為緣飾耳繡刺黼文以褗領釋曰詩唐風云素衣朱襮毛傳云襮領也諸侯繡黼丹朱中衣毛言繡黼者謂於繒之上繡刺以為黼非訓繡為黼郭氏取毛為説也注今蔽膝也釋曰方言云蔽膝江淮南楚之間謂之褘或謂之袚音弗魏宋南楚之間謂之大巾自關東西謂之蔽膝齊魯之郊謂之袡昌詹切襦又名韠禮玉藻云韠君朱大夫素士爵韋圜殺直天子直公侯前後方大夫前方後挫角士前後正韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸是也注即今至繫也釋曰孫炎云褘帨巾也郭云即今之香纓也褘交絡帶繫於體因名為褘緌繫也此女子既嫁之所著示繫屬於人義見禮記曲禮云女子許嫁纓及內則云襟纓是也詩云親結其縭謂母送女重結其所繫著以申戒之孫炎以褘為帨巾失之也注削殺其幅深衣之裳釋曰案深衣目録云稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連被體深邃故謂之深衣案深衣篇云制十有二幅以應十有二月鄭注云裳六幅幅分之以為上下之殺故云削殺其幅深衣之裳也其深衣製度禮記具焉輿革至之革釋曰此辨車馬之飾名也云輿革前謂之艱者李巡曰輿革前謂輿前以革為車飾曰鞎郭云以韋靶車軾靶謂鞔也軾車上橫木毛詩傳云諸侯之路車有朱革之質而羽飾謂以皮革為本質其上又以翟羽為之飾詩齊風云簟笰朱鞹是也後謂之笰者李巡曰笰車後戶名也郭云以韋靶後戶云竹前謂之禦者李巡曰竹前謂編竹當車前以擁蔽名之曰禦禦止也孫炎曰禦以簟為車飾也郭云以簟衣軾詩傳云簟方文席也云後謂之蔽者郭云以簟衣後戶即詩所謂簟笰也云環謂之捐謂著車衆環名捐云鑣謂之钀者鑣馬勒旁鐵一名钀云載轡謂之轙者轡者御馬之具也古者乘車駕駟馬凡八轡轅端之木名衡衡即軛軛上著環以貫轡此即載轡之環名轙故郭云車軛上環轡所貫也云轡首謂之革者轡首名革也詩大雅云鞗革金厄是也郭云轡靶勒見詩字林云靶轡革也餀謂至之餒釋曰此别物臭惡之異名也李巡云餀餯皆穢臭也食飯也饐飯臭也一名餲飯摶相著者名爤李巡云爤飯淖糜相著也飯中有腥米者名糪李巡曰米飯半腥半熟名糪即論語云失飪不食肉臭壞曰敗魚內爤曰餒即論語云魚餒而肉敗不食是也注飯饖臭見論語釋曰説文云饖飯傷熱蒼頡篇云食臭敗也云見論語者鄉黨篇云食饐而餲孔曰饐餲臭味變是也注內爛釋曰案春秋僖十九年云梁亡公羊傳曰此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也何休云梁君隆刑峻法百姓一旦相率俱去狀若魚爛魚爛從內發故云爾然則魚之敗壞先自內始故云內爛是郭用公羊為説今本內作肉恐誤肉曰脫之魚曰斫之釋曰此論治擇魚肉之名也肉剝去其皮因名脫之李巡云肉去其骨曰脫皇侃云治肉除其筋膜取好者郭氏以與魚曰斫之文連斫謂斬削其鱗則脫是脫剝其皮也嫌羊豕有不剝其皮者故又云今江東呼麋鹿之屬通為肉案禮記內則及李巡爾雅本皆云魚曰作之皇侃云作謂搖動也凡取魚搖動之視其鮮餒餒者不食李巡云作之魚骨小無所去今夲作斫郭云謂削鱗也冰脂也釋曰脂膏也一名冰注莊子至膏也釋曰云莊子云肌膚若冰雪者此內篇逍遙之言也案彼云藐姑射之山有神人居焉肌膚若冰雪綽約若處子引之者證冰為脂也云脂膏也者孫炎曰膏凝曰脂則似脂與膏異而云脂膏者以脂有凝有釋對例即內則注云脂肥凝者釋者曰膏散文則脂膏皆揔名也肉謂之羮至之臡釋曰此辨魚肉所作食味之名也肉之所作臛名羮魚所作鮓名鮨以肉作醬名醢有骨相雜者名臡注肉臛至左傳釋曰云肉臛也者儀禮所謂膷臐膮是也云廣雅曰湆者則彼云羮謂之湆是也云見左傳者案隱元年鄭伯置其母薑氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之是謂肉為羹也注鮨鮓至夫禮釋曰案公食大夫禮云牛炙南醢以西牛胾醢牛鮨鄭注云內則謂鮨為膾然則膾用音魚是也注雜骨醬見周禮釋曰案醢人職云掌四豆之實朝事之豆其實韭菹醓醢昌夲麋臡鄭注云作醢及臡者必先膊乾其肉乃後莝之雜以粱麴及鹽漬以美酒塗置甀中百日則成矣是也康謂之蠱澱謂之垽釋曰康米皮也一名蠱左傳曰榖之飛亦名蠱是也澱滓泥也一名垽郭云今江東呼垽鼎絶至之鬲釋曰此別鼎名也鼎最大者名鼐體圎斂上而小口者名鼒詩周頌云鼐鼎及鼒附耳在鼎表者名釴款闊也謂鼎足相去踈闊者名鬲甑謂之鬵鬵鉹也釋曰甑一名鬵涼州名鉹方言云甑自關而東或謂之甗或謂之鬵或謂之酢餾是也注詩曰溉之釡鬵釋曰詩檜風匪風篇文也璲瑞也玉十謂之區釋曰璲者瑞玉名也玉十名區注詩曰至玉瑞釋曰云詩曰鞙鞙佩璲者小雅大東篇文也毛傳云鞙鞙玉貌璲瑞也鄭箋云佩璲者以瑞玉為佩佩之鞙鞙然是也注雙玉曰玨五玨為區釋曰襄十八年左傳云晉侯伐齊將濟河獻子以朱絲係玉二玨杜注云雙玉曰玨是先儒相傳為然也五玨則十玉也羽夲至之緷釋曰此別羽數多少之名也夲根也鳥羽根名翮一羽名針十羽名縳百羽名緷案周禮地官羽人職云掌以時徴羽翮之政于山澤之農以當邦賦之政令凡受羽十羽為審百羽為摶十摶為縳鄭注云審摶縳羽數束名也爾雅云一羽謂之針十羽謂之縳百羽謂之緷其名音相近也一羽則有名蓋失之矣鄭意以為針與審縳與摶緷與縳名數聲音皆相近也一羽不合有名爾雅一羽則有名疑一羽當為十羽也郭意以為凡物無不從一為始以爾雅不失周官未為得也木謂之虡釋曰郭云縣鐘磬之木植者名虡考工記云梓人為筍虡鄭注云樂器所縣橫曰筍植曰虡然則縣鍾磬者兩端有植木其上有橫木謂直立者為虡謂橫牽者為栒栒上加大版為之飾名業詩大雅云虡業維樅旄謂之藣釋曰郭云旄牛尾一名藣舞者所執也菜謂之蔌釋曰菜茹名蔌郭云蔌者菜茹之揔名見詩者案大雅韓奕云其蔌維何維筍及蒲毛傳云蔌菜殽也是矣白蓋謂之苫釋曰孫炎云白蓋茅苫也郭云白茅苫也今江東呼為蓋然則蓋即苦也以白茅為之故曰白蓋襄十四年左傳晉將執戎子駒文范宣子親數諸朝曰乃祖吾離被苫蓋杜注云蓋苫之别名是也黃金至之鈏釋曰此別金錫之異名也黃金一名璗其精美者名鏐白金名銀其精美者名鐐郭云此皆道金銀之別名及精者鏐即紫磨金詩傳云天子玉琫而珧珌諸候璗琫而鏐珌大夫鐐琫而鏐珌士珕琫而珕珌鉼金名鈑錫今白鑞也一名鈏周禮職方氏云揚州其利金錫是也注周禮至是也釋曰云周禮曰祭五帝即供金鈑者案秋官司金職云旅于上帝則共其金版此云祭五帝者旅則祭也上帝則五帝也郭氏以義言之故文異爾彼注云鉼金謂之版此版所施未聞象謂至之雕釋曰郭云五者皆治朴之名謂治其朴俱未成器有此五名也注左傳曰山有木工則剫之釋曰隱十一年傳文也金謂至之磨釋曰郭云六者皆治器之名也則此謂治器加功而成之名也故論語注云切磋琢磨以成寶器是也璆琳玉也釋曰郭云璆琳美玉名禹貢梁州云厥貢璆鐵銀鏤又雍州云球琳琅玕是也簡謂之畢釋曰簡竹簡也古未有紙載文於簡謂之簡札一名畢禮記學記云呻其占畢謂但吟誦所視簡之文是謂簡為畢也不律謂之筆釋曰筆一名不律許愼云楚謂之聿吳人謂之不律燕謂之弗秦謂之筆郭云蜀人呼筆為不律也語之變轉滅謂之點釋曰郭云以筆滅字為點今猶然絶澤謂之銑釋曰金之最有光澤者名銑注國語曰玦之以金銑釋曰案晉語獻公使太子申生伐東山佩之金玦狐突歎曰以尨衣純而玦之以金者銑寒甚矣説國語者以銑下屬與郭異也金鏃至之圭釋曰辨弓箭之名也鏃箭頭也翦齊也以金為鏃齊羽者名鍭孫炎曰金鏑斷羽使前重也郭云今錍箭是也以骨為鏃不齊其羽者名志郭云今之骨骲是也此二者郭氏皆以今曉古案方言云箭自關而東謂之矢江淮之間謂之鍭關西曰箭鏃胡合嬴者四鐮或曰拘腸三鐮者謂之羊頭其廣長而薄鐮謂之錍或謂之耙音葩其小而長中穿二孔者謂之錍爐嗑盧二音亦謂錍箭也弓者説文云以近窮逺象形古者倕作弓周禮六弓王弓弧弓以射甲革椹質夾弓庾弓以射犴侯鳥獸唐弓大弓以授學射者此弓之類有緣者名弓無緣者名弭李巡曰骨飾兩頭曰弓不以骨飾兩頭曰弭孫炎曰緣謂繳束而漆之弭謂不以繳束骨飾兩頭者也郭云緣者繳纒之即今宛轉也弭今之角弓也然則郭意與孫同也當時謂繳束為宛轉若飾弓兩頭以金者名銑以蜃者名珧以王者名圭也注左傳曰左執鞭弭釋曰此僖二十三年傳文也案彼晉公子重耳及楚楚子饗之曰公子若反晉國何以報我對曰其左執鞭弭右屬􅐤鞬以與君周旋是也注用金至小蚌釋曰云用金蚌飾弓兩頭者以與上弭連文故知然也蚌即蜃也月令孟冬雉入大水為蜃是也銑即金絶澤者珧即蜃小者圭即玉成器者以此名弓故云因取其類以為名也云珧小蚌者即釋魚云蜃小者珧是也圭大至之環釋曰此別圭璧之屬也圭者玉器執以為瑞者也大長也圭長尺二寸者名玠璋半圭也大八寸者名琡璧亦玉器子男所執者也大六寸者名宣因説璧之制肉邊也好孔也邊大倍於孔者名璧孔大而邊小者名瑗邊孔適等若一者名環左傳昭十六年宣子有環其一在鄭商是也注詩曰錫爾玠圭釋曰此大雅嵩髙篇文也注璋半圭也釋曰知者以典瑞云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月璋邸射以祀山川自上而下降殺以半故知璋半圭也注漢書所云瑄玉是也釋曰郊祀志云公卿言皇帝始郊見泰一雲陽有司奉瑄玉嘉牲薦饗是也繸綬也釋曰所佩之玉名璲繫玉之組名綬以其連繫璲玉因名其綬曰繸故郭云即佩玉組所以連繫瑞玉者因通謂之繸也一染至之黼釋曰別衆色之名也一染謂之縓者此述染絳法也一染一入色名縓今之紅也説文云帛黃赤色喪服記云公子為其母練冠麻衣縓緣是也再染名赬即淺赤也三染名纁李巡云三染其色巳成為絳纁絳一名也考工記云三入為纁鄭玄云染纁者三入而成禹貢云厥篚玄纁是也淺靑一名蔥玉藻云三命赤韍蔥衡是也黑色名􅉳以白黑二色畫之為斧形名黼考工記云白與黑謂之黼書云黼黻絺繡是也注周禮曰隂祀用黝牲釋曰此地官牧人職文也鄭注云隂祀祭地北郊及社稷也邸謂之柢釋曰根柢名邸邸夲也郭云根柢皆物之邸邸即底通語也言凡物之柢必在底下因名云也即周禮典瑞云四圭有邸以祀天兩圭有邸以祀地皆謂邸為本柢也雕謂之琢釋曰案上文治玉璞名雕治玉器名琢彼對例耳散文則雕琢通謂治玉名不分璞與器也蓐謂之兹釋曰蓐一名兹郭云兹者蓐席也言草蓐之席也宣十二年左傳軍行右轅左追蓐注公羊傳曰屬負兹釋曰此桓十六年傳文也案彼衛侯朔出奔齊傳云何以名絶曷為絶之得罪于天子也其得罪于天子奈何見使守衛朔而不能使衛小衆越在岱隂齊屬負兹舍不即罪爾何休云屬託也天子有疾稱不豫諸侯稱負兹大夫稱犬馬士稱負薪舍止也託疾止不就罪是也引之以證兹為蓐也竿謂之箷釋曰凡以竿為衣架者名箷曲禮曰男女不同椸枷謂此也簀謂之笫釋曰簀牀版也一名笫檀弓曰華而睕大夫之簀與左傳曰牀笫之言不踰閾方言云齊魯之間謂之陳楚之間或謂之笫是也革中至之韏釋曰皮去毛曰革此別分斷之名也中斷之名辨復中分其辨名韏也鏤鎪也釋曰別二名也郭云刻鏤物為鎪詩云鉤膺鏤鍚卣中尊也釋在上釋樂第七釋曰案樂記云樂者樂也君子樂得其道小人樂得其欲也説文云樂五聲八音之惣名象鼓鞞之形木虡也白歌也又象鍾磬也五聲者商角宫徴羽也律歷志云商之為言章也物成孰可章度角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽字也物聚藏宇覆之也又云八音土曰塤匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鍾木曰柷此篇㧾釋五聲之名及八音之器故名釋樂也宫謂至之柳釋曰案此文則宫一名重商一名敏角一名經徴一名迭羽一名柳但未見義所出也注皆五至未詳釋曰云皆五音者案鄭玄江樂記云雜比曰音謂宮商角徴羽清濁相雜和比謂之音單出曰聲謂五聲之內唯單有一聲更無餘聲相雜也然則初發口單出者謂之聲衆聲和合成章謂之音金石干戚羽旄謂之樂則聲為初音為中樂為末此云五音者舉中而言也云之別名者謂重敏經迭柳是宫商角徴羽之別名也云其義未詳者以爾雅之作以釋六藝今經典之中無此五名或在亡逸中不可得知其義故云未詳案孫叔然云宫濁而遲故曰重也孫氏雖有此説更無經據故不取也大瑟謂之灑注長八尺一寸廣一尺八寸二十七絃釋曰瑟者登歌所用之樂器也故先釋之世本曰庖犧作五十絃黃帝使素女鼓瑟哀不自勝乃破為二十五絃具二均聲禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之畨畨嬴也頌瑟長七尺二寸廣尺八寸二十五絃盡用之熊氏云瑟兩頭有孔其在底下者名越鄉飲酒禮云二人皆左何瑟後首挎越注云越瑟底孔也燕禮云小臣左何瑟面鼓執越注云越瑟下孔也若用之祭祀則練其絃疏其越樂記云清廟之瑟朱絃而疏越鄭注云朱弦練朱弦練則聲濁越瑟底孔也畫疏之使聲遲也以其不練則體徑而聲清練則絲孰而聲濁也疏通也使兩頭孔相連而通也孔小則聲急孔大則聲遲故也其大者别名灑孫叔然云音多變布如灑出也郭云二十七絃未見所出大琴謂之離注或曰至五絃釋曰琴操曰伏犧作琴出本云神農作琴白虎通曰琴者禁也禁止於邪以正人心也琴之大者别名離也孫叔然云音多變聲流離也云或曰琴大者二十七絃未詳長短者或人言琴有二十七絃是琴之大者也但未詳其長短耳云廣雅曰琴長三尺六寸六分五絃者此常用之琴也象三百六十六日五絃象五行大絃為君小絃為臣文王武王加二絃以合君臣之恩也又五絃第一絃為宫其次商角徴羽文武二絃為少宫少商又琴操曰廣六十象六合也文上曰池言其平下曰濵言其服前廣後狹象尊卑上圎下方法天地然琴為樂器通見詩書故此釋之也大鼓謂之鼖小者謂之應釋曰别鼓大小之名也鼓之大者名鼖周禮鼓人職曰以鼖鼓鼓軍事是也其小者名應言聲應於大鼓也李巡云小者音聲相承故曰應也孫炎云和應大鼓也注鼖長八尺釋曰知者案考工記韗為鼓長八尺鼓四尺中圍加三之一謂之鼖後鄭注云中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺二寸三分寸之一也今亦合二十版則版六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺注詩曰至鼓側釋曰應􅉧縣鼓周頌有聲篇文也鄭箋云􅉧小鼓在大鼓旁應􅎏之屬也案􅉧引也謂擊小鼓引樂聲大磬謂之毊釋曰磬樂器名也以玉石為之丗本曰無句作磬釋名云磬罄也聲堅罄罄然考工記曰磬氏為磬倨句一矩有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚巳上則磨其旁巳下則磨其專是其制也大者名毊孫炎云毊喬也喬髙也謂其聲髙也李巡云大磬聲清燥也故曰毊毊操也注毊形至為之釋曰字林云錧田器也自江而南呼犂刃為錧此毊形似犂錧但大爾云以玉石為之者左傳云玉磬紀甗又八音謂磬為石故知以玉石為之也大笙至之和釋曰丗夲云隨作笙禮記曰女媧之笙簧釋名曰笙生也象物貫地而生説文云笙正月之音物生故謂之笙有十三簧象鳯之身其大者名巢巢髙也言其聲髙小者名和李巡云小者聲少音出和也孫炎云應和於笙注列管至九簧釋曰瓠匏也以匏為底故八音謂笙為匏簧者笙管之中金薄鐷也笙管必有簧故或謂笙為簧詩王風云左執簧是也大者十九簧以時驗而言也注十三至成聲釋曰云十三簧者鄭司農注周禮亦云十三簧相傳為然云鄉射記曰三笙一和而成聲者彼鄭注云三人吹笙一人吹和是也大箎謂之沂釋曰李巡曰大箎其聲非一也孫炎曰箎聲悲沂悲也釋名曰箎啼也聲如嬰兒啼郭云箎以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之小者尺二寸廣雅云八孔鄭司農注周禮云箎七空蓋不數其上出者故七也大塤謂之􅑧釋曰説文云塤樂器名從土熏聲塤塤古今字釋名云塤喧也聲濁喧喧然大塤名􅑧孫炎曰音大如叫呼聲郭云塤燒土為之大如鵝子鋭上平底形如稱錘六孔小者如雞子周禮小師注云塤燒土為之大如鴈卵鄭司農亦云六孔是相傳為然也丗本云暴辛公作塤蘇成公作箎譙周古史云古有塤箎尚矣周幽王時暴卒公善塤蘇成公善箎記者因以為作謬矣丗本之謬信如周言其云蘇公暴公所善亦未知所出蓋以詩小雅云伯氏吹塤仲氏吹箎蘇公刺暴公也故致斯謬大鐘至之棧釋曰此别鐘大小之名也説文云鐘樂器也丗本云垂作鐘考工記鳧氏為鐘釋名曰鐘空也內空受氣多其大者名鏞李巡曰大鐘音聲大鏞大也孫炎曰鏞深長之聲又名鑮大射禮云樂人宿縣于阼階東笙磬西面其南笙鐘其南鑮鄭云鑮如鐘而大是也其不大不小者名剽孫炎曰剽者聲輕疾也李巡云其中微小故曰剽剽小也其小者名棧李巡云棧淺也東晉興元年會稽剡縣人家井中得一鐘長三寸口徑四寸上有銘古文云棧鐘之小者既長三寸自然淺也注書曰笙鏞以間釋曰尚書益稷篇文也大簫至之筊釋曰此别簫大小之名也風俗通云舜作簫其形參差以象鳯翼十管長二尺博雅曰簫大者二十三管無底小者十六管有底其大者名言李巡曰大簫聲大者言言也郭云編二十三管長尺四寸其小者名筊李巡曰小者聲揚而小故言筊筊小也郭云十六管長尺二寸簫一名籟又通卦驗云簫長尺四寸其言管數長短雖異要是編小竹管為之耳大管至之􅩭釋曰别管小大之名也大管名簥李巡云聲髙大故曰簥簥髙也郭云管長尺圍寸併漆之有底賈氏以為如箎六孔小師注云管如笛形小併兩管而吹之今大子樂官有之是也其中不大不小者名篞小者名篎大籥至之箹釋曰籥樂器名其大者名産其中者名仲小者名箹郭云籥如笛三孔而短小廣雅云七孔周禮笙師掌教吹籥鄭注云籥如􅐟三空詩邶風云左手執籥毛傳云籥六孔所見異也徒鼓瑟至之寋釋曰凡八音備作曰樂一音獨作不得樂名故此辨其異名也徒空也鄭注周禮小師云出音曰鼓空作器以出其音者謂之徒鼓故郭云獨作之也注詩云我歌且謠釋曰此魏風園有桃篇文也毛傳云曲合樂曰歌徒歌曰謡孫炎曰聲消搖也注或歌或咢釋曰大雅行葦篇文也毛傳云歌者比於琴瑟也徒擊鼓曰咢孫炎云聲驚咢也所以鼓柷至之籈釋曰此別柷敔之名也周禮小師掌教鼓鼗柷敔柷敔皆以木為之故大師注云木柷敔也禮記謂之椌楬所以鼓動其柷以出其音者名止所以鼓動其敔以出其音者名籈郭云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名臯陶謨云合上柷敔鄭注云柷狀如漆桶中有椎合之者投椎於其中而橦之敔狀如伏虎背上刻之所以鼓之以止樂此等形狀蓋依漢之大豫樂而知之大鼗謂之麻小者謂之料釋曰詩頌云鼗磬柷敔鄭注小師職云鼗如鼓而小持其柄搖之旁耳還自擊一名麻其小者各料麻者音穊而長也料者聲淸而不亂和樂謂之節釋曰八音克諧無相奪倫謂之和樂樂和則應節樂記云治丗之音安以樂其政和是也樂記又云大樂與天地同和大禮與天地同節此對文爾揔而言之則禮樂相將故此和樂亦謂之節一云節樂器名謂相也樂記云治亂以相鄭注云相即拊也亦以節樂拊者以韋為表裝之以粳粳一名相因以名焉言治理奏樂之時擊柎以輔相於樂而為節也既以柷作樂以敔止樂故以節為和樂義亦通也爾雅疏卷第五
