  text: 爾雅疏卷第十
  hash: sha256:d228d54c4148f0b41b6ec4a40df0841d85c171e41ac92ea385ff86ca29aed9ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0003_SBCK_010-1a}
body:
  text: 翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉勑校定釋鳥第十七釋獸第十八釋畜第十九釋鳥第十七釋曰説文云鳥者羽禽之揔名象形字左傳曰少暭氏以鳥名官之類此篇廣釋其名也佳其鳺鴀釋曰舍人曰隼一名夫不李巡曰今楚鳩也某氏引春秋云祝鳩氏司徒祝鳩即隼其夫不孝故為司徒也郭云今䳕鳩詩曰翩翩者隼毛傳云隼夫不也一宿之鳥鄭箋云一宿者一意於所宿之木又云鳥之謹慤者人皆愛之則此是謹慤孝順之鳥也陸機云今小鳩也一名䳕鳩幽州人或謂之鵈凰梁宋之間謂之隹揚州人亦然鶌鳩鶻鵃釋曰春秋左氏傳云鶻鳩氏司事也杜注云鶻鳩鶻雕也春來秋去故為司事即此鶌鳩也舍人曰鶌鳩一名鶻鵃今之班鳩孫炎曰鶻鳩一名鳴鳩月令云鳴鳩拂其羽郭云似山鵲而小短尾青異色多聲今江東亦呼為鶻鵃案舊説及廣雅皆云班鳩非也鳲鳩鴶鵴釋曰左傳云鳲鳩氏司空也詩召南云維鵲有巢維鳩居之皆謂此也郭云今之布榖江東呼為穫榖埤倉云鴶鵴方言云戴勝謝氏云布榖類也陸機疏云今梁宋之間謂布穀為鴶鵴一名繫榖一名桑鳩案戴勝自生穴中不巢生而方言云戴勝非也鷑鳩鵧鷑釋曰鷑鳩一名鵧鷑郭云小黑鳥鳴自呼江東名為鳥鴡鴡鳩王鴡釋曰李巡曰王鴡一名鴡鳩郭云雕類今江東呼之為鶚好在江渚山邊食魚詩周南云關關鴡鳩陸機疏云鴡鳩大小如鴟深目目上骨露幽州人謂之鷲而揚雄許愼皆曰白鷢似鷹尾上白注毛詩傳曰鳥摰而有别釋曰此即關雎傳文也摰至也謂鳥中雌雄情意至厚而猶能有別故以興后妃説樂君子情深猶能不淫其色鵅鵋鶀釋曰鵅一名鵋鶀郭云今江東呼鵂鶹為鵋鶀亦謂之鴝鵅鴗天狗釋曰鴗一名天狗郭云小鳥也青似翠食魚江東呼為水狗鷚天鸙釋曰鷚一名天鸙郭云大如鷃雀色似鶉好髙飛作聲今江東名之曰天鷚音綢繆者詩豳風云綢繆牖戶取其音同故讀從之鵱鷜鵝釋曰鵱鷜者野鵝之別名也郭云今之野鵝鶬麋鴰釋曰鶬一名麋鴰郭云今呼鶬鴰鵅烏􅖂釋曰鵅一名烏􅖂郭云水鳥也似鶂而短頸腹翅紫白背上緑色江東呼鳥􅖂舒鴈鵝釋曰鵝一名舒鴈今江東呼􅕯某氏云在野舒翼飛逺者為鵝李巡曰野曰鴈家曰鵝注禮記曰出如舒鴈釋曰聘禮記文也案彼云私覿愈愈焉出如舒鴈鄭注云威儀自然而有行列是也舒鳧鶩釋曰鶩鴨也一名舒鳧李巡曰野曰鳧家曰鶩禮記內則辨鳥之不可食者云舒鳧翠鳽鵁鶄釋曰鵁鶄一名鳽郭云似鳧腳髙毛冠江東人家養之以厭火災鵜鴮鸅釋曰舍人曰鵜一名鴮鸅郭云今之鵜鶘也好羣飛沈水食魚一名汙澤俗呼之為淘河詩曹風云維鵜在梁陸機疏云鵜水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數斗囊若小澤中有魚便羣共抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河鶾天雞釋曰鶾一名天雞赤羽之鳥也注逸周書至獻之釋曰云逸周書曰者雖是周書不注尚書百篇內故曰逸周書今所謂汲冡周書也云文鶾若彩雞者王會篇文也案彼云蜀人以文鶾文鶾者若翬雉孔朝注云鳥有文彩者是也云成王時蜀人獻之者案彼孔朝注又云王城既成大會諸侯及四夷故知當成王時蜀人獻之也鷽山鵲釋曰山鵲一名鷽郭云以鵲而有文彩長尾觜腳赤説文云知來事鳥也鷣負雀釋曰鷣一名負雀郭云鷣鷂也江南呼之為鷣菩捉雀因名云鶨鶀老釋曰鶨一名鶀老郭子鳹鶨俗呼為癡鳥字林云句喙鳥鳸鴳釋曰别二名也郭云今鴳雀案舍人李巡孫炎郭氏昔斷老上屬鳸下屬解云鶨一名鶀老鴳一名鳸鳸雀也唯樊光斷鶨鶀為句以老下屬注云春秋云九扈為九農正九扈者春扈夏扈秋扈冬扈棘扈行扈宵扈桑扈老扈是以老為下屬唯鴳不重耳杜預仍云老扈鴳鴳非郭義桑扈竊脂釋曰桑鳸一名竊脂郭云俗謂之青雀觜曲食肉好盜脂膏因名云鄭玄詩箋云竊脂肉食陸機毛詩疏云竊脂青雀也好竊人脯肉脂及筒中膏故以名竊脂也諸儒説竊脂皆謂盜人脂膏即如下云竊玄竊黃者豈復盜竊玄黃乎案下篇釋獸云虎竊毛謂之虦貓魋如小熊竊毛而黃竊毛皆謂淺毛竊即古之淺字但此鳥其色不純竊玄淺黑也竊藍淺青也竊黃淺黃也竊丹淺赤也四色皆具則竊脂為淺白也而諸儒必為盜竊脂膏者以此經下别云桑鳸與竊玄竊黃等并列則為淺白者也春秋九扈是也此自别一種青雀好竊脂肉目驗而然詩小雅交交桑扈是也且鄭玄郭璞陸機皆當丗名儒無容不知竊為淺義脂為白色而待後人剝正也後人不逹此旨妄説異端非也鳭鷯剖葦釋曰鳭鷯一名剖葦郭云好剖葦皮食其中蟲因名云江東呼蘆虎似雀靑班長尾桃蟲鷦其雌鴱釋曰舍人曰桃蟲名鷦其雌名鴱郭云鷦􅛯桃雀也俗呼為巧婦此鷦􅛯小鳥而生雕鶚者也詩周頌云肇允彼桃蟲拚飛維鳥毛傳云桃蟲鷦也鳥之始小終大者陸機疏云今鷦鷯是也微小於黃雀其雛化而為雕故俗語鷦鷯生雕鄭詩箋云鷦之所為鳥題肩也或曰梟皆惡聲之鳥其義未詳方言説巧婦之名自關而東謂之工爵或謂之過鸁或謂之女􅬡自關而東謂之鸋自關而西謂之桑飛或謂之幭爵是也鶠鳳其雌皇釋曰鳳一名鶠郭云瑞應鳥雞頭蛇頸燕頷龜背魚尾五彩色髙六尺許説文云神鳥也天老曰鳳像麟前鹿後蛇頸魚尾龍文龜背燕頷雞喙五色備舉出於東方君子之國翺翔四海之外過昆崘飲砥柱濯羽弱水莫宿丹穴見則天下大安寧字從鳥凡聲鳯飛則羣鳥從以萬數故鳳古作朋字山海經曰丹穴之山有鳥焉其狀如鶴五彩而文名曰鳳首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安寧京房易傳曰鳳皇髙文二漢時鳳皇數至漢書云髙五六尺是説鳳皇之狀也鶺鴒雍渠釋曰鶺鴒一名雍渠水鳥也郭云雀屬也飛則鳴行則搖詩小雅云脊令在原陸機疏云大如鷃雀長腳長尾尖喙背上靑灰色腹下白頸下黑如連錢故杜陽人謂之連錢是也鸒斯鵯鶋釋曰鸒斯一名鵯鶋郭云雅烏也小而多羣腹下白江東亦呼為鵯烏詩小雅云辨彼鸒斯毛傳云鸒鵯鶋然則此鳥名鸒而云斯者語辭猶蓼彼蕭斯之類也小爾雅云小而腹下白不反哺者謂之雅鳥説文字林皆云楚烏是也燕白脰烏釋曰脰頸也頸項也小爾雅云白項而羣飛者謂之燕烏燕烏白脰烏是也鴽鴾母釋曰李巡云鴽䳺一名鴾母郭云䳺也靑州呼鴾母田鼠所化者也月令季春田鼠化為鴽是也巂周釋曰子巂鳥也出蜀中説文云巂蜀王望帝化為子巂今謂之子規是也燕燕鳦釋曰燕燕又名鳦郭云一名玄鳦齊人呼鳦此燕燕即今之燕古人重言之詩云燕燕于飛漢書童謡云燕燕尾涎涎是也孫炎舍人以巂周燕燕鳦為一物三名郭所不取也注詩云至呼鳦釋曰詩云燕燕于飛者詩邶風衛莊薑送歸妾之詩也云一名玄鳥者案月令仲春之月玄鳥至以其色玄故謂之玄鳥是也云齊人呼鳦者案商本紀云簡狄行浴見玄鳥隋其卵取而吞之因孕生契諸緯候皆言簡狄吞鳦卵而生契是玄鳥又名鳦也鴟梟鸋鴂釋曰舍人云鴟梟一名鸋鴂郭云鴟類詩豳風云鴟梟鴟梟毛傳云鴟梟鸋鴂陸機疏云鴟梟似黃雀而小其喙尖如錐取茅秀為窠以麻紩之如刺襪然縣著樹枝或一房或二房幽州人謂之鸋鴂或曰巧婦或曰女匠關東謂之土雀或謂之過羸關西謂之桑飛或謂之襪雀或曰巧女先儒皆以為今之巧婦郭注此云鴟類又注方言云鸋鴂鴟梟鴟屬非此小雀明矣是與先儒意異也今爾雅以郭氏為宗且依郭氏狂茅鴟怪鴟梟鴟釋曰此别鴟類也茅鴟一名狂廣雅云茅鴟􅣽也郭云今􅣽鴟也似鷹而白怪鴟廣雅謂之鴟鵂郭云今江東通呼此屬為怪鳥梟一名鴟郭云土梟説文云梟食母不孝之鳥故冬至捕梟磔之字從鳥首在木上詩陳風云墓門有梅有梟萃上毛傳云惡聲之鳥也一名鵩一名梟一名鴟大雅瞻卬云為梟為鴟陸機云梟大如班鳩緑色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也其肉甚美可為羹臛又可為炙漢供御物各隨其時梟冬夏常施之以其美故也生哺鷇生噣雛釋曰辨鳥子之異名也鳥子生須母哺而食者名鷇謂燕雀之屬也史記趙武靈王探雀鷇而食之是也鳥子生而能自啄食者名雛謂雞雉之屬也禮記內則云雛尾不盈握弗食是也爰居雜縣釋曰爰居海鳥也大如馬駒一名雜縣漢元帝時琅邪有之注國語至爰居釋曰云國語曰海鳥爰居者案魯語云海鳥曰爰居止於魯東門之外三日臧文仲命國人祭之展禽曰越哉臧孫之為政也夫祀國之大節也節政之所成也故制祭祀以為國典今無故而加典非政之冝也今海鳥至己不知而祀之以為國典難以言仁且知矣無功而祀之非仁也弗知而弗問非知也今兹海其有災乎夫廣川之鳥獸皆知辟其災是歲海多大風冬暖是其事也春鳸至嘖嘖釋曰李巡云諸鳸别春夏秋冬四時之名唶唶嘖嘖鳥聲貌也郭云諸鳸皆因其毛色音聲以為名竊藍靑色案昭十七年左傳云九扈為九農正以此八鳸并上鳸鴳為九賈逵注云春扈分循相五七之冝趣民耕種者也夏扈竊玄趣民耘苗者也秋扈竊藍趣民收斂者也冬扈竊黃趣民蓋藏者也棘扈竊丹為果驅鳥者也行扈唶唶晝為民驅鳥者也宵扈嘖嘖夜為農驅獸者也桑扈竊脂為蠶驅雀者也老扈鷃鷃趣民收麥令不得晏起者也舍人樊光注爾雅其言亦與賈同其意皆謂以扈為官還令依此諸扈而動作也然則趣民耕耘及收斂蓋藏其事可得召民使聚而揔號令之其為果驅鳥為蠶驅雀豈得多置官方使之就果樹入蠶室為民驅之哉又晝驅鳥夜驅獸不可竟日通宵常在田野溥天之下何以可周且其言不經難可據信也故郭氏及杜預皆不從也鵖鴔戴鵀釋曰李巡云戴勝一名鵖鴔郭云鵀即頭上勝今亦呼為戴勝鵖鴔猶鶝語聲轉耳月令季春云戴勝降于桑方言云燕之東北朝鮮洌水之間謂之鶝䲹自關而東謂之戴鵀或謂之戴頒或謂之戴勝東齊吳楊之間謂之鵀自關而西謂之服鶝或謂之鶝鶭澤虞釋曰澤虞一名鶭郭云今婟澤鳥似水梟蒼黑色常在澤中見人輒鳴喚不去有象主守之官因名云俗呼為護田鳥説文云婟嫪也聲類云婟嫪戀惜也以此鳥戀惜池澤見人不去因名婟澤鳥也鷀鷧釋曰別二名也字林云似鶂而黑郭云即鸕鷀也鷯鶉其雄鵲牝􅋻釋曰李巡曰別雄雌異方之言鶉一名鷯其雄名鶛其牝名􅋻郭云鶉䳺屬䳺即上云鴽鴾母田鼠所化者鶉舊説云蝦蟆所化者也鸍沈鳧釋曰鸍一名沈鳧郭云似鴨而小長尾背上有文今江東亦呼為鸍陸機云大小如鴨青色卑腳短啄水鳥之謹願者也大雅云鳧鷖在涇鴢頭鵁釋曰鴢一名頭鵁郭云似鳧腳近尾略不能行江東謂之魚鵁音髐箭嫌讀為鵁鶄之鵁故音之山海經云靑要山畛水出焉北注河其中有鳥名鴢狀如鳧青身朱目赤尾食之冝子是也鵽鳩寇雉釋曰寇雉一名鵽鳩郭云鵽大如鴿似雌雉鼠腳無後指岐尾為烏憨急羣飛出北方沙漠地又謂之泆泆下云寇雉泆泆是也萑老鵵釋曰老鵵一名萑郭云木兔也似鴟鵂而小兔頭有角毛腳夜飛好食雞鶟鶘鳥釋曰鶟鶘鳥名也郭云似雉靑身白頭狂􆁾鳥釋曰􆁾鳥一名狂五采之鳥也注狂鳥五色有冠見山海經釋曰案大荒西經云栗廣之野有五采之鳥有冠名曰狂鳥是也皇黃鳥釋曰舍人曰皇名黃鳥郭云俗呼黃離留亦名摶黍詩周南云黃鳥于飛陸機疏云黃鳥黃鸝留也或謂之黃栗留幽州人謂之黃鶯一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之摶黍常椹熟時來在桑間故里語曰黃栗留看我麥黃椹熟亦是應節趨時之鳥也自此以下諸言倉庚商庚鵹黃楚雀倉庚鵹黃之文與此一也翠鷸釋曰李巡曰鷸一名為翠其羽可以為飾樊光云靑羽出交州郭云似燕紺色生鬱林説文云翠靑羽雀也案漢書尉他獻文帝翠鳥毛然則鷸羽可以飾器物故僖二十四年左氏傳鄭子臧好聚鷸冠是也􅨰山鳥釋曰山烏一名鸀郭云似烏而小赤觜穴乳出西方蝙蝠服翼釋曰蝙蝠一名服翼郭云齊人呼為蟙蟔或謂之仙鼠方言云蝙蝠自關而東謂之服翼或謂之􅞳鼠自關而西秦隴之間謂之蝙蝠北燕謂之蟙蟔晨風鸇釋曰舍人曰晨鳯一名鸇鸇摯鳥也郭云鷂屬陸機云鸇似鷂靑黃也燕頷句喙嚮風搖翅乃因風飛急疾擊鳩鴿燕雀食之注詩曰鴪彼晨風釋曰詩秦風晨風篇文也鸉白鷢釋曰鸉一名白鷢郭云似鷹尾上白鷆蚊母釋曰鷆一名蚊母郭云似鳥􅖂而大黃白雜文鳴如鴿聲今江東呼為蚊母俗説此鳥常吐蚊因以名云蚊蚊音義同鷉須鸁釋曰鷉一名須鸁郭云鷉鸊鷉似鳧而小膏中瑩刀鼯鼠夷由釋曰鼯鼠一名夷由郭云狀如小狐似蝙蝠肉翅翅尾項脅毛紫赤色背上蒼艾色腹下黃喙頷雜白腳短爪長尾三尺許飛且乳亦謂之飛生聲如人呼食火煙能從髙赴下不能從下上髙鷹鶆鳩釋曰樊光曰來鳩爽鳩也春秋曰爽鳩氏司寇鷹鷙故為司寇郭云鶆當為鷞字之誤耳左傳作鷞鳩是也案昭十七年左傳郯子曰少皡氏以鳥名官爽鳩氏司寇也杜注云爽鳩鷹也鷙故為司寇主盜賊是也鶼鶼比翼釋曰鶼鶼比翼鳥名也説在釋地篇故注云説巳在上鴷斫木釋曰斫木鳥一名鴷郭云口如錐長數寸常斫樹食蟲因名云鸄鶶鷵釋曰鸄一名鶶鷵郭云似烏蒼白色鷺舂鉏釋曰鷺一名舂鉏郭云白鷺也頭翅背上皆有長翰毛今江東人取以為攡名之曰白鷺纕詩陳風云值其鷺羽陸機疏云鷺水鳥也好而潔白故謂之白鳥齊魯之間謂之春鉏遼東樂浪吳揚人皆謂之白鷺靑腳髙尺七八寸尾如鷹尾喙長三寸頭上有長毛十數枚長尺餘毿毿然與衆毛異好欲取魚時則弭之今吳人亦養焉楚威王時有朱鷺合沓飛翔而來舞則復有赤者舊鼓吹朱鷺曲是也然則鳥名白鷺赤者少耳鷂雉至西方曰鷷釋曰別諸雉之名也鷂雉者郭云靑質五采即下文江淮而南者是也云鷮雉者郭云即鷮雞也長尾走且鳴説文云鷮長尾雉走鳴乘輿以尾為防釳著馬頭上詩小雅云有集維鷮陸機疏云鷮微小於翟也走而且鳴曰鷮鷮其尾長肉甚美故林木山下人語曰四足之美有麃兩足之美有鷮麃者似鹿而小是也山海經女几山其鳥多白鷮云鳪雉者雉之黃色鳴自呼者名鳪云鷩雉者案山海經牝山之上鳥多赤鷩郭注云即鷩雉也尚書謂之華蟲周禮春官司服職云鷩冕七章之服也畫此鷩雉郭云似山雞而小冠背毛黃腹下赤項緑色鮮明云秩秩海雉者海雉一名秩秩郭云如雉而黑在海中山上云鸐山雉者山雉一名鸐郭云尾長者今俗呼山雞是也云雗雉鵫雉者別二名也郭云今白鵫出江東呼白雗亦名曰雉云雉絶有力奮者謂雉之壯大有力能鬪者名奮郭云最健鬪云伊洛而南素質五采皆備成章曰翬者李巡曰素質五采備具文章鮮明曰翬孫炎曰鷒之鳥一名􅦀羿應弦銜鏑矢不著地逢蒙縮手養由不睨鵲鵙醜其飛也翪釋曰鵙伯勞也翪竦也醜類也鵲鵙之類不能翺翔逺飛但竦翅上下而巳鳶烏醜其飛也翔釋曰鳶鴟也鴟烏之類其飛也布翅翺翔鷹隼醜其飛也翬釋曰舍人曰謂隼鷂之屬也翬翬其飛疾羽聲也郭云鼓翅翬翬然疾是急疾之鳥也説文云隼􅋧鳥也陸機云隼鷂屬也齊人謂之擊征或謂之題肩或謂之雀鷹春化為布榖者是也鳧鴈醜其足蹼其踵企釋曰鳧水鳥也鴈陽鳥也蹼猶蹼屬相著之謂也踵腳跟也鳧鴈之類腳指間有幕蹼屬相著飛則伸其腳跟企直也烏鵲醜其掌縮釋曰掌足也烏鵲之類飛時縮足於其腹下元鳥嚨其粻嗉釋曰别鳥咽嗉之名也亢者鳥喉嚨也其受粻處名嗉郭云嚨謂喉嚨亢即咽也嗉者受食之處别名嗉今江東呼粻鶉子鳼鳥子鸋釋曰別䳺鶉雛之名也鶉之子雛名鳼鴽之子雛名鸋雉之暮子為鷚釋曰鷚是雉晚生之子名也郭云晚生者今呼少雞為鷚鳥之雌雄不可别者以翼右掩左雄左掩右雌釋曰鄭詩箋云隂陽相下之義也鳥少美長醜為鶹鷅釋曰鳥之少為子而美長食母而醜其名為鶹鷅郭云鶹鷅猶留離詩所謂留離之子者案詩邶風云瑣兮尾兮流離之子陸機疏云流離梟也自關而西謂梟為流離其子適長大還食其母故張奐云鶹鷅食母許愼云梟不孝鳥是也流與鶹同二足而羽謂之禽四足而毛謂之獸釋曰别禽獸之異也凡語有通别别而言之羽則曰禽毛則曰獸所以然者禽者擒也言鳥力小可擒捉而取之獸者守也言其力多不易可擒先須圍守然後乃獲故曰獸也通而為説鳥不可曰獸獸亦可曰禽故曲禮鸚鵡不曰獸而猩猩通曰禽也易云王用三驅失前禽則驅走者亦曰禽也又周禮司馬職云大獸公之小禽私之以此而言則禽未必皆鳥也又鄭玄注周禮云凡鳥獸未孕曰禽周禮又云以禽作六贄卿羔大夫鴈白虎通云禽者鳥獸之揔名以其小獸可擒故得通名禽也鵙伯勞也釋曰李巡云伯勞一名鵙樊光曰春秋傳曰少皡氏以鳥名官伯趙氏司至伯趙鵙也以夏至來冬至去郭云似鶷鶡而大陳思王惡鳥論云伯勞以五月鳴應隂氣之動陽氣為仁養隂為殺殘賊伯勞蓋賊害之鳥也其聲鵙鵙故以其音名云月令仲夏之月服始鳴是也注似鶷至趙是釋曰云似鶷鶡而大者字林云鶷鶡似伯勞而小故也云左傳伯趙是者案昭十七年云伯趙氏司至者也杜注云伯趙伯勞也以夏至鳴冬至止是也倉庚黧黃也釋曰即上黃鳥也郭云其色黧黑而黃因以名云釋獸第十八釋曰釋鳥云四足而毛謂之獸説文云獸守備也此篇釋其名狀故曰釋獸麋牡至力狄釋曰此釋麋之種類也説文云鹿屬也冬至解其角春秋莊十七年冬多麋麋揔名也其壯者名麔其牝者名麎詩吉曰云其麎孔有是也其所生之子名䴠其腳迹所踐之處名躔其絶異壯大有力者名狄也注國語曰獸長麛䴠釋曰此魯語文也魯宣公夏濫於淵里革斷其罟而棄之曰且夫山不槎蘗澤不伐天魚禁鯤鮞獸長麛䴠鳥翼鷇卵蟲舍蚔蝝蕃庶物也古之訓也今魚方别孕不教魚長又行網罟貪無藝也韋昭云鹿子曰麛麋子曰䴠是其事也鹿牡至力釋曰此辨鹿之種類也説文云鹿解角獸也羣萃善走者也其牡名麚其牝名麀詩小雅云麀鹿麌麌其迹名速絶有力者名麕牡麌至力豜釋曰此辨麕之種類也説文云麕麞也麕其揔名也牡名麌牝名麜其子名麆其迹名解絶有力名豜注詩曰至言耳釋曰詩小雅吉日篇文也鄭箋云麕牡曰麌麌復麌言多也是鄭康成解即謂此也云但重言耳者謂再言麌也狼牡至力迅釋曰此辨狼之種類也舍人曰狼牝名貛牝名狼其子名獥絶有力者名迅孫炎曰迅疾也詩齊風云並驅從兩狼兮陸機疏云其鳴能小能大善為小兒啼聲以誘人去數十步其猛健者雖善用兵者不能免也其膏可煎和其皮可為裘故禮記狼臅膏又曰君之右虎裘厥左狼裘是也兔子㛯至力欣釋曰此辨免之種類也崔豹古今注云免有九孔論衡曰兔舐豪而孕及其生子從口而出其子名㛯郭云俗呼曰其迹名迒字林云迒兔道也絶有力名欣豕子至牝豝釋曰此辨豕之種類也其子名豬郭云今亦曰彘江東呼豨皆通名也説文云豬豕而三毛藂居者字林云豕後蹄廢謂之彘小爾雅云彘豬也其子曰豚大者謂之豜方言云北燕朝鮮之間謂之豭關東西或謂之彘或謂之豕南楚謂之豨其子或謂之豚或謂之豯吳揚之間謂之豬子云䝐豶者舍人曰䝐一名豶郭云俗呼小豶豬為䝐子豶謂犍豬也云么幼者豕之最後生者名也郭云最後生者俗呼為么豚云奏者者謂皮理腠蹙者名豱郭云今豱豬短頭皮理腠蹙云豕生三豵二師一特者郭云豬生子常多故别其少者之名詩召南云一發五豵鄭箋云豕生三曰豵張逸問曰豕生三曰豵不知母豕也豚也答曰豚也過三以往猶謂之豵以自三以上更無名也故知過三亦為豵其生子二者為師一者為特云所寢橧者郭云橧其所卧蓐方言云其攬及蓐曰槽是也舍人曰豕所寢草名為橧某氏曰臨淮人謂野豬所寢為橧李巡曰豬卧處名橧橧是所居之處云四蹢皆白􅘻者蹢蹄也豕四蹄皆白名􅘻其迹名刻絶有力名􅙊即下篇豕髙五尺者也云牝豝者豕之牝者名豝注詩云有豕白蹢釋曰小雅漸漸之石篇文也案詩經直云白蹢不云􅘻則白蹢不知幾蹄白而郭氏引之者以爾雅主謂釋詩詩中言豕白蹢惟此而巳故知本以訓此也鄭箋以􅘻為駭􅘻者躁疾之言也駭與􅘻字異義同注詩云一發五豝釋曰召南騶虞篇文也毛傳云豕牝曰豝虞人翼五豝以待公之發鄭箋云君射一發而翼五豝者戰禽獸之命也戰之者仁心之至是也虎竊毛謂之虦貓釋曰竊淺也虎之淺毛者别名虦貓注詩曰有貓有虎釋曰詩大雅韓奕篇文也貘白豹釋曰貘一名白豹字林云似熊而白黃出蜀郡一曰白豹郭云似熊小頭􅋻腳黑白駮能舐食銅鐵及竹骨骨莭強直中實少髓反辟濕或曰豹白色者别名貘甝白虎釋曰白虎一名甝郭云漢宣帝時南郡獲白虎獻其皮骨瓜牙虪黑虎釋曰黑虎一名虪郭云晉永嘉四年建平秭歸縣檻得之狀如小虎而黑毛深者為班山海經云幽都山多玄虎玄豹者案海內經云北海之內有山名曰幽都之山黑水出焉其上有玄鳥玄蛇玄豹玄虎是也貀無前足釋曰字林云獸無前足似虎而黑者名貀郭云晉太康七年召陵扶夷縣檻得一獸似狗豹文有角兩腳即此種類也或説貀似虎而黑無前兩足鼳鼠身長須而賊秦人謂之小驢釋曰鼳獸名也身如鼠有長須而賊害於物秦人呼為小驢郭云鼳似鼠而馬蹄一歲千斤為物殘賊熊虎醜至力麙釋曰醜類也熊虎之類其子名狗絶有力名麙郭云律曰捕虎一購錢三千其狗半之此當時之律也引之以證虎子名狗之義也貍子􅡐釋曰字林云貍伏獸似貙其子名􅡐郭云今或呼豾貍者字林云豾貍也貈子貆釋曰字林云貈似狐善睡其子名貆郭云其雌者名今江東呼貉為􅧯􅤘字林云􅧯貍類貁謂之􅤘廣雅云􅤘貁也然則皆貈之通名也貒子貗釋曰字林云貒獸似豕而肥其子名貗郭云貒豚也一名貛貔白狐其子􅩸釋曰字林云貔豹屬一名白狐其子名􅩸郭云一名執夷虎豹之屬詩大雅云獻其貔皮陸機疏云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白羆麝父麕足釋曰字林云小鹿有香其足似麞故云麕足郭云腳似麕有香豺狗足釋曰説文云豺狼屬狗聲郭云腳似狗貪殘之獸左傳云戎狄豺狼不可厭也貙獌似貍釋曰字林云貙似貍而大一名獌郭云今山民呼貙虎之大者為貙犴字林云犴胡地野狗似狐黑喙皆貙之類故又呼貙犴羆如熊黃白文釋曰舍人曰羆如熊色黃白也郭云似熊而長頭髙腳猛憨多力能拔樹木關西呼曰貑羆詩大雅韓奕云赤豹黃羆陸機疏云羆有黃羆有赤羆大於熊其脂如熊白而粗理不如熊白美也麢大羊釋曰羊之大者名麢郭云麢羊似羊而大角貟鋭好在山崖間陶注本草云今出建平冝都諸蠻中及西域多兩角有一角者為勝角甚多節蹙蹙貟繞別有山羊角極長唯一邊有節節亦踈大而不入用羌夷云只此名麢羊麠大麃牛尾一角釋曰麃麞也大麞牛尾一角者名麠即所謂麟也郭云漢武帝郊雍得一角獸若麃然謂之麟者此是也者漢書郊祀志文也麃即麞也􅕱大麕旄毛狗足釋曰麕亦麞也旄毛㺜長毛也大麞毛長狗足者名􅕱山海經云女几山其獸多麖􅕱魋如小熊竊毛而黃釋曰竊淺也獸如小熊淺毛而黃者名魋郭云今建平山中有此獸狀如熊而小毛麆淺赤黃色俗呼為赤熊即魋也猰貐類貙虎爪食人迅走釋曰迅疾也猰貐之獸其狀類貙而虎爪食人疾走山海經云少咸山有獸狀如牛而赤身人面馬足名曰㝣窳其音如嬰兒食人其名與此同其狀與此錯狻麑如虦貓食虎豹釋曰即師子也出西域其狀如虦貓食虎豹善走者也注漢順帝至百里釋曰云漢順帝時踈勒王來獻犎牛及師子者案後漢帝紀云孝順帝諱保安帝之子也陽嘉三年踈勒國獻師子犎牛注引東觀記曰踈勒王盤遣使文時詣闕師子似虎正黃有􅐖耐尾端茸毛大如斗封牛其領上肉隆起若封然因以名之即今之峯牛是也云穆天子傳曰狻猊日走五百里案穆天子傳云柏天曰名獸使足狻猊野馬走五百里是也驨如馬一角不角者騏釋曰驨獸名也狀如馬一角不角者名騏郭云元康八年九真郡獵得一獸大如馬一角角如鹿茸此即驨也今深山中人時或見之亦有無角者羱如羊釋曰字林云野羊大角者也郭云羱羊似吳羊而大角角橢出西方橢謂狹而長也麟麕身牛尾一角釋曰李巡曰麟瑞應獸名孫炎曰靈獸也京房易傳曰麟麕身牛尾狼額馬蹄有五采腹下黃髙丈一詩周南云麟之趾毛傳云麟信而應禮以足至者也鄭箋云麟角之末有肉示有武而不用陸機疏云麟麕身牛尾馬足黃色貟蹄一角角端有肉音中鍾吕行中規矩遊必擇地詳而後處不履生蟲不踐生草不羣居不侣行不入陷阱不罹羅網王者至仁則出今并州界有麟大小如鹿非瑞應麟也故司馬相如賦曰射麋腳麟謂此麟也注公羊傳曰有麕而角釋曰案春秋哀十四年春西狩獲麟公羊傳云有以告者曰有􅍪而角者孔子曰孰為來哉孰謂來哉是其事也猶如麂善登木釋曰説文云猶貜屬也其狀如麂為獸健捷善能上樹貄修毫釋曰修長也廣雅云㲦毛謂之毫言貄獸體多長毛貙似貍釋曰貙獸其文似貍郭云今貙虎也大如狗文如貍兕似牛釋曰郭云一角靑色重千斤説文云兕如野牛靑毛其皮堅厚可制交州記曰兕出九德有一角角長三尺餘形如馬鞭抦是也犀似豕釋曰郭云形似水牛豬頭大腹􅋻腳腳有三蹄黑色三角一在預上一在額上一在鼻上鼻上者即食角也小而不橢音墮好食棘亦有一角者劉歆期交州記曰犀出九德毛如豕蹄有甲頭似馬吳録地理志云武陵阮南縣以南皆有犀彚毛刺釋曰彚即蝟也其毛如針郭云今蝟狀如鼠狒狒如人被髮迅走食人釋曰狒狒獸名狀如人被髮疾走食人山海經謂之梟羊又謂之贑音感臣人周書王會云北方謂之吐嘍郭云梟羊也山海經曰其狀如人面長脣黑身有毛反踵見人則笑交廣及南康郡山中亦有此物大者長丈許俗呼之曰山都云山海經曰者海內南經文也案彼文云梟羊在此昫之西其狀人面長脣有毛反踵見人笑亦笑左手操管又海內經云笑則晨蔽其面因可逃也故郭讃云狒狒怪萌被髮操竹獲人則笑晨蔽其目終亦號咷反為我戮是也云反踵者腳跟反向也大傳云周成王時州靡國獻之也貍狐貒貈醜其足蹯其迹􅚵釋曰説文云蹯掌也此四獸之類皆有掌蹯宣二年左傳云宰夫胹熊蹯是其類也其指頭著地處名􅚵蒙頌猱狀釋曰蒙頌一名蒙貴狀似猿猱故曰猱狀郭云即蒙貴也狀如蜼而小紫黑色可畜健捕鼠勝於貓九真日南皆出之猱亦獮候之類猱猿善援釋曰猱一名猿善攀援樹枝郭云便攀援者便謂便捷也貜父善顧釋曰大猿也能貜持人又善顧盻因名云郭云貑貜也似獮猴而大色蒼黑能貜持人好顧盻威夷長脊而泥釋曰泥弱也威夷之獸長脊而劣弱少才力也麔麚短脰釋曰脰項也麔麚之獸皆短項贙有力釋曰贙似犬之獸名也郭云出西海大奏國有養者似狗多力獷惡豦迅頭釋曰豦似猴之獸也好奮迅其頭故曰迅頭郭云今建平山中有豦大如狗似獮猴黃黑色多髯鬛奮迅其頭能舉石擲人貜類也蜼卬鼻而長尾釋曰蜼亦猴類之獸卬鼻而尾長大郭云蜼似獮猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨即自縣於樹以尾塞鼻或以兩指江東人亦取養之為物健捷山海經曰鬲山多猿蜼是也時善乘領釋曰好登山峯之獸也猩猩小而好啼釋曰能言獸也曲禮曰猩猩能言周書王會曰都郭狌狌欺羽狌狌若黃狗人面能言郭云山海經曰人靣豕身能言語今交趾封溪縣出猩猩狀如貛豚聲似小兒啼云山海經者海內南經文也闕泄多狃釋曰舊説以為闕泄獸名其腳多狃狃指也然其形所未詳聞寓屬釋曰寓寄也言此上獸屬多寄寓木上故題云寓屬蚡鼠至鼳鼠釋曰此别鼠屬也云蚡鼠者郭云地中行者説文云地中行鼠伯勞所作也廣雅云鼹鼠也方言名犂鼠即此鼠也謂起地若耕因名云云鼸鼠者大戴禮云田鼠者鼸鼠也鼸是頰裏藏食之名鼠若此者因名鼸鼠云鼷鼠者李巡曰鼱鼩鼠郭云有螫毒者蓋如今鼠狼春秋成七年食郊牛角者是也慱物志云鼠之最小者或謂之甘鼠何休亦云鼷鼠者鼠中之微者云鼶鼠者似鼬之鼠也郭云夏小正曰鼶鼬則穴者在九月云鼬鼠者字林云如鼠赤黃而文郭云今鼬似鼦赤黃色大尾啖鼠江東呼為鼪即莊子云騏驥驊騮捕鼠不如貍鼪是也云鼩鼠者鼱鼩小鼠也本云一名鼷鼠郭云小鼱鼩也亦名鼩云鼫鼠者孫炎曰五技鼠許愼云鼫鼠五技能飛不能上屋能遊不能渡谷能緣不能窮水能走不能免人能穴不能覆身此之謂五技蔡雍以此為螻蛄郭云形大如鼠頭似兔尾有毛靑黃色好在田中食粟豆關西呼為䶂鼠見廣雅䶂音雀今本作鼩誤也案詩魏風云碩鼠碩鼠陸機疏云今河東有大鼠能人立交前兩腳於頸上跳舞善鳴食人禾苗人逐則走入樹空中亦有技或謂之雀鼠案此與郭氏所説同云豹文鼮鼠者郭云鼠文彩如豹者漢武帝時得此鼠孝廉郎終軍知之賜絹百匹者案漢書云終軍字子雲濟南人也少好學以辨博能屬文𥘉入關棄繻而去至長安上書拜為謁者給事中使南越為吕嘉所殺死時年二十餘故丗號之終童武帝嘗得豹文鼠終軍以爾雅辨其名故受賜也鼰鼠者鼰鼠名也郭云今江東山中有鼰鼠狀如鼠而大蒼色在樹木上注山海經説獸云狀如鼣鼠釋曰案中山經云倚帝山其上多玉下多金有獸焉狀如鼣鼠白喙名狙如見則其國有大兵是也鼠屬釋曰言此上皆鼠之屬類也鼠小獸也亦四足而毛故於此釋之案字林云鼸鼠即蚡鼠也今郭氏分為二又説文云鼨豹文鼠也今郭氏以豹文下屬未知孰是故略言之牛白齝羊曰齛釋曰此别鳥獸嚼食之名也牛名曰齝郭云食之巳久復出嚼之羊名曰齛郭云今江東呼齝為齛麋鹿名曰齸郭云江東名咽為齸齸者䶗食之所在依名云鳥名曰嗉郭云咽中裏食處即上篇其粻嗉也寓木之獸及鼠皆曰嗛郭云頰裏貯食處寓謂獮猴之類寄寓木上此屬皆咽中藏食復出嚼之故題云齸屬獸曰釁至鳥曰狊釋曰此辨人魚鳥獸氣體所須之名也獸之自奮迅動作名釁人之罷倦頻伸夭嬌舒展屈折名嬌魚之鼓動兩頰若人之欠須導其氣息者名須鳥之張兩翅狊狊然搖動者名臭此皆氣倦體罷所須若此故題云須屬也釋畜第十九釋曰案字林畜作嘼説文云獸也人之畜養者也所以與釋獸異篇者以其畜是畜養之名獸是毛蟲揔號故此篇唯論馬牛羊彘犬雞前篇則通釋百獸之名所以異也騊駼馬釋曰良馬名騊駼字林云北狄良馬也一曰野馬瑞應圖云幽隱之獸也有明王在位即至是也注山海至色靑釋曰海外北經文也靑色二字郭氏語也野馬釋曰如馬而小出塞外案穆天子傳云野馬日走五百里是也駮如馬倨牙食虎豹釋曰駮亦野馬名也其狀如馬其牙倨曲而食虎豹也詩秦風云隰有六駮傳引此文以釋之是也注山海至虎豹釋曰案西山經云中曲山有獸如馬而身黑三尾一角虎牙爪音如鼓名曰駮食虎豹可以禦兵言雖小異正謂此也騉蹄趼善升甗釋曰舍人云騉蹄者溷蹄也趼平也謂蹄平正善升甗者登山隒也一云甗者阪也言騉善登髙歷險上下於阪秦時有騉蹄苑是也李云騉者其蹄正堅而平似趼也顧云山嶺曰甗郭云甗山形似甑上大下小騉蹄蹄似趼而健上山秦時有騉蹄苑者取此駿馬以名其苑也騉駼枝蹄趼善升甗釋曰騉駼馬名李巡曰騉駼其迹枝平似趼亦能登髙歷危險也孫炎云騉駼之馬枝蹄如牛而下平郭云騉駼亦似馬而牛蹄也小領盜驪釋曰領頸也盜驪駿馬名也駿馬小頸名曰盜驪注穆天至領頸釋曰案穆天子傳云丙寅天子屬官效器乃命正公郊父受敕憲用中八駿之乘以飲于枝洔之中積石之南河天子之駿赤驥盜驪白義渠黃華騮緑耳郭注云盜驪者為馬細頸驪黑色也緑耳者紀年曰北唐之君來見驪馬是生緑耳魏時西卑獻千里馬白色而兩耳黃因名之為黃耳即此類也云又曰右服盜驪者案彼云癸酉天子命駕八駿之乘右服盜驪而左緑耳右驂赤驥而左白義天子主車造父為御是也絶有力駥釋曰馬絶有力者名駥郭云即馬髙八尺者即下文馬八尺為駥者也膝上至惟駹釋曰此辨馬白色所在之異名也馬之膝上皆白者惟馵也骹膝下也四膝下皆白名驓蹢蹄也四蹄皆白名首俗呼為踏雪馬言蹄白似踏雪也前兩足皆白名騱後兩足皆白名翑前右足白名啓前左足白名踦後右足白名驤後左足白名馵駵馬赤色黑鬛馬也若駵馬腹下白者别名騵詩大雅云四騵彭彭是也孫炎云驪黑也白跨股腳白也郭云驪黑色跨髀間也謂黑馬髀間白名驈詩魯頌云有驈有皇是也州竅也謂馬之白尻者名驠本根株也馬尾株白者名騴但尾毛白者名駺的顙者舍人曰的曰也顙額也額有白毛今之戴星馬也易震為的顙素鼻莖也其白自額下達鼻莖者名縣俗所謂漫顱徹齒其面額皆白者惟駹馬也注左傳曰啓服釋曰案昭二十九年公至自乾侯處于鄆衛侯來獻其乘馬曰啓服杜預云啓服馬名是也注易曰震為馵足釋曰説卦文也取其動而見也回毛至闋廣郭釋曰此别馬旋毛所在之名也回旋也膺胸也旋毛在膺者名宜乘樊光云俗呼之官府馬伯樂相馬法旋毛在腹下如乳者千里馬也旋毛在肘後者名減陽幹脅也旋毛在脅者名茀方旋毛在背者名闋廣郭云皆别旋毛所在之名也逆毛居馻釋曰字林云馬逆毛也郭云馬毛逆刺騋牝驪牡注詩云至見周禮釋曰云詩云騋牝三千者鄘風定之方中篇文也云七尺巳上為騋見周禮者廋人文也案鄭玄注禮記檀弓引此文云騋牝驪牡玄謂七尺曰騋牝者色驪牡者色玄與郭異也玄駒裊驂釋曰此郭氏兩解一云玄駒小馬別名裊驂耳指謂今馬駒也一云或曰此即騕裊古之良馬名言玄駒裊驂即騕裊也牡曰騭牝曰騇釋曰别馬牝牡之異名也郭云今江東呼駁馬為騭騇即草馬之名也駵白駁至白魚釋曰此别馬毛色不純之異名也孫炎曰駵赤色也謂馬有駵處有白處者曰駁有黃處有白處者曰騜駵馬脊毛黃者名騝驪馬脊毛黃者名騽靑驪駽舍人曰靑驪馬今名駽馬也孫炎曰色靑之間靑毛黑毛相雜者名駽今之鐵驄也靑驪驎驒孫炎曰色有淺深似魚鱗郭云色有深淺班駁隱鄰名驒今之連錢驄説文云馬文如鼉詩云有驒有駱是也毛色靑黑而髦鬣繁多者名騥毛色黑白而復有雜毛相錯者名鴇詩云叔于田乘乘駂是也今謂之烏驄毛色黃白而復有雜毛者名駓今謂之桃華馬隂淺黑色也毛淺黑而白兼雜毛者名駰今謂之泥驄詩云有駰有騢是也蒼淺靑也毛有淺靑及白兼雜毛者名騅䑣赤也毛赤白兼雜毛者名騢説文云文似蝦魚也即今之赭白馬也鬣總也白馬黑總者名駱白馬黑脣者名駩喙口也黑喙者名騧説文云黃馬黑喙曰騧郭云今之淺黃色者為騧馬詩云騧驪是驂是也一目白者名瞷二目白者名魚言似魚目也注詩曰騜駁其馬釋曰豳風東山篇文也住禮記至髦鬛釋曰云周人黃馬繁鬣者明堂位文也云繁鬣兩被毛者郭氏釋之也言繁鬣者分其髦鬣兩鄉被之也云或云美髦鬣者又引或人以為一解言其髦鬛繁多而美也今禮記夲繁作蕃則或説為得注詩曰有騅有駓又詩曰有驔有魚釋曰皆魯頌駉篇文也注禮記曰夏后氏駱馬黑鬣釋曰亦明堂位文也既差至齊足釋曰云既差我馬者此詩小雅吉日篇文也作者引之然後作釋云差擇也者詁差為㨂擇之義也云宗廟齊毫戎事齊力田獵齊足者此遂言擇馬之事也李巡曰祭於宗廟當加謹敬取其同色也某氏曰戎事謂兵革戰伐之事當齊其力以載干戈之屬舍人曰田獵取牲於苑囿之中追飛逐走取其疾而巳郭云尚純尚強尚疾者此毛傳文也案詩小雅車攻云我馬既同毛傳引此文則每增二字以解之云宗廟齊毫尚純也戎事齊力尚強也田獵齊足尚疾也言齊其毫毛尚純色齊其馬力尚強壯齊其馬足尚迅疾義與此合故郭氏取以為説也馬屬釋曰自騊駼巳下雖駿異毛色不同皆馬之屬類故以此題之也下倣此犘牛至欣犌釋曰此别牛屬也云犘牛名也郭云出巴中重千斤犦牛領上肉犦胅起之牛也郭云即犎牛也者即上注云漢順時踈勒王來獻犎牛是也云領上肉犦胅起髙二尺許者謂領上肉腫墳起也云狀如橐駝肉鞍一邊者山海經云號山獸多橐駝彼注云有肉鞍善行流沙中日行三百里負千斤知水泉所在是也橐駝肉鞍胅起有二此牛領肉胅起惟一故云一邊云健行者日三百餘里今交州合浦徐間縣出此牛犤牛名也郭云犤牛􅋻小今之㹄牛也又呼果下牛出廣州髙涼郡以其􅋻小可行果樹下故又呼果下牛魏牛亦牛名也郭云即犪牛也如牛而大肉數千斤出蜀中山海經曰岷山多犪牛案中山經云岷山其獸多犀象犪牛彼注云今蜀中有大牛重數千斤名為犪牛晉大興元年此牛出上庸郡人弩射殺得之三十擔肉即爾雅魏牛牛是也犣亦牛名也郭云旄牛也髀膝尾皆有長毛案山海經潘侯山有獸狀如牛而四節生毛名曰旄牛彼注云今旄牛背膝及胡尾皆有長毛是也犝牛者無角牛名也易云童牛之牿是也俯低也牛角一低一仰者名觭言傾欺也踊豎也牛而角豎者名觢牛黑脣者名犉皆目匡也牛之目匡黑者名牰黑耳者名犚黑腹者名牧黑腳者名犈郭云皆别牛黑所在之名其牛所生之子名犢郭云今靑州呼犢為體身也凡牛之身長者名牬絶有力壯大者名欣犌注毛詩至脣牛釋曰詩小雅無羊篇云誰謂爾無牛九十其犉毛傳云黃牛黑脣曰犉毛意以此言黑脣明不與身同色而牛之黃者衆故云黃牛也其實不主為黃牛故郭氏云此冝通謂黑脣牛羊牡羒至力奮釋曰此別羊屬也云謂吳羊也其牡者名羒即白羝也其牝者名牂云夏羊者黑羖䍽也其牡者名羭即黑羝也其牝者名羖郭云今人便以牂羖為白黑羊名其實白羊牝者名牂黑羊牝者名羖羊角不齊一長一短者名觤觠捲也羊角捲三匝者名羷羊之黃腹者名羳羊新生未成羊者名羜郭云俗呼五月羊為羜詩小雅伐木云既有肥羜是也壯大絶有力者名奮注詩云牂羊墳首釋曰小雅苕之華篇文也注歸藏曰兩壷兩羭釋曰歸藏者成湯之所作也言萬物歸之所藏也是三易之一也云兩壷兩羭者齊母經瞿有之文也案彼云瞿有瞿有魪宵梁為酒尊於兩壷兩羭飲之三日然后鯀士有澤我取其魚是也犬生至狗也釋曰此别狗屬也云犬者説文云狗之有縣蹄者也象形孔子曰視犬之字如畫狗也犬生三子則曰猣二曰師三曰玂毫是㲦毛也犬子未生㲦毛者名狗喙口也犬長口者名獪短口者名猲獢壯大絶有力者名狣尨即狗也説文孔子曰狗叩也叩氣吠以守也注此與至出入釋曰云此與豬生子義同者案釋獸注云豬生子常多故别其少者之名犬生子亦常多而此亦别其少者之名故云義同云名亦相出入者謂此猣師玂與彼豵師特字雖小異大意則同故云亦相出入注詩曰載獫猲獢釋曰秦風駟鐵篇文也毛傳云田犬也長喙曰獫短喙曰猲獢鄭箋云載始也始田犬者謂達其搏噬始成之也注詩曰無使尨也吠釋曰召南野有死麕篇文也毛傳云尨狗也非理相陵則狗吠是也雞大至力奮釋曰此别雞屬也案春秋説題辭曰雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞者知時畜其大者名蜀郭云今蜀雞蜀之雛子名錐雛之稍長未成雞者名僆郭云江東呼雞少者曰僆壯大絶有力者名奮郭云諸物有氣力多者無不健自奮迅故皆以名云者謂上文雉也羊也并此雞皆云絶有力奮故此釋之也馬八尺至為鶤釋曰此别六畜絶大者名也馬髙八尺者名駥牛髙七尺者名犉羊髙六尺者名羬山海經云錢來山有獸其狀如羊而馬尾名羬注云今大月氏國有大羊如驢馬尾是也彘豬也豬髙五尺者名􅙊狗髙四尺者名獒雞髙二尺者名鶤注周禮至為龍釋曰夏官廋人職文也注詩曰至尸子釋曰小雅無羊篇文也上云牛黑脣犉注引此詩傳此牛七尺為犉又引此詩文是犉有二義則牛黑脣者為犉牛七尺者亦為犉義淂兩通故並引之云亦見尸子者尸子説六畜云大牛為犉七尺故云亦見尸子下羊彘倣此注公羊至之獒釋曰案宣六年傳云晉靈公將殺趙盾趙盾躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也何休云周狗可以比周之狗所指如意是也今此周作害蓋傳寫誤或所見本異也爾雅疏卷第十
